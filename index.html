<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheckList Pro - 30 Days Tracker</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            padding: 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 5px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .google-btn-wrapper {
            text-align: center;
            margin-bottom: 20px;
        }

        .user-info {
            background: #f0f4ff;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .user-info p {
            font-size: 13px;
            color: #333;
            margin-bottom: 8px;
        }

        .logout-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            width: 100%;
        }

        .logout-btn:hover {
            background: #ff5252;
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .input-group input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .add-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        .add-btn:hover {
            background: #5568d3;
        }

        .add-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .checklist {
            list-style: none;
            margin-bottom: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .checklist li {
            background: #f8f9fa;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 4px solid #667eea;
        }

        .checklist li.completed {
            background: #e8f5e9;
            border-left-color: #4caf50;
        }

        .checklist li.completed .item-text {
            text-decoration: line-through;
            color: #999;
        }

        .checklist input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .item-text {
            flex: 1;
            color: #333;
            font-size: 14px;
        }

        .item-date {
            font-size: 12px;
            color: #999;
        }

        .delete-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .delete-btn:hover {
            background: #ff5252;
        }

        .stats {
            background: #f0f4ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .stats p {
            color: #666;
            font-size: 13px;
            margin-bottom: 5px;
        }

        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .filter-group {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .filter-btn {
            flex: 1;
            padding: 8px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .filter-btn.active {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 30px 20px;
            color: #999;
        }

        .sync-status {
            font-size: 11px;
            color: #999;
            text-align: center;
            margin-top: 10px;
        }

        .sync-status.synced {
            color: #4caf50;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 22px;
            }

            .input-group {
                flex-direction: column;
            }

            .add-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <h1>✓ CheckList Pro</h1>
            <p>Track your daily checklist for 30 days</p>
        </div>

        <!-- GOOGLE SIGN-IN -->
        <div class="google-btn-wrapper" id="googleSection">
            <div id="g_id_onload"
                 data-client_id="1069568952458-m2thp51uuuurp51o18iboprnsq0bjq8p.apps.googleusercontent.com"
                 data-callback="handleGoogleSignIn">
            </div>
            <div class="g_id_signin" data-type="standard" data-size="large"></div>
        </div>

        <!-- USER INFO -->
        <div class="user-info" id="userInfo">
            <p><strong>User:</strong> <span id="userEmail"></span></p>
            <button class="logout-btn" onclick="logoutUser()">Logout</button>
        </div>

        <!-- APP CONTENT (Hidden until login) -->
        <div id="appContent" style="display: none;">
            <!-- STATS -->
            <div class="stats">
                <p>Total | Completed | Days Left</p>
                <div class="stat-number"><span id="totalCount">0</span> | <span id="completedCount">0</span> | <span id="daysLeft">30</span></div>
            </div>

            <!-- FILTERS -->
            <div class="filter-group">
                <button class="filter-btn active" onclick="filterTasks('all')">All</button>
                <button class="filter-btn" onclick="filterTasks('pending')">Pending</button>
                <button class="filter-btn" onclick="filterTasks('completed')">Done</button>
            </div>

            <!-- ADD ITEM -->
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="Add a task..." />
                <button class="add-btn" onclick="addTask()">Add</button>
            </div>

            <!-- CHECKLIST -->
            <ul class="checklist" id="checklist"></ul>

            <!-- EMPTY STATE -->
            <div class="empty-state" id="emptyState" style="display: none;">
                📝 No tasks yet. Add one to get started!
            </div>

            <!-- SYNC STATUS -->
            <div class="sync-status" id="syncStatus">Syncing...</div>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAxT6I5OUp_X1THaHiLWpBgk7KM5-NqQ4w",
            authDomain: "taskpro-ea29c.firebaseapp.com",
            databaseURL: "https://taskpro-ea29c-default-rtdb.firebaseio.com",
            projectId: "taskpro-ea29c",
            storageBucket: "taskpro-ea29c.firebasestorage.app",
            messagingSenderId: "917450499382",
            appId: "1:917450499382:web:55098613f6ae8a2f37ff97"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.database();

        // Global State
        let userId = null;
        let tasks = [];
        let currentFilter = 'all';
        const createdDate = new Date('2026-01-01'); // Start date

        // ==================== GOOGLE SIGN-IN ====================
        function handleGoogleSignIn(response) {
            try {
                const decoded = JSON.parse(atob(response.credential.split('.')[1]));
                const email = decoded.email;
                const credential = firebase.auth.GoogleAuthProvider.credential(response.credential);
                
                auth.signInWithCredential(credential).then(result => {
                    userId = result.user.uid;
                    localStorage.setItem('userId', userId);
                    localStorage.setItem('userEmail', email);
                    updateUI();
                    loadTasks();
                }).catch(error => alert('Error: ' + error.message));
            } catch (e) {
                alert('Sign-in error: ' + e.message);
            }
        }

        // ==================== TASKS ====================
        async function addTask() {
            const input = document.getElementById('taskInput');
            const text = input.value.trim();
            if (!text) return;

            const task = {
                id: Date.now(),
                text,
                completed: false,
                createdAt: new Date().toISOString()
            };

            await saveTask(task);
            input.value = '';
            renderTasks();
        }

        async function saveTask(task) {
            if (!userId) return;
            await db.ref(`users/${userId}/tasks/${task.id}`).set(task);
            updateSyncStatus('Synced ✓', true);
        }

        async function loadTasks() {
            if (!userId) return;
            const snapshot = await db.ref(`users/${userId}/tasks`).once('value');
            tasks = Object.values(snapshot.val() || {});
            renderTasks();
        }

        async function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                await saveTask(task);
                renderTasks();
            }
        }

        async function deleteTask(id) {
            if (!userId) return;
            await db.ref(`users/${userId}/tasks/${id}`).remove();
            tasks = tasks.filter(t => t.id !== id);
            renderTasks();
            updateSyncStatus('Deleted & Synced ✓', true);
        }

        function renderTasks() {
            const list = document.getElementById('checklist');
            const empty = document.getElementById('emptyState');
            
            let filtered = tasks;
            if (currentFilter === 'pending') filtered = tasks.filter(t => !t.completed);
            if (currentFilter === 'completed') filtered = tasks.filter(t => t.completed);

            // Update stats
            document.getElementById('totalCount').textContent = tasks.length;
            document.getElementById('completedCount').textContent = tasks.filter(t => t.completed).length;
            document.getElementById('daysLeft').textContent = Math.max(0, 30 - daysSinceCreation());

            if (filtered.length === 0) {
                list.innerHTML = '';
                empty.style.display = 'block';
                return;
            }

            empty.style.display = 'none';
            list.innerHTML = filtered.map(task => `
                <li class="${task.completed ? 'completed' : ''}">
                    <input type="checkbox" ${task.completed ? 'checked' : ''} 
                           onchange="toggleTask(${task.id})" />
                    <span class="item-text">${escapeHtml(task.text)}</span>
                    <span class="item-date">${formatDate(task.createdAt)}</span>
                    <button class="delete-btn" onclick="deleteTask(${task.id})">×</button>
                </li>
            `).join('');
        }

        function filterTasks(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderTasks();
        }

        // ==================== UI UPDATES ====================
        function updateUI() {
            const email = localStorage.getItem('userEmail');
            const googleSection = document.getElementById('googleSection');
            const userInfo = document.getElementById('userInfo');
            const appContent = document.getElementById('appContent');

            if (email) {
                googleSection.style.display = 'none';
                userInfo.style.display = 'block';
                appContent.style.display = 'block';
                document.getElementById('userEmail').textContent = email;
            } else {
                googleSection.style.display = 'block';
                userInfo.style.display = 'none';
                appContent.style.display = 'none';
            }
        }

        function logoutUser() {
            auth.signOut();
            userId = null;
            localStorage.clear();
            location.reload();
        }

        function updateSyncStatus(message, success = false) {
            const status = document.getElementById('syncStatus');
            status.textContent = message;
            if (success) status.classList.add('synced');
            else status.classList.remove('synced');
        }

        // ==================== UTILITIES ====================
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        function daysSinceCreation() {
            const now = new Date();
            const start = new Date('2026-01-01');
            return Math.floor((now - start) / (1000 * 60 * 60 * 24));
        }

        // ==================== INIT ====================
        window.addEventListener('load', () => {
            const savedEmail = localStorage.getItem('userEmail');
            const savedUserId = localStorage.getItem('userId');
            if (savedEmail && savedUserId) {
                userId = savedUserId;
                updateUI();
                loadTasks();
            } else {
                updateUI();
            }

            auth.onAuthStateChanged(user => {
                if (user && !userId) {
                    userId = user.uid;
                    loadTasks();
                }
            });
        });
    </script>
</body>
</html>
