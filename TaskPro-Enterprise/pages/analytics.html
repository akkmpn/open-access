<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskPro - Analytics</title>
    <link rel="stylesheet" href="../shared/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="header-bar">
            <div class="header-left">
                <div class="logo">⚡ TaskPro Pro</div>
            </div>
            <div class="header-right">
                <div class="status-indicator" id="syncStatus"></div>
                <button class="btn btn-secondary" onclick="goBack()" style="font-size: 12px;">← Back</button>
            </div>
        </div>

        <div class="sidebar scrollbar">
            <a href="../index.html" class="nav-item">📊 Dashboard</a>
            <a href="analytics.html" class="nav-item active">📊 Analytics</a>
            <a href="reports.html" class="nav-item">📈 Reports</a>
        </div>

        <div class="main-content scrollbar">
            <div class="content-header">
                <h1>📊 Analytics</h1>
                <p>Your productivity insights</p>
            </div>

            <!-- STATS -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="totalTasks">0</div>
                    <div class="stat-label">Total Tasks</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="completedTasks">0</div>
                    <div class="stat-label">Completed</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="completionRate">0%</div>
                    <div class="stat-label">Completion Rate</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="pendingTasks">0</div>
                    <div class="stat-label">Pending</div>
                </div>
            </div>

            <!-- CHART -->
            <div class="card">
                <h3>30-Day Performance</h3>
                <div style="position: relative; height: 300px;">
                    <canvas id="performanceChart"></canvas>
                </div>
            </div>

            <!-- PRIORITY BREAKDOWN -->
            <div class="card">
                <h3>Priority Distribution</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
                    <div>
                        <div style="text-align: center; margin-bottom: 10px;">
                            <div class="stat-value" id="highCount" style="color: var(--danger);">0</div>
                            <div class="stat-label">High Priority</div>
                        </div>
                    </div>
                    <div>
                        <div style="text-align: center; margin-bottom: 10px;">
                            <div class="stat-value" id="mediumCount" style="color: var(--warning);">0</div>
                            <div class="stat-label">Medium Priority</div>
                        </div>
                    </div>
                    <div>
                        <div style="text-align: center; margin-bottom: 10px;">
                            <div class="stat-value" id="lowCount" style="color: var(--success);">0</div>
                            <div class="stat-label">Low Priority</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../shared/firebase-config.js"></script>
    <script src="../shared/shared.js"></script>
    <script>
        let chart = null;

        window.addEventListener('load', async () => {
            await initApp();
            renderAnalytics();
        });

        async function renderAnalytics() {
            const tasks = await window.getAllTasks();
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const pending = total - completed;
            const rate = total > 0 ? Math.round((completed / total) * 100) : 0;

            document.getElementById('totalTasks').textContent = total;
            document.getElementById('completedTasks').textContent = completed;
            document.getElementById('completionRate').textContent = rate + '%';
            document.getElementById('pendingTasks').textContent = pending;

            // Priority breakdown
            const highCount = tasks.filter(t => t.priority === 'high').length;
            const mediumCount = tasks.filter(t => t.priority === 'medium').length;
            const lowCount = tasks.filter(t => t.priority === 'low').length;

            document.getElementById('highCount').textContent = highCount;
            document.getElementById('mediumCount').textContent = mediumCount;
            document.getElementById('lowCount').textContent = lowCount;

            // Render 31-day chart
            render31DayChart(tasks);
        }

        function render31DayChart(tasks) {
            const data = [];
            const labels = [];

            for (let i = 30; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                const isoDate = d.toISOString().split('T')[0];
                labels.push(d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }));
                
                const count = tasks.filter(t => t.createdAt.split('T')[0] === isoDate).length;
                data.push(count);
            }

            const ctx = document.getElementById('performanceChart');
            if (chart) chart.destroy();

            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels,
                    datasets: [{
                        label: 'Tasks Created',
                        data,
                        backgroundColor: '#3b82f6',
                        borderColor: '#1e40af',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: true } },
                    scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
                }
            });
        }

        function goBack() {
            window.location.href = '../index.html';
        }
    </script>
</body>
</html>
