<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskPro - Lists</title>
    <link rel="stylesheet" href="../shared/styles.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- HEADER -->
        <div class="header-bar">
            <div class="header-left">
                <div class="logo">⚡ TaskPro Pro</div>
                <input type="text" class="search-bar" id="globalSearch" placeholder="Search tasks..." />
            </div>
            <div class="header-right">
                <div class="status-indicator" id="syncStatus"></div>
                <div style="color: var(--text-secondary); font-size: 12px;" id="userDisplay">Guest</div>
                <button class="btn btn-secondary" style="padding: 8px 12px; font-size: 12px;" onclick="goBack()">← Back</button>
            </div>
        </div>

        <!-- SIDEBAR -->
        <div class="sidebar scrollbar">
            <div class="sidebar-section">
                <div class="sidebar-title">Workspace</div>
                <a href="../index.html" class="nav-item">📊 Dashboard</a>
                <a href="lists.html" class="nav-item active">📝 Tasks</a>
                <a href="subtasks.html" class="nav-item">📋 Subtasks</a>
                <a href="calendar.html" class="nav-item">📅 Calendar</a>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-title">Performance</div>
                <a href="analytics.html" class="nav-item">📊 Analytics</a>
                <a href="reports.html" class="nav-item">📈 Reports</a>
            </div>

            <div class="sidebar-footer">
                <button class="btn btn-primary" style="width: 100%; margin-bottom: 8px;" onclick="window.location.href='settings.html'">⚙️ Settings</button>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content scrollbar">
            <div class="content-header">
                <h1>Tasks</h1>
                <p>Manage all your tasks with priorities and due dates</p>
            </div>

            <!-- CREATE TASK FORM -->
            <div class="card">
                <h3>Create New Task</h3>
                <div class="input-grid">
                    <input type="text" id="taskInput" placeholder="Task title..." />
                    <input type="date" id="dueDateInput" />
                    <select id="prioritySelect">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                    <button class="btn btn-primary" onclick="addTask()">Add Task</button>
                </div>
            </div>

            <!-- FILTERS -->
            <div class="card">
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <button class="btn btn-secondary" onclick="filterTasks('all')" id="filterAll">All</button>
                    <button class="btn btn-secondary" onclick="filterTasks('today')" id="filterToday">Today</button>
                    <button class="btn btn-secondary" onclick="filterTasks('pending')" id="filterPending">Pending</button>
                    <button class="btn btn-secondary" onclick="filterTasks('completed')" id="filterCompleted">Completed</button>
                </div>
            </div>

            <!-- TASKS LIST -->
            <div id="tasksContainer">
                <div class="empty-state" style="text-align: center; padding: 40px 20px;">
                    <div style="font-size: 48px; margin-bottom: 15px;">📋</div>
                    <p style="color: var(--text-secondary);">No tasks yet. Create one to get started!</p>
                </div>
            </div>
        </div>
    </div>

    <!-- EDIT TASK MODAL -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">Edit Task</div>
            <input type="text" id="editTitle" placeholder="Task title..." style="margin-bottom: 10px; width: 100%;" />
            <input type="date" id="editDueDate" style="margin-bottom: 10px; width: 100%;" />
            <select id="editPriority" style="margin-bottom: 10px; width: 100%;">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>
            <textarea id="editDescription" placeholder="Description..." style="margin-bottom: 10px; width: 100%;"></textarea>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveEdit()">Save</button>
            </div>
        </div>
    </div>

    <script src="../shared/firebase-config.js"></script>
    <script src="../shared/shared.js"></script>
    <script>
        let currentFilter = 'all';
        let editingTaskId = null;

        window.addEventListener('load', async () => {
            await initApp();
            updateUserDisplay();
            renderTasks();
        });

        function updateUserDisplay() {
            const email = localStorage.getItem('userEmail');
            if (email) {
                document.getElementById('userDisplay').textContent = email;
            }
        }

        async function addTask() {
            const text = document.getElementById('taskInput').value.trim();
            const dueDate = document.getElementById('dueDateInput').value;
            const priority = document.getElementById('prioritySelect').value;

            if (!text) {
                alert('Please enter a task title');
                return;
            }

            const task = {
                id: Date.now(),
                text,
                dueDate,
                priority,
                completed: false,
                description: '',
                createdAt: new Date().toISOString(),
                updatedAt: Date.now()
            };

            await window.saveTask(task);
            document.getElementById('taskInput').value = '';
            document.getElementById('dueDateInput').value = '';
            renderTasks();
        }

        async function renderTasks() {
            const tasks = await window.getAllTasks();
            const container = document.getElementById('tasksContainer');

            let filtered = tasks;
            const todayISO = window.getTodayISO();

            if (currentFilter === 'today') {
                filtered = tasks.filter(t => {
                    const taskDate = t.createdAt.split('T')[0];
                    return taskDate === todayISO && !t.completed;
                });
            } else if (currentFilter === 'pending') {
                filtered = tasks.filter(t => !t.completed);
            } else if (currentFilter === 'completed') {
                filtered = tasks.filter(t => t.completed);
            }

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="text-align: center; padding: 40px 20px;">
                        <div style="font-size: 48px; margin-bottom: 15px;">📋</div>
                        <p style="color: var(--text-secondary);">No tasks found</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(task => `
                <div class="card" style="display: flex; justify-content: space-between; align-items: center;">
                    <div style="flex: 1;">
                        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px;">
                            <input type="checkbox" ${task.completed ? 'checked' : ''} 
                                   onchange="toggleTask(${task.id})" style="width: 20px; height: 20px; cursor: pointer;" />
                            <span class="badge badge-${task.priority}">${task.priority.toUpperCase()}</span>
                            <h4 style="margin: 0; flex: 1; ${task.completed ? 'text-decoration: line-through; opacity: 0.6;' : ''}">${window.escapeHtml(task.text)}</h4>
                        </div>
                        <div style="color: var(--text-secondary); font-size: 12px;">
                            ${task.dueDate ? `📅 Due: ${window.formatDate(task.dueDate)}` : ''}
                            ${task.description ? `<br/>📝 ${window.escapeHtml(task.description)}` : ''}
                        </div>
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn btn-secondary" style="padding: 8px 12px; font-size: 12px;" onclick="openEditModal(${task.id})">✎ Edit</button>
                        <button class="btn btn-danger" style="padding: 8px 12px; font-size: 12px;" onclick="deleteTask(${task.id})">🗑 Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function filterTasks(filter) {
            currentFilter = filter;
            document.querySelectorAll('.modal-footer').forEach(el => el.classList.remove('active'));
            document.getElementById('filter' + filter.charAt(0).toUpperCase() + filter.slice(1)).classList.add('active');
            renderTasks();
        }

        async function toggleTask(taskId) {
            const task = await window.getTask(taskId);
            task.completed = !task.completed;
            await window.saveTask(task);
            renderTasks();
        }

        async function deleteTask(taskId) {
            if (confirm('Are you sure you want to delete this task?')) {
                await window.deleteTask(taskId);
                renderTasks();
            }
        }

        async function openEditModal(taskId) {
            editingTaskId = taskId;
            const task = await window.getTask(taskId);
            document.getElementById('editTitle').value = task.text;
            document.getElementById('editDueDate').value = task.dueDate || '';
            document.getElementById('editPriority').value = task.priority;
            document.getElementById('editDescription').value = task.description || '';
            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            editingTaskId = null;
        }

        async function saveEdit() {
            const task = await window.getTask(editingTaskId);
            task.text = document.getElementById('editTitle').value;
            task.dueDate = document.getElementById('editDueDate').value;
            task.priority = document.getElementById('editPriority').value;
            task.description = document.getElementById('editDescription').value;
            await window.saveTask(task);
            closeEditModal();
            renderTasks();
        }

        function goBack() {
            window.location.href = '../index.html';
        }
    </script>
</body>
</html>
