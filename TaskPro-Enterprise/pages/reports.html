<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskPro - Reports</title>
    <link rel="stylesheet" href="../shared/styles.css">
    <style>
    /* PASTE ALL OF shared/styles.css HERE */
    :root {
        --primary: #3b82f6;
        --primary-dark: #2563eb;
        --secondary: #6b7280;
        --success: #10b981;
        --danger: #ef4444;
        --warning: #f59e0b;
        --bg-primary: #0f172a;
        --bg-secondary: #1e293b;
        --bg-tertiary: #334155;
        --text-primary: #f1f5f9;
        --text-secondary: #cbd5e1;
        --text-tertiary: #94a3b8;
        --border: #475569;
        --spacing-xs: 4px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-xl: 32px;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html, body {
        width: 100%;
        height: 100%;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        line-height: 1.6;
    }

    .app-container {
        display: flex;
        height: 100vh;
        overflow: hidden;
    }

    .sidebar {
        width: 250px;
        background: var(--bg-secondary);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        padding: var(--spacing-lg);
        overflow-y: auto;
    }

    .logo h1 {
        font-size: 24px;
        color: var(--primary);
        font-weight: 700;
    }

    .nav-menu {
        display: flex;
        flex-direction: column;
        gap: var(--spacing-sm);
    }

    .nav-item {
        padding: var(--spacing-md);
        border-radius: 8px;
        text-decoration: none;
        color: var(--text-secondary);
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .nav-item:hover {
        background: var(--bg-tertiary);
        color: var(--text-primary);
    }

    .nav-item.active {
        background: rgba(59, 130, 246, 0.1);
        color: var(--primary);
        font-weight: 600;
    }

    .main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .header {
        background: var(--bg-secondary);
        border-bottom: 1px solid var(--border);
        padding: var(--spacing-lg);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: var(--spacing-lg);
    }

    .header-left h2 {
        font-size: 20px;
        color: var(--text-primary);
    }

    .header-right {
        display: flex;
        align-items: center;
        gap: var(--spacing-lg);
    }

    .sync-status {
        display: flex;
        align-items: center;
        gap: var(--spacing-sm);
        padding: var(--spacing-sm) var(--spacing-md);
        background: rgba(16, 185, 129, 0.1);
        border-radius: 6px;
    }

    .sync-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
    }

    .sync-dot.green {
        background: var(--success);
    }

    .sync-dot.yellow {
        background: var(--warning);
    }

    .sync-dot.red {
        background: var(--danger);
    }

    .btn {
        padding: var(--spacing-sm) var(--spacing-md);
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
        white-space: nowrap;
    }

    .btn-primary {
        background: var(--primary);
        color: white;
    }

    .btn-primary:hover {
        background: var(--primary-dark);
    }

    .btn-secondary {
        background: var(--bg-tertiary);
        color: var(--text-primary);
        border: 1px solid var(--border);
    }

    .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.1);
    }

    .btn-sm {
        padding: 4px 8px;
        font-size: 12px;
    }

    .btn-full {
        width: 100%;
    }

    .modal {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
    }

    .modal.hidden {
        display: none;
    }

    .modal-content {
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        border-radius: 8px;
        max-width: 500px;
        width: 90%;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: 0 10px 15px rgba(0, 0, 0, 0.3);
    }

    .modal-header {
        padding: var(--spacing-lg);
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .modal-header h3 {
        color: var(--text-primary);
        font-size: 18px;
    }

    .modal-close {
        background: none;
        border: none;
        color: var(--text-tertiary);
        font-size: 24px;
        cursor: pointer;
    }

    .modal-body {
        padding: var(--spacing-lg);
    }

    .form-group {
        margin-bottom: var(--spacing-md);
        display: flex;
        flex-direction: column;
    }

    .form-group label {
        margin-bottom: var(--spacing-xs);
        font-size: 14px;
        font-weight: 500;
        color: var(--text-secondary);
    }

    .form-group input {
        padding: var(--spacing-sm) var(--spacing-md);
        background: var(--bg-tertiary);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text-primary);
        font-size: 14px;
    }

    .form-group input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .dashboard-content {
        background: var(--bg-primary);
        padding: var(--spacing-lg);
        overflow-y: auto;
        flex: 1;
    }

    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: var(--spacing-lg);
        margin-bottom: var(--spacing-xl);
    }

    .stat-card {
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: var(--spacing-lg);
        display: flex;
        align-items: center;
        gap: var(--spacing-lg);
    }

    .stat-card:hover {
        border-color: var(--primary);
    }

    .stat-icon {
        font-size: 32px;
    }

    .stat-content h4 {
        font-size: 12px;
        color: var(--text-tertiary);
        margin-bottom: var(--spacing-xs);
        text-transform: uppercase;
        font-weight: 600;
    }

    .stat-number {
        font-size: 28px;
        font-weight: 700;
        color: var(--primary);
    }

    .quick-actions {
        margin: var(--spacing-xl) 0;
    }

    .quick-actions h3 {
        font-size: 16px;
        margin-bottom: var(--spacing-lg);
    }

    .action-buttons {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: var(--spacing-md);
    }

    .getting-started, .features-list {
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: var(--spacing-lg);
        margin-bottom: var(--spacing-lg);
    }

    .getting-started h3, .features-list h3 {
        color: var(--text-primary);
        margin-bottom: var(--spacing-lg);
    }

    .getting-started ol, .features-list ul {
        margin-left: var(--spacing-lg);
        color: var(--text-secondary);
        line-height: 2;
    }

    .user-info {
        display: flex;
        align-items: center;
        gap: var(--spacing-md);
    }

    .user-info span {
        color: var(--text-secondary);
        font-size: 14px;
    }

    .hidden {
        display: none !important;
    }

    @media (max-width: 1024px) {
        .sidebar {
            width: 200px;
        }
        .stats-grid {
            grid-template-columns: repeat(2, 1fr);
        }
    }

    @media (max-width: 768px) {
        .app-container {
            flex-direction: column;
        }
        .sidebar {
            width: 100%;
            flex-direction: row;
            padding: var(--spacing-md);
            overflow-x: auto;
            overflow-y: hidden;
        }
        .nav-menu {
            flex-direction: row;
        }
        .header {
            flex-direction: column;
            align-items: flex-start;
        }
        .stats-grid {
            grid-template-columns: 1fr;
        }
    }
</style>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="header-bar">
            <div class="header-left">
                <div class="logo">⚡ TaskPro Pro</div>
            </div>
            <div class="header-right">
                <div class="status-indicator" id="syncStatus"></div>
                <button class="btn btn-secondary" onclick="goBack()" style="font-size: 12px;">← Back</button>
            </div>
        </div>

        <div class="sidebar scrollbar">
            <a href="../index.html" class="nav-item">📊 Dashboard</a>
            <a href="reports.html" class="nav-item active">📈 Reports</a>
        </div>

        <div class="main-content scrollbar">
            <div class="content-header">
                <h1>📈 Reports</h1>
                <p>Generate and download productivity reports</p>
            </div>

            <!-- REPORT OPTIONS -->
            <div class="card">
                <h3>Generate Report</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
                    <button class="btn btn-primary" onclick="generateSummaryReport()">📋 Summary Report</button>
                    <button class="btn btn-primary" onclick="generateDetailedReport()">📊 Detailed Report</button>
                </div>
            </div>

            <!-- REPORT OUTPUT -->
            <div id="reportOutput"></div>

            <!-- EXPORT OPTIONS -->
            <div class="card" id="exportCard" style="display: none;">
                <h3>Export</h3>
                <button class="btn btn-primary" onclick="exportAsCSV()">📥 Download as CSV</button>
                <button class="btn btn-primary" onclick="exportAsJSON()">📥 Download as JSON</button>
                <button class="btn btn-primary" onclick="printReport()">🖨️ Print</button>
            </div>
        </div>
    </div>

    <script src="../shared/firebase-config.js"></script>
    <script src="../shared/shared.js"></script>
    <script>
        let currentReportData = null;

        window.addEventListener('load', async () => {
            await initApp();
        });

        async function generateSummaryReport() {
            const tasks = await window.getAllTasks();
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const pending = total - completed;
            const rate = total > 0 ? Math.round((completed / total) * 100) : 0;

            const highCount = tasks.filter(t => t.priority === 'high').length;
            const mediumCount = tasks.filter(t => t.priority === 'medium').length;
            const lowCount = tasks.filter(t => t.priority === 'low').length;

            const overdueCount = tasks.filter(t => {
                return !t.completed && t.dueDate && new Date(t.dueDate) < new Date();
            }).length;

            const report = `
                <div class="card" id="reportContent">
                    <h2>Summary Report - ${new Date().toLocaleDateString()}</h2>
                    
                    <h3>Key Metrics</h3>
                    <table class="table">
                        <tr>
                            <td>Total Tasks</td>
                            <td><strong>${total}</strong></td>
                        </tr>
                        <tr>
                            <td>Completed Tasks</td>
                            <td><strong>${completed}</strong></td>
                        </tr>
                        <tr>
                            <td>Pending Tasks</td>
                            <td><strong>${pending}</strong></td>
                        </tr>
                        <tr>
                            <td>Completion Rate</td>
                            <td><strong>${rate}%</strong></td>
                        </tr>
                        <tr>
                            <td>Overdue Tasks</td>
                            <td><strong>${overdueCount}</strong></td>
                        </tr>
                    </table>

                    <h3>Priority Breakdown</h3>
                    <table class="table">
                        <tr>
                            <td>High Priority</td>
                            <td><span class="badge badge-high">${highCount}</span></td>
                        </tr>
                        <tr>
                            <td>Medium Priority</td>
                            <td><span class="badge badge-medium">${mediumCount}</span></td>
                        </tr>
                        <tr>
                            <td>Low Priority</td>
                            <td><span class="badge badge-low">${lowCount}</span></td>
                        </tr>
                    </table>

                    <p style="margin-top: 20px; color: var(--text-secondary); font-size: 12px;">
                        Report generated on ${new Date().toLocaleString()}
                    </p>
                </div>
            `;

            currentReportData = {
                total, completed, pending, rate, highCount, mediumCount, lowCount, overdueCount, tasks
            };

            document.getElementById('reportOutput').innerHTML = report;
            document.getElementById('exportCard').style.display = 'block';
        }

        async function generateDetailedReport() {
            const tasks = await window.getAllTasks();
            
            let tasksHtml = tasks.map(task => `
                <tr>
                    <td>${window.escapeHtml(task.text)}</td>
                    <td><span class="badge badge-${task.priority}">${task.priority}</span></td>
                    <td>${task.completed ? '✓' : '✗'}</td>
                    <td>${task.dueDate ? window.formatDate(task.dueDate) : '-'}</td>
                </tr>
            `).join('');

            const report = `
                <div class="card" id="reportContent">
                    <h2>Detailed Report - ${new Date().toLocaleDateString()}</h2>
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Task</th>
                                <th>Priority</th>
                                <th>Completed</th>
                                <th>Due Date</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${tasksHtml}
                        </tbody>
                    </table>
                    <p style="margin-top: 20px; color: var(--text-secondary); font-size: 12px;">
                        Report generated on ${new Date().toLocaleString()} • Total tasks: ${tasks.length}
                    </p>
                </div>
            `;

            currentReportData = { tasks };
            document.getElementById('reportOutput').innerHTML = report;
            document.getElementById('exportCard').style.display = 'block';
        }

        function exportAsCSV() {
            if (!currentReportData) return;

            const tasks = currentReportData.tasks || [];
            let csv = 'Task,Priority,Completed,Due Date\n';
            
            tasks.forEach(task => {
                csv += `"${task.text}","${task.priority}","${task.completed ? 'Yes' : 'No'}","${task.dueDate || ''}"\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `TaskPro_Report_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
        }

        function exportAsJSON() {
            if (!currentReportData) return;

            const json = JSON.stringify(currentReportData, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `TaskPro_Report_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        function printReport() {
            const reportContent = document.getElementById('reportContent');
            if (!reportContent) {
                alert('Generate a report first');
                return;
            }

            const printWindow = window.open('', '', 'height=600,width=800');
            printWindow.document.write('<html><head><title>TaskPro Report</title></head><body>');
            printWindow.document.write(reportContent.innerHTML);
            printWindow.document.write('</body></html>');
            printWindow.document.close();
            printWindow.print();
        }

        function goBack() {
            window.location.href = '../index.html';
        }
    </script>
</body>
</html>
