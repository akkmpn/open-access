<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Todo Checklist - Complete</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        :root {
            --color-primary: #208084;
            --color-primary-hover: #186c71;
            --color-bg: #f5f5f5;
            --color-surface: #ffffff;
            --color-text: #1a1a1a;
            --color-text-secondary: #666;
            --color-border: #e0e0e0;
            --color-success: #4caf50;
            --color-warning: #ff9800;
            --color-error: #f44336;
            --color-high: #dc3545;
            --color-medium: #ff9800;
            --color-low: #28a745;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            background: var(--color-surface);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 700px;
            width: 100%;
            padding: 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: var(--color-text);
            font-size: 28px;
            margin-bottom: 15px;
        }

        .sync-status {
            font-size: 11px;
            color: #666;
            text-align: center;
            margin-top: 10px;
        }

        .sync-status.synced {
            color: #4caf50;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--color-border);
            overflow-x: auto;
        }

        .tab-btn {
            padding: 12px 20px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: var(--color-text-secondary);
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
            margin-bottom: -2px;
            white-space: nowrap;
        }

        .tab-btn:hover {
            color: var(--color-primary);
        }

        .tab-btn.active {
            color: var(--color-primary);
            border-bottom-color: var(--color-primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-box .value {
            font-size: 24px;
            font-weight: bold;
            display: block;
        }

        .stat-box .label {
            font-size: 12px;
            margin-top: 5px;
            opacity: 0.9;
        }

        input[type="text"],
        input[type="date"] {
            padding: 12px;
            border: 2px solid var(--color-border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
            width: 100%;
        }

        input[type="text"]:focus,
        input[type="date"]:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(32, 128, 132, 0.1);
        }

        select {
            padding: 12px;
            border: 2px solid var(--color-border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            background-color: var(--color-surface);
            cursor: pointer;
            transition: border-color 0.3s;
            width: 100%;
        }

        select:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-primary {
            background: var(--color-primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--color-primary-hover);
            box-shadow: 0 5px 15px rgba(32, 128, 132, 0.3);
        }

        .btn-secondary {
            background: var(--color-border);
            color: var(--color-text);
            padding: 8px 16px;
            font-size: 12px;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .btn-danger {
            background: var(--color-error);
            color: white;
            padding: 8px 16px;
            font-size: 12px;
        }

        .btn-danger:hover {
            background: #d32f2f;
        }

        .add-task-section {
            display: grid;
            grid-template-columns: 1fr 100px 120px 80px;
            gap: 10px;
            margin-bottom: 15px;
        }

        .template-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--color-text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .templates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 8px;
            margin-bottom: 15px;
        }

        .template-btn {
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .template-btn:hover {
            background: #f0f0f0;
            border-color: var(--color-primary);
        }

        .tasks-container {
            max-height: 500px;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .task-item {
            display: flex;
            align-items: flex-start;
            padding: 15px;
            background: var(--color-bg);
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 5px solid var(--color-border);
            flex-direction: column;
            gap: 8px;
        }

        .task-item.completed {
            opacity: 0.6;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: var(--color-text-secondary);
        }

        .task-item.overdue {
            border-left-color: var(--color-error);
            background: rgba(244, 67, 54, 0.08);
        }

        .task-item.overdue .task-text {
            color: var(--color-error);
            font-weight: 600;
        }

        .priority-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            color: white;
            width: fit-content;
        }

        .priority-high {
            background: var(--color-high);
        }

        .priority-medium {
            background: var(--color-medium);
        }

        .priority-low {
            background: var(--color-low);
        }

        .task-header {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--color-primary);
            flex-shrink: 0;
        }

        .task-content {
            flex: 1;
        }

        .task-text {
            font-size: 14px;
            color: var(--color-text);
            font-weight: 500;
            margin-bottom: 4px;
        }

        .task-meta {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .task-duedate {
            font-size: 11px;
            color: var(--color-text-secondary);
        }

        .task-remove {
            background: transparent;
            border: none;
            color: var(--color-error);
            cursor: pointer;
            font-size: 16px;
            padding: 5px 10px;
            border-radius: 4px;
        }

        .task-remove:hover {
            background: rgba(244, 67, 54, 0.1);
        }

        .subtasks-list {
            margin-left: 0;
            margin-top: 12px;
            width: 100%;
            background: rgba(32, 128, 132, 0.04);
            border-radius: 6px;
            padding: 10px;
            border: 1px solid rgba(32, 128, 132, 0.1);
        }

        .subtask-item {
            display: flex;
            align-items: center;
            padding: 8px;
            background: transparent;
            border-radius: 6px;
            margin-bottom: 6px;
            font-size: 13px;
            gap: 8px;
        }

        .subtask-item:last-child {
            margin-bottom: 0;
        }

        .subtask-item.completed {
            opacity: 0.6;
        }

        .subtask-item.completed .subtask-text {
            text-decoration: line-through;
            color: var(--color-text-secondary);
        }

        .subtask-checkbox {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: var(--color-primary);
            flex-shrink: 0;
        }

        .subtask-text {
            flex: 1;
            color: var(--color-text);
        }

        .subtask-remove {
            background: none;
            border: none;
            color: var(--color-error);
            cursor: pointer;
            font-size: 14px;
            padding: 0 5px;
        }

        .add-subtask-btn {
            background: rgba(32, 128, 132, 0.1);
            border: 1px dashed var(--color-primary);
            color: var(--color-primary);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 6px;
            width: 100%;
        }

        .add-subtask-btn:hover {
            background: rgba(32, 128, 132, 0.15);
        }

        .empty-state {
            text-align: center;
            padding: 30px 20px;
            color: var(--color-text-secondary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .action-buttons button {
            flex: 1;
        }

        .report-section {
            margin-bottom: 25px;
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin-bottom: 25px;
            background: var(--color-bg);
            padding: 20px;
            border-radius: 8px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .report-stat-box {
            background: var(--color-bg);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border-left: 4px solid var(--color-primary);
        }

        .report-stat-box .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: var(--color-text);
            margin-bottom: 5px;
        }

        .report-stat-box .stat-label {
            font-size: 12px;
            color: var(--color-text-secondary);
            text-transform: uppercase;
        }

        .calendar-container {
            background: var(--color-bg);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: white;
            border: 1px solid var(--color-border);
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .calendar-day.header {
            font-weight: bold;
            background: var(--color-primary);
            color: white;
            cursor: default;
        }

        .calendar-day.progress-0 {
            background: rgba(244, 67, 54, 0.1);
            color: var(--color-error);
        }

        .calendar-day.progress-50 {
            background: rgba(255, 152, 0, 0.1);
            color: var(--color-warning);
        }

        .calendar-day.progress-100 {
            background: rgba(76, 175, 80, 0.1);
            color: var(--color-success);
        }

        .scrollbar {
            scrollbar-width: thin;
            scrollbar-color: var(--color-border) transparent;
        }

        .scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .scrollbar::-webkit-scrollbar-thumb {
            background: var(--color-border);
            border-radius: 3px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .add-task-section {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .tab-btn {
                padding: 10px 15px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Daily Todo Checklist</h1>
            <div class="sync-status" id="syncStatus">Connecting...</div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('todos', event)">Tasks</button>
            <button class="tab-btn" onclick="switchTab('templates', event)">Templates</button>
            <button class="tab-btn" onclick="switchTab('reports', event)">Reports</button>
        </div>

        <!-- TASKS TAB -->
        <div id="todos" class="tab-content active">
            <div class="stats">
                <div class="stat-box">
                    <span class="value" id="completionPercent">0%</span>
                    <span class="label">Today's Progress</span>
                </div>
                <div class="stat-box">
                    <span class="value" id="completedCount">0</span>
                    <span class="label">Completed Today</span>
                </div>
                <div class="stat-box">
                    <span class="value" id="streakCount">0</span>
                    <span class="label">Day Streak</span>
                </div>
            </div>

            <div class="add-task-section">
                <input type="text" id="taskInput" placeholder="Create a task..." />
                <input type="date" id="dueDateInput" />
                <select id="prioritySelect">
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                </select>
                <button class="btn btn-primary" onclick="addTask()">Add Task</button>
            </div>

            <div class="tasks-container scrollbar" id="tasksContainer">
                <div class="empty-state">
                    <div class="empty-state-icon">🎯</div>
                    <p>No tasks yet. Create one to get started!</p>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn btn-secondary" onclick="resetToday()">Reset Today</button>
                <button class="btn btn-danger" onclick="clearAllTasks()">Clear All</button>
            </div>
        </div>

        <!-- TEMPLATES TAB -->
        <div id="templates" class="tab-content">
            <div class="template-title">📚 Study Template</div>
            <div class="templates-grid">
                <button class="template-btn" onclick="createStudyList()">📚 Study - with 5 sub-tasks</button>
            </div>

            <div class="template-title">💼 Work Template</div>
            <div class="templates-grid">
                <button class="template-btn" onclick="createWorkList()">💼 Work - with 4 sub-tasks</button>
            </div>

            <div class="template-title">💪 Health Template</div>
            <div class="templates-grid">
                <button class="template-btn" onclick="createHealthList()">💪 Health - with 5 sub-tasks</button>
            </div>

            <div style="text-align: center; margin-top: 30px; padding: 20px; background: var(--color-bg); border-radius: 8px;">
                <p style="font-size: 12px; color: var(--color-text-secondary); margin-bottom: 10px;">Click to create with sub-tasks</p>
                <button class="btn btn-secondary" onclick="switchTab('todos', event)">Go to Tasks</button>
            </div>
        </div>

        <!-- REPORTS TAB -->
        <div id="reports" class="tab-content">
            <div class="report-section">
                <h3 style="margin-bottom: 15px; color: var(--color-text);">📊 Performance Chart</h3>
                <div class="chart-container">
                    <canvas id="progressChart"></canvas>
                </div>
            </div>

            <div class="stats-grid">
                <div class="report-stat-box">
                    <div class="stat-value" id="reportTotal">0</div>
                    <div class="stat-label">Total Tasks</div>
                </div>
                <div class="report-stat-box">
                    <div class="stat-value" id="reportCompleted">0</div>
                    <div class="stat-label">Completed</div>
                </div>
                <div class="report-stat-box">
                    <div class="stat-value" id="reportPending">0</div>
                    <div class="stat-label">Pending</div>
                </div>
            </div>

            <div class="calendar-container">
                <h3 style="margin-bottom: 15px; color: var(--color-text);">📅 Last 30 Days Calendar</h3>
                <div class="calendar" id="calendarView"></div>
            </div>

            <div style="text-align: center; margin-top: 20px;">
                <button class="btn btn-secondary" onclick="switchTab('todos', event)">Go to Tasks</button>
            </div>
        </div>
    </div>

    <script>
        let tasks = [];
        let today = new Date().toDateString();
        let progressChart = null;

        const presetLists = {
            study: {
                text: '📚 Study',
                subtasks: [
                    '📖 Read Chapter 1-3',
                    '✍️ Complete Practice Problems',
                    '🧮 Review Formulas',
                    '📝 Make Quick Notes',
                    '🎓 Revise Previous Topics'
                ]
            },
            work: {
                text: '💼 Work',
                subtasks: [
                    '📧 Check & Reply Emails',
                    '📞 Team Standup Meeting',
                    '📝 Complete Project Tasks',
                    '🎯 Client Follow-up'
                ]
            },
            health: {
                text: '💪 Health',
                subtasks: [
                    '🏃 Morning Run 5km',
                    '🧘 Meditation 20 mins',
                    '💧 Drink 8 Glasses Water',
                    '🥗 Eat Healthy Meals',
                    '😴 Sleep 8 Hours'
                ]
            }
        };

        function updateSyncStatus(status) {
            const el = document.getElementById('syncStatus');
            if (status === 'synced') {
                el.textContent = '✓ Local Storage';
                el.className = 'sync-status synced';
            } else {
                el.textContent = status;
                el.className = 'sync-status';
            }
        }

        window.switchTab = function(tabName, evt) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            if (evt && evt.currentTarget) {
                evt.currentTarget.classList.add('active');
            }
            if (tabName === 'reports') {
                setTimeout(() => generateReport(), 100);
            }
        };

        function loadTasks() {
            const stored = localStorage.getItem('tasks');
            try {
                tasks = stored ? JSON.parse(stored) : [];
                tasks = tasks.map(task => ({
                    ...task,
                    dueDate: task.dueDate || null,
                    subTasks: task.subTasks || [],
                    priority: task.priority || 'medium'
                }));
            } catch (e) {
                console.error('Error loading tasks:', e);
                tasks = [];
            }
            renderTasks();
            updateSyncStatus('synced');
        }

        function saveTasks() {
            try {
                localStorage.setItem('tasks', JSON.stringify(tasks));
                updateSyncStatus('synced');
            } catch (e) {
                console.error('Error saving tasks:', e);
                updateSyncStatus('⚠️ Save Failed');
            }
        }

        function getStreakCount() {
            return parseInt(localStorage.getItem('streakCount')) || 0;
        }

        function updateStreakCounter() {
            const lastUsedKey = 'lastUsedDate';
            const streakKey = 'streakCount';
            const lastUsed = localStorage.getItem(lastUsedKey);
            let streak = parseInt(localStorage.getItem(streakKey)) || 1;

            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);

            if (lastUsed === yesterday.toDateString()) {
                streak++;
            } else if (lastUsed !== today) {
                streak = 1;
            }

            localStorage.setItem(streakKey, streak.toString());
            localStorage.setItem(lastUsedKey, today);
        }

        window.addTask = function() {
            const input = document.getElementById('taskInput');
            const priority = document.getElementById('prioritySelect').value;
            const dueDate = document.getElementById('dueDateInput').value;
            const text = input.value.trim();

            if (!text) {
                alert('Please enter a task!');
                return;
            }

            updateStreakCounter();
            tasks.push({
                id: Date.now(),
                text: text,
                completed: false,
                priority: priority,
                date: today,
                dueDate: dueDate || null,
                subTasks: []
            });

            input.value = '';
            document.getElementById('dueDateInput').value = '';
            document.getElementById('prioritySelect').value = 'medium';
            saveTasks();
            loadTasks();
            input.focus();
        };

        window.addSubtask = function(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;

            if (!task.subTasks) task.subTasks = [];
            if (task.subTasks.length >= 20) {
                alert('Maximum 20 sub-tasks per task!');
                return;
            }

            const input = prompt('Add sub-task (max 100 chars):', '');
            if (input !== null) {
                const trimmedText = input.trim();
                if (trimmedText.length === 0) {
                    alert('Sub-task cannot be empty!');
                    return;
                }
                if (trimmedText.length > 100) {
                    alert('Sub-task must be 100 characters or less!');
                    return;
                }
                task.subTasks.push({
                    id: Date.now(),
                    text: trimmedText,
                    completed: false
                });
                saveTasks();
                loadTasks();
            }
        };

        window.toggleSubtask = function(taskId, subtaskId) {
            const task = tasks.find(t => t.id === taskId);
            if (task && task.subTasks) {
                const subtask = task.subTasks.find(st => st.id === subtaskId);
                if (subtask) {
                    subtask.completed = !subtask.completed;
                    checkTaskCompletion(taskId);
                    saveTasks();
                    loadTasks();
                }
            }
        };

        window.removeSubtask = function(taskId, subtaskId) {
            const task = tasks.find(t => t.id === taskId);
            if (task && task.subTasks) {
                task.subTasks = task.subTasks.filter(st => st.id !== subtaskId);
                saveTasks();
                loadTasks();
            }
        };

        function checkTaskCompletion(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (task && task.subTasks && task.subTasks.length > 0) {
                const allCompleted = task.subTasks.every(st => st.completed);
                if (allCompleted) {
                    task.completed = true;
                } else {
                    task.completed = false;
                }
            }
        }

        function isOverdue(task) {
            if (!task.dueDate || task.completed) return false;
            const today_obj = new Date();
            today_obj.setHours(0, 0, 0, 0);
            const dueDate = new Date(task.dueDate);
            dueDate.setHours(0, 0, 0, 0);
            return dueDate < today_obj;
        }

        window.toggleTask = function(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                loadTasks();
            }
        };

        window.removeTask = function(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveTasks();
            loadTasks();
        };

        window.resetToday = function() {
            if (confirm('Reset all today\'s tasks?')) {
                tasks.forEach(t => {
                    if (t.date === today && t.completed) {
                        t.completed = false;
                        if (t.subTasks) {
                            t.subTasks.forEach(st => st.completed = false);
                        }
                    }
                });
                saveTasks();
                loadTasks();
            }
        };

        window.clearAllTasks = function() {
            if (confirm('Delete all tasks permanently?')) {
                tasks = [];
                saveTasks();
                loadTasks();
            }
        };

        function renderTasks() {
            const container = document.getElementById('tasksContainer');
            const todayTasks = tasks.filter(t => t.date === today);
            const completedToday = todayTasks.filter(t => t.completed).length;
            const percentToday = todayTasks.length > 0 ? Math.round((completedToday / todayTasks.length) * 100) : 0;

            document.getElementById('completionPercent').textContent = percentToday + '%';
            document.getElementById('completedCount').textContent = completedToday + '/' + todayTasks.length;
            document.getElementById('streakCount').textContent = getStreakCount();

            if (todayTasks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🎯</div>
                        <p>No tasks yet. Create one to get started!</p>
                    </div>
                `;
                return;
            }

            const priorityOrder = { high: 0, medium: 1, low: 2 };
            const sortedTasks = [...todayTasks].sort((a, b) => priorityOrder[a.priority] - priorityOrder[b.priority]);

            container.innerHTML = sortedTasks.map(task => {
                const hasSubTasks = task.subTasks && task.subTasks.length > 0;
                const overdue = isOverdue(task);
                const completedSubTasks = task.subTasks ? task.subTasks.filter(st => st.completed).length : 0;
                const totalSubTasks = task.subTasks ? task.subTasks.length : 0;
                const progressText = hasSubTasks ? ` (${completedSubTasks}/${totalSubTasks})` : '';
                const priorityColor = `priority-${task.priority}`;

                return `
                <div class="task-item ${task.completed ? 'completed' : ''} ${overdue ? 'overdue' : ''}">
                    <div class="task-header">
                        <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''} onchange="window.toggleTask(${task.id})" />
                        <div class="task-content">
                            <div class="task-text">${escapeHtml(task.text)}${progressText}</div>
                        </div>
                        <button class="task-remove" onclick="window.removeTask(${task.id})">✕</button>
                    </div>

                    <div class="task-meta">
                        <div class="priority-badge ${priorityColor}">
                            ${task.priority.toUpperCase()}
                        </div>
                        ${task.dueDate ? `<div class="task-duedate">📅 ${new Date(task.dueDate).toLocaleDateString('en-IN')}</div>` : ''}
                    </div>

                    ${hasSubTasks ? `
                        <div class="subtasks-list">
                            ${task.subTasks.map(st => `
                                <div class="subtask-item ${st.completed ? 'completed' : ''}">
                                    <input type="checkbox" class="subtask-checkbox" ${st.completed ? 'checked' : ''} onchange="window.toggleSubtask(${task.id}, ${st.id})" />
                                    <div class="subtask-text">${escapeHtml(st.text)}</div>
                                    <button class="subtask-remove" onclick="window.removeSubtask(${task.id}, ${st.id})">✕</button>
                                </div>
                            `).join('')}
                            <button class="add-subtask-btn" onclick="window.addSubtask(${task.id})">+ Add Sub-task</button>
                        </div>
                    ` : `
                        <button class="add-subtask-btn" onclick="window.addSubtask(${task.id})">+ Add Sub-task</button>
                    `}
                </div>
                `;
            }).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        window.createStudyList = function() {
            const preset = presetLists.study;
            updateStreakCounter();
            tasks.push({
                id: Date.now(),
                text: preset.text,
                completed: false,
                priority: 'high',
                date: today,
                dueDate: null,
                subTasks: preset.subtasks.map((st, idx) => ({
                    id: Date.now() + idx,
                    text: st,
                    completed: false
                }))
            });
            saveTasks();
            loadTasks();
            switchTab('todos', { currentTarget: document.querySelectorAll('.tab-btn')[0] });
        };

        window.createWorkList = function() {
            const preset = presetLists.work;
            updateStreakCounter();
            tasks.push({
                id: Date.now(),
                text: preset.text,
                completed: false,
                priority: 'high',
                date: today,
                dueDate: null,
                subTasks: preset.subtasks.map((st, idx) => ({
                    id: Date.now() + idx,
                    text: st,
                    completed: false
                }))
            });
            saveTasks();
            loadTasks();
            switchTab('todos', { currentTarget: document.querySelectorAll('.tab-btn')[0] });
        };

        window.createHealthList = function() {
            const preset = presetLists.health;
            updateStreakCounter();
            tasks.push({
                id: Date.now(),
                text: preset.text,
                completed: false,
                priority: 'medium',
                date: today,

                }))
            });

        };

        function generateReport() {
            const allTasks = tasks;
            const totalTasks = allTasks.length;
            const completedTasks = allTasks.filter(t => t.completed).length;
            const pendingTasks = totalTasks - completedTasks;

            document.getElementById('reportTotal').textContent = totalTasks;
            document.getElementById('reportCompleted').textContent = completedTasks;
            document.getElementById('reportPending').textContent = pendingTasks;

            generateCalendar();
            generateChart();
        }

        function generateCalendar() {
            const calendarDiv = document.getElementById('calendarView');
            calendarDiv.innerHTML = '';

            const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            dayNames.forEach(day => {
                const header = document.createElement('div');
                header.className = 'calendar-day header';
                header.textContent = day;
                calendarDiv.appendChild(header);
            });

            let currentDate = new Date();
            currentDate.setDate(currentDate.getDate() - 29);

            for (let i = 0; i < 30; i++) {
                const dateStr = currentDate.toDateString();
                const dayTasks = tasks.filter(t => t.date === dateStr);
                const completed = dayTasks.filter(t => t.completed).length;
                const percent = dayTasks.length > 0 ? Math.round((completed / dayTasks.length) * 100) : 0;

                const dayDiv = document.createElement('div');
                dayDiv.className = `calendar-day progress-${percent > 0 ? (percent === 100 ? 100 : 50) : 0}`;
                dayDiv.innerHTML = `<strong>${currentDate.getDate()}</strong><small>${percent}%</small>`;
                calendarDiv.appendChild(dayDiv);

                currentDate.setDate(currentDate.getDate() + 1);
            }
        }

        function generateChart() {
            const chartCanvas = document.getElementById('progressChart');

            let currentDate = new Date();
            currentDate.setDate(currentDate.getDate() - 9);

            const labels = [];
            const completedData = [];
            const totalData = [];

            for (let i = 0; i < 10; i++) {
                const dateStr = currentDate.toDateString();
                const dayTasks = tasks.filter(t => t.date === dateStr);
                const completed = dayTasks.filter(t => t.completed).length;

                labels.push(currentDate.toLocaleDateString('en-IN', { month: 'short', day: 'numeric' }));
                completedData.push(completed);
                totalData.push(dayTasks.length);

                currentDate.setDate(currentDate.getDate() + 1);
            }

            if (progressChart) {
                progressChart.destroy();
            }

            progressChart = new Chart(chartCanvas, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Completed',
                            data: completedData,
                            backgroundColor: 'rgba(76, 175, 80, 0.7)',
                            borderColor: '#4caf50',
                            borderWidth: 1
                        },
                        {
                            label: 'Total',
                            data: totalData,
                            backgroundColor: 'rgba(224, 224, 224, 0.5)',
                            borderColor: '#ccc',
                            borderWidth: 1
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'top' }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { stepSize: 1 }
                        }
                    }
                }
            });
        }

        document.getElementById('taskInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addTask();
            }
        });

        loadTasks();
        updateStreakCounter();

        setInterval(() => {
            const newToday = new Date().toDateString();
            if (newToday !== today) {
                today = newToday;
                loadTasks();
                updateStreakCounter();
            }
        }, 60000);
    </script>
</body>
