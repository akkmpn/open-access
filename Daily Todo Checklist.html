<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Todo Checklist</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        :root {
            --color-primary: #208084;
            --color-primary-hover: #186c71;
            --color-bg: #f5f5f5;
            --color-surface: #ffffff;
            --color-text: #1a1a1a;
            --color-text-secondary: #666;
            --color-border: #e0e0e0;
            --color-success: #4caf50;
            --color-warning: #ff9800;
            --color-error: #f44336;
            --color-high: #f44336;
            --color-medium: #ff9800;
            --color-low: #4caf50;
            --color-overdue: #ff6b6b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            background: var(--color-surface);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 700px;
            width: 100%;
            padding: 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: var(--color-text);
            font-size: 28px;
            margin-bottom: 15px;
        }

        .sync-status {
            font-size: 11px;
            color: #666;
            text-align: center;
            margin-top: 10px;
        }

        .sync-status.synced {
            color: #4caf50;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--color-border);
        }

        .tab-btn {
            padding: 12px 20px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: var(--color-text-secondary);
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
            margin-bottom: -2px;
        }

        .tab-btn.active {
            color: var(--color-primary);
            border-bottom-color: var(--color-primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-box .value {
            font-size: 24px;
            font-weight: bold;
            display: block;
        }

        .stat-box .label {
            font-size: 12px;
            margin-top: 5px;
            opacity: 0.9;
        }

        .add-task-section {
            display: grid;
            grid-template-columns: 1fr 120px 80px;
            gap: 10px;
            margin-bottom: 25px;
        }

        input[type="text"],
        input[type="date"] {
            padding: 12px;
            border: 2px solid var(--color-border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="date"]:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(32, 128, 132, 0.1);
        }

        select {
            padding: 12px;
            border: 2px solid var(--color-border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            background-color: var(--color-surface);
            cursor: pointer;
            transition: border-color 0.3s;
        }

        select:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--color-primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--color-primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(32, 128, 132, 0.3);
        }

        .btn-secondary {
            background: var(--color-border);
            color: var(--color-text);
            padding: 8px 16px;
            font-size: 12px;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .btn-danger {
            background: var(--color-error);
            color: white;
            padding: 8px 16px;
            font-size: 12px;
        }

        .btn-danger:hover {
            background: #d32f2f;
        }

        .tasks-container {
            max-height: 500px;
            overflow-y: auto;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: var(--color-bg);
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid var(--color-border);
        }

        .task-item.completed {
            opacity: 0.6;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: var(--color-text-secondary);
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            margin-right: 15px;
            cursor: pointer;
            accent-color: var(--color-primary);
        }

        .task-content {
            flex: 1;
        }

        .task-text {
            font-size: 14px;
            color: var(--color-text);
            margin-bottom: 5px;
            font-weight: 500;
        }

        .task-remove {
            background: transparent;
            border: none;
            color: var(--color-error);
            cursor: pointer;
            font-size: 16px;
            padding: 5px 10px;
            border-radius: 4px;
        }

        .task-remove:hover {
            background: rgba(244, 67, 54, 0.1);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--color-text-secondary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .action-buttons button {
            flex: 1;
        }

        .scrollbar {
            scrollbar-width: thin;
            scrollbar-color: var(--color-border) transparent;
        }

        .scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .scrollbar::-webkit-scrollbar-thumb {
            background: var(--color-border);
            border-radius: 3px;
        }

        /* Report Styles */
        .report-filters {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 10px;
            margin-bottom: 25px;
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin-bottom: 30px;
            background: var(--color-bg);
            padding: 20px;
            border-radius: 8px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .report-stat-box {
            background: var(--color-bg);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border-left: 4px solid var(--color-primary);
        }

        .report-stat-box.completed {
            border-left-color: var(--color-success);
        }

        .report-stat-box.pending {
            border-left-color: var(--color-warning);
        }

        .report-stat-box .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: var(--color-text);
            margin-bottom: 5px;
        }

        .report-stat-box .stat-label {
            font-size: 12px;
            color: var(--color-text-secondary);
            text-transform: uppercase;
        }

        .calendar-container {
            background: var(--color-bg);
            padding: 20px;
            border-radius: 8px;
        }

        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: white;
            border: 1px solid var(--color-border);
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .calendar-day:hover {
            transform: scale(1.05);
        }

        .calendar-day.header {
            font-weight: bold;
            background: var(--color-primary);
            color: white;
            cursor: default;
        }

        .calendar-day.progress-0 {
            background: rgba(244, 67, 54, 0.1);
            color: var(--color-error);
        }

        .calendar-day.progress-50 {
            background: rgba(255, 152, 0, 0.1);
            color: var(--color-warning);
        }

        .calendar-day.progress-100 {
            background: rgba(76, 175, 80, 0.1);
            color: var(--color-success);
        }

        .calendar-day .date {
            font-weight: 600;
        }

        .calendar-day .percent {
            font-size: 11px;
        }

        .progress-details {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--color-border);
        }

        .progress-row {
            display: grid;
            grid-template-columns: 1fr 100px 100px;
            gap: 15px;
            padding: 10px 0;
            border-bottom: 1px solid var(--color-border);
            align-items: center;
        }

        .progress-row:last-child {
            border-bottom: none;
        }

        .progress-row-date {
            font-weight: 500;
            color: var(--color-text);
        }

        .progress-row-stats {
            text-align: center;
            font-size: 13px;
            color: var(--color-text-secondary);
        }

        .progress-bar {
            background: var(--color-border);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background: var(--color-primary);
            height: 100%;
            transition: width 0.3s;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .add-task-section {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .report-filters {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Daily Todo Checklist</h1>
            <div class="sync-status" id="syncStatus">Connecting to cloud...</div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('todos')">Tasks</button>
            <button class="tab-btn" onclick="switchTab('reports')">Reports</button>
        </div>

        <!-- TASKS TAB -->
        <div id="todos" class="tab-content active">
            <div class="stats">
                <div class="stat-box">
                    <span class="value" id="completionPercent">0%</span>
                    <span class="label">Today's Progress</span>
                </div>
                <div class="stat-box">
                    <span class="value" id="completedCount">0</span>
                    <span class="label">Completed Today</span>
                </div>
                <div class="stat-box">
                    <span class="value" id="streakCount">0</span>
                    <span class="label">Day Streak</span>
                </div>
            </div>

            <div class="add-task-section">
                <input type="text" id="taskInput" placeholder="What do you want to accomplish today?" />
                <select id="prioritySelect">
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                </select>
                <button class="btn btn-primary" onclick="addTask()">Add Task</button>
            </div>

            <div class="tasks-container scrollbar" id="tasksContainer">
                <div class="empty-state">
                    <div class="empty-state-icon">🎯</div>
                    <p>No tasks yet. Add one to get started!</p>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn btn-secondary" onclick="resetToday()">Reset Today</button>
                <button class="btn btn-danger" onclick="clearAllTasks()">Clear All</button>
            </div>
        </div>

        <!-- REPORTS TAB -->
        <div id="reports" class="tab-content">
            <div class="report-filters">
                <input type="date" id="filterFromDate" onchange="updateReport()">
                <input type="date" id="filterToDate" onchange="updateReport()">
                <button class="btn btn-primary" onclick="generateReport()">Generate</button>
            </div>

            <div class="chart-container">
                <canvas id="progressChart"></canvas>
            </div>

            <div class="stats-grid">
                <div class="report-stat-box">
                    <div class="stat-value" id="reportTotal">0</div>
                    <div class="stat-label">Total Tasks</div>
                </div>
                <div class="report-stat-box completed">
                    <div class="stat-value" id="reportCompleted">0</div>
                    <div class="stat-label">Completed</div>
                </div>
                <div class="report-stat-box pending">
                    <div class="stat-value" id="reportPending">0</div>
                    <div class="stat-label">Pending</div>
                </div>
            </div>

            <div class="calendar-container">
                <h3 style="margin-bottom: 15px; color: var(--color-text);">Last 30 Days Calendar</h3>
                <div class="calendar" id="calendarView"></div>
            </div>

            <div style="margin-top: 25px;">
                <h3 style="margin-bottom: 15px; color: var(--color-text);">Daily Progress</h3>
                <div class="progress-details" id="progressDetails"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, getDocs } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCoCFw0hezldX3t33AYa1ytddYMuQCWliM",
            authDomain: "daily-todo-1e4ad.firebaseapp.com",
            projectId: "daily-todo-1e4ad",
            storageBucket: "daily-todo-1e4ad.firebasestorage.app",
            messagingSenderId: "629797690976",
            appId: "1:629797690976:web:fda66df1691eb920e12d05",
            measurementId: "G-KG0NGWBFCW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let tasks = [];
        let today = new Date().toDateString();
        let progressChart = null;

        function updateSyncStatus(status) {
            const el = document.getElementById('syncStatus');
            if (status === 'synced') {
                el.textContent = '✓ Synced';
                el.className = 'sync-status synced';
            } else if (status === 'syncing') {
                el.textContent = 'Syncing...';
                el.className = 'sync-status';
            } else {
                el.textContent = 'Error: ' + status;
                el.className = 'sync-status';
            }
        }

        window.switchTab = function(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
            
            if (tabName === 'reports') {
                setTimeout(() => generateReport(), 100);
            }
        };

        async function loadTasksFromFirestore() {
            try {
                updateSyncStatus('syncing');
                const snapshot = await getDocs(collection(db, 'tasks'));
                tasks = [];
                snapshot.forEach(doc => {
                    tasks.push({ id: doc.id, ...doc.data() });
                });
                tasks.sort((a, b) => {
                    const aIsToday = a.date === today ? 0 : 1;
                    const bIsToday = b.date === today ? 0 : 1;
                    if (aIsToday !== bIsToday) return aIsToday - bIsToday;
                    return new Date(b.date) - new Date(a.date);
                });
                renderTasks();
                updateSyncStatus('synced');
            } catch (error) {
                console.error('Error loading tasks:', error);
                updateSyncStatus(error.message);
            }
        }

        function getStreakCount() {
            return parseInt(localStorage.getItem('streakCount')) || 0;
        }

        async function updateStreakCounter() {
            try {
                const lastUsedKey = 'lastUsedDate';
                const streakKey = 'streakCount';
                const lastUsed = localStorage.getItem(lastUsedKey);
                let streak = parseInt(localStorage.getItem(streakKey)) || 1;

                const yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);

                if (lastUsed === yesterday.toDateString()) {
                    streak++;
                } else if (lastUsed !== today) {
                    streak = 1;
                }

                localStorage.setItem(streakKey, streak.toString());
                localStorage.setItem(lastUsedKey, today);
            } catch (error) {
                console.error('Error updating streak:', error);
            }
        }

        window.addTask = async function() {
            const input = document.getElementById('taskInput');
            const priority = document.getElementById('prioritySelect').value;
            const text = input.value.trim();

            if (!text) {
                alert('Please enter a task!');
                return;
            }

            try {
                updateSyncStatus('syncing');
                await updateStreakCounter();
                await addDoc(collection(db, 'tasks'), {
                    text: text,
                    completed: false,
                    priority: priority,
                    date: today,
                    createdAt: new Date().toISOString()
                });
                input.value = '';
                await loadTasksFromFirestore();
                input.focus();
            } catch (error) {
                console.error('Error adding task:', error);
                updateSyncStatus(error.message);
            }
        };

        window.toggleTask = async function(id) {
            try {
                updateSyncStatus('syncing');
                const task = tasks.find(t => t.id === id);
                if (task) {
                    await updateDoc(doc(db, 'tasks', id), {
                        completed: !task.completed
                    });
                    await loadTasksFromFirestore();
                }
            } catch (error) {
                console.error('Error toggling task:', error);
                updateSyncStatus(error.message);
            }
        };

        window.removeTask = async function(id) {
            try {
                updateSyncStatus('syncing');
                await deleteDoc(doc(db, 'tasks', id));
                await loadTasksFromFirestore();
            } catch (error) {
                console.error('Error removing task:', error);
                updateSyncStatus(error.message);
            }
        };

        window.resetToday = async function() {
            if (confirm('Reset all today\'s tasks?')) {
                try {
                    updateSyncStatus('syncing');
                    for (let task of tasks) {
                        if (task.date === today && task.completed) {
                            await updateDoc(doc(db, 'tasks', task.id), {
                                completed: false
                            });
                        }
                    }
                    await loadTasksFromFirestore();
                } catch (error) {
                    console.error('Error resetting tasks:', error);
                    updateSyncStatus(error.message);
                }
            }
        };

        window.clearAllTasks = async function() {
            if (confirm('Delete all tasks permanently?')) {
                try {
                    updateSyncStatus('syncing');
                    for (let task of tasks) {
                        await deleteDoc(doc(db, 'tasks', task.id));
                    }
                    tasks = [];
                    renderTasks();
                    updateSyncStatus('synced');
                } catch (error) {
                    console.error('Error clearing tasks:', error);
                    updateSyncStatus(error.message);
                }
            }
        };

        function renderTasks() {
            const container = document.getElementById('tasksContainer');
            const todayTasks = tasks.filter(t => t.date === today);
            const completedToday = todayTasks.filter(t => t.completed).length;
            const percentToday = todayTasks.length > 0 ? Math.round((completedToday / todayTasks.length) * 100) : 0;

            document.getElementById('completionPercent').textContent = percentToday + '%';
            document.getElementById('completedCount').textContent = completedToday + '/' + todayTasks.length;
            document.getElementById('streakCount').textContent = getStreakCount();

            if (todayTasks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🎯</div>
                        <p>No tasks yet. Add one to get started!</p>
                    </div>
                `;
                return;
            }

            const priorityOrder = { high: 0, medium: 1, low: 2 };
            const sortedTasks = [...todayTasks].sort((a, b) => priorityOrder[a.priority] - priorityOrder[b.priority]);

            container.innerHTML = sortedTasks.map(task => `
                <div class="task-item ${task.completed ? 'completed' : ''}">
                    <input 
                        type="checkbox" 
                        class="task-checkbox" 
                        ${task.completed ? 'checked' : ''} 
                        onchange="window.toggleTask('${task.id}')"
                    />
                    <div class="task-content">
                        <div class="task-text">${escapeHtml(task.text)}</div>
                    </div>
                    <button class="task-remove" onclick="window.removeTask('${task.id}')">✕</button>
                </div>
            `).join('');
        }

        window.generateReport = function() {
            const fromDate = document.getElementById('filterFromDate').value;
            const toDate = document.getElementById('filterToDate').value;

            let startDate = fromDate ? new Date(fromDate) : new Date(new Date().setDate(new Date().getDate() - 30));
            let endDate = toDate ? new Date(toDate) : new Date();

            const filteredTasks = tasks.filter(t => {
                const taskDate = new Date(t.date);
                return taskDate >= startDate && taskDate <= endDate;
            });

            const totalTasks = filteredTasks.length;
            const completedTasks = filteredTasks.filter(t => t.completed).length;
            const pendingTasks = totalTasks - completedTasks;

            document.getElementById('reportTotal').textContent = totalTasks;
            document.getElementById('reportCompleted').textContent = completedTasks;
            document.getElementById('reportPending').textContent = pendingTasks;

            generateCalendar(startDate, endDate);
            generateChart(startDate, endDate);
            generateProgressDetails(startDate, endDate);
        };

        function generateCalendar(startDate, endDate) {
            const calendarDiv = document.getElementById('calendarView');
            calendarDiv.innerHTML = '';

            const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            dayNames.forEach(day => {
                const header = document.createElement('div');
                header.className = 'calendar-day header';
                header.textContent = day;
                calendarDiv.appendChild(header);
            });

            let currentDate = new Date(startDate);
            while (currentDate <= endDate) {
                const dateStr = currentDate.toDateString();
                const dayTasks = tasks.filter(t => t.date === dateStr);
                const completed = dayTasks.filter(t => t.completed).length;
                const percent = dayTasks.length > 0 ? Math.round((completed / dayTasks.length) * 100) : 0;

                const dayDiv = document.createElement('div');
                dayDiv.className = `calendar-day progress-${percent > 0 ? (percent === 100 ? 100 : 50) : 0}`;
                dayDiv.innerHTML = `
                    <span class="date">${currentDate.getDate()}</span>
                    <span class="percent">${percent}%</span>
                `;
                calendarDiv.appendChild(dayDiv);

                currentDate.setDate(currentDate.getDate() + 1);
            }
        }

        function generateChart(startDate, endDate) {
            const chartCanvas = document.getElementById('progressChart');
            
            const dateMap = {};
            let currentDate = new Date(startDate);
            while (currentDate <= endDate) {
                const dateStr = currentDate.toDateString();
                const dayTasks = tasks.filter(t => t.date === dateStr);
                const completed = dayTasks.filter(t => t.completed).length;
                dateMap[dateStr] = { completed, total: dayTasks.length };
                currentDate.setDate(currentDate.getDate() + 1);
            }

            const labels = Object.keys(dateMap).map(d => new Date(d).toLocaleDateString('en-IN', { month: 'short', day: 'numeric' }));
            const completedData = Object.values(dateMap).map(d => d.completed);
            const totalData = Object.values(dateMap).map(d => d.total);

            if (progressChart) {
                progressChart.destroy();
            }

            progressChart = new Chart(chartCanvas, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Completed',
                            data: completedData,
                            backgroundColor: 'rgba(76, 175, 80, 0.7)',
                            borderColor: '#4caf50',
                            borderWidth: 1
                        },
                        {
                            label: 'Total',
                            data: totalData,
                            backgroundColor: 'rgba(224, 224, 224, 0.5)',
                            borderColor: '#ccc',
                            borderWidth: 1
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'top' }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { stepSize: 1 }
                        }
                    }
                }
            });
        }

        function generateProgressDetails(startDate, endDate) {
            const detailsDiv = document.getElementById('progressDetails');
            let html = '';

            let currentDate = new Date(startDate);
            const rows = [];
            while (currentDate <= endDate) {
                const dateStr = currentDate.toDateString();
                const dayTasks = tasks.filter(t => t.date === dateStr);
                const completed = dayTasks.filter(t => t.completed).length;
                const percent = dayTasks.length > 0 ? Math.round((completed / dayTasks.length) * 100) : 0;

                rows.push({ dateStr, completed, total: dayTasks.length, percent });
                currentDate.setDate(currentDate.getDate() + 1);
            }

            rows.reverse().forEach(row => {
                html += `
                    <div class="progress-row">
                        <div class="progress-row-date">${new Date(row.dateStr).toLocaleDateString('en-IN')}</div>
                        <div class="progress-row-stats">${row.completed}/${row.total}</div>
                        <div style="flex: 1;">
                            <div class="progress-bar">
                                <div class="progress-bar-fill" style="width: ${row.percent}%"></div>
                            </div>
                        </div>
                    </div>
                `;
            });

            detailsDiv.innerHTML = html;
        }

        window.updateReport = function() {
            generateReport();
        };

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('taskInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addTask();
            }
        });

        const today_date = new Date();
        const thirtyDaysAgo = new Date(today_date.setDate(today_date.getDate() - 30));
        document.getElementById('filterFromDate').valueAsDate = thirtyDaysAgo;
        document.getElementById('filterToDate').valueAsDate = new Date();

        loadTasksFromFirestore();
        updateStreakCounter();

        setInterval(() => {
            const newToday = new Date().toDateString();
            if (newToday !== today) {
                today = newToday;
                loadTasksFromFirestore();
                updateStreakCounter();
            }
        }, 60000);
    </script>
</body>
</html>
