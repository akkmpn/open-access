<!DOCTYPE html>
<html lang="en">
<head> 
  <meta charset="UTF-8"><br> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0"><br> 
  <title>Daily Todo Checklist with Templates</title><br> 
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script><br> 
  <style><br> 
  :root {<br> 
    --color-primary: #208084;<br> 
    --color-primary-hover: #186c71;<br> 
    --color-bg: #f5f5f5;<br> 
    --color-surface: #ffffff;<br> 
    --color-text: #1a1a1a;<br> 
    --color-text-secondary: #666;<br> 
    --color-border: #e0e0e0;<br> 
    --color-success: #4caf50;<br> 
    --color-warning: #ff9800;<br> 
    --color-error: #f44336;<br> 
  }<br> 
  * {<br> 
    margin: 0;<br> 
    padding: 0;<br> 
    box-sizing: border-box;<br> 
  }<br> 
  body {<br> 
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;<br> 
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);<br> 
    min-height: 100vh;<br> 
    padding: 20px;<br> 
    display: flex;<br> 
    justify-content: center;<br> 
    align-items: flex-start;<br> 
  }<br> 
  .container {<br> 
    background: var(--color-surface);<br> 
    border-radius: 12px;<br> 
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);<br> 
    max-width: 700px;<br> 
    width: 100%;<br> 
    padding: 30px;<br> 
  }<br> 
  .header {<br> 
    text-align: center;<br> 
    margin-bottom: 20px;<br> 
  }<br> 
  .header h1 {<br> 
    color: var(--color-text);<br> 
    font-size: 28px;<br> 
    margin-bottom: 15px;<br> 
  }<br> 
  .sync-status {<br> 
    font-size: 11px;<br> 
    color: #666;<br> 
    text-align: center;<br> 
    margin-top: 10px;<br> 
  }<br> 
  .sync-status.synced {<br> 
    color: #4caf50;<br> 
  }<br> 
  .tabs {<br> 
    display: flex;<br> 
    gap: 10px;<br> 
    margin-bottom: 20px;<br> 
    border-bottom: 2px solid var(--color-border);<br> 
    overflow-x: auto;<br> 
  }<br> 
  .tab-btn {<br> 
    padding: 12px 20px;<br> 
    background: transparent;<br> 
    border: none;<br> 
    cursor: pointer;<br> 
    font-size: 14px;<br> 
    font-weight: 600;<br> 
    color: var(--color-text-secondary);<br> 
    border-bottom: 3px solid transparent;<br> 
    transition: all 0.3s;<br> 
    margin-bottom: -2px;<br> 
    white-space: nowrap;<br> 
  }<br> 
  .tab-btn:hover {<br> 
    color: var(--color-primary);<br> 
  }<br> 
  .tab-btn.active {<br> 
    color: var(--color-primary);<br> 
    border-bottom-color: var(--color-primary);<br> 
  }<br> 
  .tab-content {<br> 
    display: none;<br> 
  }<br> 
  .tab-content.active {<br> 
    display: block;<br> 
  }<br> 
  .stats {<br> 
    display: grid;<br> 
    grid-template-columns: 1fr 1fr 1fr;<br> 
    gap: 15px;<br> 
    margin-bottom: 25px;<br> 
  }<br> 
  .stat-box {<br> 
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);<br> 
    color: white;<br> 
    padding: 15px;<br> 
    border-radius: 10px;<br> 
    text-align: center;<br> 
  }<br> 
  .stat-box .value {<br> 
    font-size: 24px;<br> 
    font-weight: bold;<br> 
    display: block;<br> 
  }<br> 
  .stat-box .label {<br> 
    font-size: 12px;<br> 
    margin-top: 5px;<br> 
    opacity: 0.9;<br> 
  }<br> 
  input[type="text"],<br> 
  input[type="date"] {<br> 
    padding: 12px;<br> 
    border: 2px solid var(--color-border);<br> 
    border-radius: 8px;<br> 
    font-size: 14px;<br> 
    font-family: inherit;<br> 
    transition: border-color 0.3s;<br> 
  }<br> 
  input[type="text"]:focus,<br> 
  input[type="date"]:focus {<br> 
    outline: none;<br> 
    border-color: var(--color-primary);<br> 
    box-shadow: 0 0 0 3px rgba(32, 128, 132, 0.1);<br> 
  }<br> 
  select {<br> 
    padding: 12px;<br> 
    border: 2px solid var(--color-border);<br> 
    border-radius: 8px;<br> 
    font-size: 14px;<br> 
    font-family: inherit;<br> 
    background-color: var(--color-surface);<br> 
    cursor: pointer;<br> 
    transition: border-color 0.3s;<br> 
  }<br> 
  select:focus {<br> 
    outline: none;<br> 
    border-color: var(--color-primary);<br> 
  }<br> 
  .btn {<br> 
    padding: 12px 20px;<br> 
    border: none;<br> 
    border-radius: 8px;<br> 
    font-size: 14px;<br> 
    font-weight: 600;<br> 
    cursor: pointer;<br> 
    transition: all 0.3s;<br> 
  }<br> 
  .btn:hover {<br> 
    transform: translateY(-2px);<br> 
  }<br> 
  .btn-primary {<br> 
    background: var(--color-primary);<br> 
    color: white;<br> 
  }<br> 
  .btn-primary:hover {<br> 
    background: var(--color-primary-hover);<br> 
    box-shadow: 0 5px 15px rgba(32, 128, 132, 0.3);<br> 
  }<br> 
  .btn-secondary {<br> 
    background: var(--color-border);<br> 
    color: var(--color-text);<br> 
    padding: 8px 16px;<br> 
    font-size: 12px;<br> 
  }<br> 
  .btn-secondary:hover {<br> 
    background: #d0d0d0;<br> 
  }<br> 
  .btn-danger {<br> 
    background: var(--color-error);<br> 
    color: white;<br> 
    padding: 8px 16px;<br> 
    font-size: 12px;<br> 
  }<br> 
  .btn-danger:hover {<br> 
    background: #d32f2f;<br> 
  }<br> 
  .add-task-section {<br> 
    display: grid;<br> 
    grid-template-columns: 1fr 100px 120px 80px;<br> 
    gap: 10px;<br> 
    margin-bottom: 15px;<br> 
  }<br> 
  .templates-section {<br> 
    margin-bottom: 20px;<br> 
  }<br> 
  .template-title {<br> 
    font-size: 12px;<br> 
    font-weight: 600;<br> 
    color: var(--color-text-secondary);<br> 
    margin-bottom: 8px;<br> 
    text-transform: uppercase;<br> 
  }<br> 
  .templates-grid {<br> 
    display: grid;<br> 
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));<br> 
    gap: 8px;<br> 
    margin-bottom: 15px;<br> 
  }<br> 
  .template-btn {<br> 
    background: var(--color-bg);<br> 
    border: 1px solid var(--color-border);<br> 
    padding: 8px 12px;<br> 
    border-radius: 6px;<br> 
    font-size: 12px;<br> 
    cursor: pointer;<br> 
    transition: all 0.2s;<br> 
    text-align: left;<br> 
  }<br> 
  .template-btn:hover {<br> 
    background: #f0f0f0;<br> 
    border-color: var(--color-primary);<br> 
  }<br> 
  .tasks-container {<br> 
    max-height: 400px;<br> 
    overflow-y: auto;<br> 
    margin-bottom: 15px;<br> 
  }<br> 
  .task-item {<br> 
    display: flex;<br> 
    align-items: flex-start;<br> 
    padding: 12px;<br> 
    background: var(--color-bg);<br> 
    border-radius: 8px;<br> 
    margin-bottom: 8px;<br> 
    border-left: 4px solid var(--color-border);<br> 
    flex-direction: column;<br> 
  }<br> 
  .task-item.completed {<br> 
    opacity: 0.6;<br> 
  }<br> 
  .task-item.completed .task-text {<br> 
    text-decoration: line-through;<br> 
    color: var(--color-text-secondary);<br> 
  }<br> 
  .task-item.overdue {<br> 
    border-left-color: var(--color-error);<br> 
    background: rgba(244, 67, 54, 0.08);<br> 
  }<br> 
  .task-item.overdue .task-text {<br> 
    color: var(--color-error);<br> 
    font-weight: 600;<br> 
  }<br> 
  .task-header {<br> 
    display: flex;<br> 
    align-items: center;<br> 
    gap: 10px;<br> 
    width: 100%;<br> 
  }<br> 
  .task-checkbox {<br> 
    width: 20px;<br> 
    height: 20px;<br> 
    cursor: pointer;<br> 
    accent-color: var(--color-primary);<br> 
    flex-shrink: 0;<br> 
  }<br> 
  .task-content {<br> 
    flex: 1;<br> 
  }<br> 
  .task-text {<br> 
    font-size: 14px;<br> 
    color: var(--color-text);<br> 
    font-weight: 500;<br> 
  }<br> 
  .task-duedate {<br> 
    font-size: 11px;<br> 
    color: var(--color-text-secondary);<br> 
    margin-top: 4px;<br> 
  }<br> 
  .task-remove {<br> 
    background: transparent;<br> 
    border: none;<br> 
    color: var(--color-error);<br> 
    cursor: pointer;<br> 
    font-size: 16px;<br> 
    padding: 5px 10px;<br> 
    border-radius: 4px;<br> 
  }<br> 
  .task-remove:hover {<br> 
    background: rgba(244, 67, 54, 0.1);<br> 
  }<br> 
  .subtasks-list {<br> 
    margin-left: 0;<br> 
    margin-top: 12px;<br> 
    width: 100%;<br> 
    background: rgba(32, 128, 132, 0.04);<br> 
    border-radius: 6px;<br> 
    padding: 10px;<br> 
    border: 1px solid rgba(32, 128, 132, 0.1);<br> 
  }<br> 
  .subtask-item {<br> 
    display: flex;<br> 
    align-items: center;<br> 
    padding: 8px;<br> 
    background: transparent;<br> 
    border-radius: 6px;<br> 
    margin-bottom: 6px;<br> 
    font-size: 13px;<br> 
    gap: 8px;<br> 
  }<br> 
  .subtask-item:last-child {<br> 
    margin-bottom: 0;<br> 
  }<br> 
  .subtask-item.completed {<br> 
    opacity: 0.6;<br> 
  }<br> 
  .subtask-item.completed .subtask-text {<br> 
    text-decoration: line-through;<br> 
    color: var(--color-text-secondary);<br> 
  }<br> 
  .subtask-checkbox {<br> 
    width: 16px;<br> 
    height: 16px;<br> 
    cursor: pointer;<br> 
    accent-color: var(--color-primary);<br> 
    flex-shrink: 0;<br> 
  }<br> 
  .subtask-text {<br> 
    flex: 1;<br> 
    color: var(--color-text);<br> 
  }<br> 
  .subtask-remove {<br> 
    background: none;<br> 
    border: none;<br> 
    color: var(--color-error);<br> 
    cursor: pointer;<br> 
    font-size: 14px;<br> 
    padding: 0 5px;<br> 
  }<br> 
  .add-subtask-btn {<br> 
    background: rgba(32, 128, 132, 0.1);<br> 
    border: 1px dashed var(--color-primary);<br> 
    color: var(--color-primary);<br> 
    padding: 6px 12px;<br> 
    border-radius: 6px;<br> 
    font-size: 12px;<br> 
    cursor: pointer;<br> 
    margin-top: 6px;<br> 
    width: 100%;<br> 
  }<br> 
  .add-subtask-btn:hover {<br> 
    background: rgba(32, 128, 132, 0.15);<br> 
  }<br> 
  .empty-state {<br> 
    text-align: center;<br> 
    padding: 30px 20px;<br> 
    color: var(--color-text-secondary);<br> 
  }<br> 
  .empty-state-icon {<br> 
    font-size: 48px;<br> 
    margin-bottom: 15px;<br> 
  }<br> 
  .action-buttons {<br> 
    display: flex;<br> 
    gap: 10px;<br> 
    margin-top: 15px;<br> 
  }<br> 
  .action-buttons button {<br> 
    flex: 1;<br> 
  }<br> 
  .scrollbar {<br> 
    scrollbar-width: thin;<br> 
    scrollbar-color: var(--color-border) transparent;<br> 
  }<br> 
  .scrollbar::-webkit-scrollbar {<br> 
    width: 6px;<br> 
  }<br> 
  .scrollbar::-webkit-scrollbar-thumb {<br> 
    background: var(--color-border);<br> 
    border-radius: 3px;<br> 
  }<br> 
  .report-filters {<br> 
    display: grid;<br> 
    grid-template-columns: 1fr 1fr auto;<br> 
    gap: 10px;<br> 
    margin-bottom: 25px;<br> 
  }<br> 
  .chart-container {<br> 
    position: relative;<br> 
    height: 300px;<br> 
    margin-bottom: 30px;<br> 
    background: var(--color-bg);<br> 
    padding: 20px;<br> 
    border-radius: 8px;<br> 
  }<br> 
  .stats-grid {<br> 
    display: grid;<br> 
    grid-template-columns: 1fr 1fr 1fr;<br> 
    gap: 15px;<br> 
    margin-bottom: 25px;<br> 
  }<br> 
  .report-stat-box {<br> 
    background: var(--color-bg);<br> 
    padding: 20px;<br> 
    border-radius: 8px;<br> 
    text-align: center;<br> 
    border-left: 4px solid var(--color-primary);<br> 
  }<br> 
  .report-stat-box.completed {<br> 
    border-left-color: var(--color-success);<br> 
  }<br> 
  .report-stat-box.pending {<br> 
    border-left-color: var(--color-warning);<br> 
  }<br> 
  .report-stat-box .stat-value {<br> 
    font-size: 28px;<br> 
    font-weight: bold;<br> 
    color: var(--color-text);<br> 
    margin-bottom: 5px;<br> 
  }<br> 
  .report-stat-box .stat-label {<br> 
    font-size: 12px;<br> 
    color: var(--color-text-secondary);<br> 
    text-transform: uppercase;<br> 
  }<br> 
  .calendar-container {<br> 
    background: var(--color-bg);<br> 
    padding: 20px;<br> 
    border-radius: 8px;<br> 
  }<br> 
  .calendar {<br> 
    display: grid;<br> 
    grid-template-columns: repeat(7, 1fr);<br> 
    gap: 8px;<br> 
    margin-bottom: 20px;<br> 
  }<br> 
  .calendar-day {<br> 
    aspect-ratio: 1;<br> 
    display: flex;<br> 
    flex-direction: column;<br> 
    align-items: center;<br> 
    justify-content: center;<br> 
    border-radius: 8px;<br> 
    background: white;<br> 
    border: 1px solid var(--color-border);<br> 
    cursor: pointer;<br> 
    font-size: 12px;<br> 
    transition: all 0.2s;<br> 
  }<br> 
  .calendar-day:hover {<br> 
    transform: scale(1.05);<br> 
  }<br> 
  .calendar-day.header {<br> 
    font-weight: bold;<br> 
    background: var(--color-primary);<br> 
    color: white;<br> 
    cursor: default;<br> 
  }<br> 
  .calendar-day.progress-0 {<br> 
    background: rgba(244, 67, 54, 0.1);<br> 
    color: var(--color-error);<br> 
  }<br> 
  .calendar-day.progress-50 {<br> 
    background: rgba(255, 152, 0, 0.1);<br> 
    color: var(--color-warning);<br> 
  }<br> 
  .calendar-day.progress-100 {<br> 
    background: rgba(76, 175, 80, 0.1);<br> 
    color: var(--color-success);<br> 
  }<br> 
  .calendar-day .date {<br> 
    font-weight: 600;<br> 
  }<br> 
  .calendar-day .percent {<br> 
    font-size: 11px;<br> 
  }<br> 
  .progress-details {<br> 
    background: white;<br> 
    padding: 15px;<br> 
    border-radius: 8px;<br> 
    border: 1px solid var(--color-border);<br> 
    max-height: 400px;<br> 
    overflow-y: auto;<br> 
  }<br> 
  .progress-row {<br> 
    display: grid;<br> 
    grid-template-columns: 1fr 100px 100px;<br> 
    gap: 15px;<br> 
    padding: 10px 0;<br> 
    border-bottom: 1px solid var(--color-border);<br> 
    align-items: center;<br> 
  }<br> 
  .progress-row:last-child {<br> 
    border-bottom: none;<br> 
  }<br> 
  .progress-row-date {<br> 
    font-weight: 500;<br> 
    color: var(--color-text);<br> 
  }<br> 
  .progress-row-stats {<br> 
    text-align: center;<br> 
    font-size: 13px;<br> 
    color: var(--color-text-secondary);<br> 
  }<br> 
  .progress-bar {<br> 
    background: var(--color-border);<br> 
    height: 8px;<br> 
    border-radius: 4px;<br> 
    overflow: hidden;<br> 
  }<br> 
  .progress-bar-fill {<br> 
    background: var(--color-primary);<br> 
    height: 100%;<br> 
    transition: width 0.3s;<br> 
  }<br> 
  @media (max-width: 600px) {<br> 
    .container {<br> 
      padding: 20px;<br> 
    }<br> 
    .add-task-section {<br> 
      grid-template-columns: 1fr;<br> 
    }<br> 
    .stats-grid {<br> 
      grid-template-columns: 1fr;<br> 
    }<br> 
    .report-filters {<br> 
      grid-template-columns: 1fr;<br> 
    }<br> 
    .tab-btn {<br> 
      padding: 10px 15px;<br> 
      font-size: 13px;<br> 
    }<br> 
  }<br> 
  </style>
</head>
<body> 
  <div class="container"><br> 
    <div class="header"><br> 
      <h1>📋 Daily Todo Checklist</h1><br> 
      <div class="sync-status" id="syncStatus">Connecting...</div><br> 
    </div><br> 

    <div class="tabs"><br> 
      <button class="tab-btn active" onclick="switchTab('todos', event)">Tasks</button><br> 
      <button class="tab-btn" onclick="switchTab('templates', event)">Templates</button><br> 
      <button class="tab-btn" onclick="switchTab('reports', event)">Reports</button><br> 
    </div><br> 

    <!-- TASKS TAB -->
    <div id="todos" class="tab-content active"><br> 
      <!-- (rest of your HTML stays same here...) -->
    </div><br> 

    <!-- TEMPLATES TAB -->
    <div id="templates" class="tab-content"><br> 
      <!-- templates content -->
    </div><br> 

    <!-- REPORTS TAB -->
    <div id="reports" class="tab-content"><br> 
      <!-- reports content -->
    </div><br> 
  </div><br> 

  <script><br> 
  let tasks = [];<br> 
  let today = new Date().toDateString();<br> 
  let progressChart = null;<br> 

  const defaultTemplates = {<br> 
    work: ['📧 Check emails', '📞 Team meeting', '📝 Write report', '🎯 Project update', '💼 Client call'],<br> 
    study: ['📖 Read chapter', '✍️ Do assignment', '🧮 Practice problems', '📝 Take notes', '🎓 Review notes'],<br> 
    health: ['🏃 Exercise', '🧘 Meditation', '💧 Drink water', '🥗 Eat healthy', '😴 Sleep 8hrs'],<br> 
    personal: ['🛒 Shopping', '🏠 Clean room', '📞 Call family', '🎮 Gaming']<br> 
  };<br> 

  function updateSyncStatus(status) {<br> 
    const el = document.getElementById('syncStatus');<br> 
    if (status === 'synced') {<br> 
      el.textContent = '✓ Local Storage';<br> 
      el.className = 'sync-status synced';<br> 
    } else {<br> 
      el.textContent = status;<br> 
      el.className = 'sync-status';<br> 
    }<br> 
  }<br> 

  // FIXED: take evt parameter instead of using global event
  window.switchTab = function(tabName, evt) {<br> 
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));<br> 
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));<br> 
    document.getElementById(tabName).classList.add('active');<br> 
    if (evt && evt.currentTarget) {<br> 
      evt.currentTarget.classList.add('active');<br> 
    }<br> 
    if (tabName === 'reports') {<br> 
      setTimeout(() => generateReport(), 100);<br> 
    }<br> 
  };<br> 

  // ... keep all remaining JS from your file unchanged ...
  </script>
</body>
</html>
