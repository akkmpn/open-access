<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Todo Checklist</title>
    <style>
        :root {
            --color-primary: #208084;
            --color-primary-hover: #186c71;
            --color-bg: #f5f5f5;
            --color-surface: #ffffff;
            --color-text: #1a1a1a;
            --color-text-secondary: #666;
            --color-border: #e0e0e0;
            --color-success: #4caf50;
            --color-warning: #ff9800;
            --color-error: #f44336;
            --color-high: #f44336;
            --color-medium: #ff9800;
            --color-low: #4caf50;
            --color-overdue: #ff6b6b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            background: var(--color-surface);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
            padding: 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--color-text);
            font-size: 28px;
            margin-bottom: 15px;
        }

        .sync-status {
            font-size: 11px;
            color: #666;
            text-align: center;
            margin-top: 10px;
        }

        .sync-status.synced {
            color: #4caf50;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-box .value {
            font-size: 24px;
            font-weight: bold;
            display: block;
        }

        .stat-box .label {
            font-size: 12px;
            margin-top: 5px;
            opacity: 0.9;
        }

        .add-task-section {
            display: grid;
            grid-template-columns: 1fr 120px 80px;
            gap: 10px;
            margin-bottom: 25px;
        }

        input[type="text"] {
            padding: 12px;
            border: 2px solid var(--color-border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(32, 128, 132, 0.1);
        }

        select {
            padding: 12px;
            border: 2px solid var(--color-border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            background-color: var(--color-surface);
            cursor: pointer;
            transition: border-color 0.3s;
        }

        select:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--color-primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--color-primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(32, 128, 132, 0.3);
        }

        .btn-danger {
            background: var(--color-error);
            color: white;
            padding: 8px 16px;
            font-size: 12px;
        }

        .btn-danger:hover {
            background: #d32f2f;
        }

        .btn-secondary {
            background: var(--color-border);
            color: var(--color-text);
            padding: 8px 16px;
            font-size: 12px;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        .tasks-container {
            max-height: 600px;
            overflow-y: auto;
        }

        .task-date-header {
            font-size: 12px;
            font-weight: 600;
            color: var(--color-text-secondary);
            margin-top: 15px;
            margin-bottom: 8px;
            padding-left: 5px;
            text-transform: uppercase;
        }

        .task-date-header.overdue {
            color: var(--color-overdue);
        }

        .task-item {
            display: flex;
            align-items: flex-start;
            padding: 15px;
            background: var(--color-bg);
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid var(--color-border);
            transition: all 0.2s;
        }

        .task-item.overdue {
            border-left-color: var(--color-overdue);
            background: rgba(255, 107, 107, 0.05);
        }

        .task-item.completed {
            opacity: 0.6;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: var(--color-text-secondary);
        }

        .task-item.priority-high {
            border-left-color: var(--color-high);
        }

        .task-item.priority-medium {
            border-left-color: var(--color-medium);
        }

        .task-item.priority-low {
            border-left-color: var(--color-low);
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            margin-right: 15px;
            margin-top: 2px;
            cursor: pointer;
            accent-color: var(--color-primary);
            flex-shrink: 0;
        }

        .task-content {
            flex: 1;
        }

        .task-text {
            font-size: 14px;
            color: var(--color-text);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .task-info {
            font-size: 11px;
            color: var(--color-text-secondary);
            margin-bottom: 8px;
        }

        .task-priority {
            display: inline-block;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 600;
            margin-right: 8px;
        }

        .task-priority.high {
            background: rgba(244, 67, 54, 0.2);
            color: var(--color-high);
        }

        .task-priority.medium {
            background: rgba(255, 152, 0, 0.2);
            color: var(--color-medium);
        }

        .task-priority.low {
            background: rgba(76, 175, 80, 0.2);
            color: var(--color-low);
        }

        .task-badge {
            display: inline-block;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
            background: rgba(255, 107, 107, 0.2);
            color: var(--color-overdue);
            font-weight: 600;
            margin-right: 4px;
        }

        .task-actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .subtasks-container {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.03);
            border-radius: 6px;
            border-left: 2px solid var(--color-primary);
        }

        .subtask-item {
            display: flex;
            align-items: center;
            padding: 8px 0;
            font-size: 13px;
        }

        .subtask-checkbox {
            width: 16px;
            height: 16px;
            margin-right: 10px;
            cursor: pointer;
            accent-color: var(--color-primary);
        }

        .subtask-text {
            flex: 1;
            color: var(--color-text);
        }

        .subtask-text.completed {
            text-decoration: line-through;
            color: var(--color-text-secondary);
            opacity: 0.6;
        }

        .subtask-remove {
            background: transparent;
            border: none;
            color: var(--color-error);
            cursor: pointer;
            font-size: 14px;
            padding: 0 6px;
            border-radius: 3px;
            transition: background 0.2s;
        }

        .subtask-remove:hover {
            background: rgba(244, 67, 54, 0.1);
        }

        .add-subtask-form {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .add-subtask-form input {
            flex: 1;
            padding: 6px 10px;
            font-size: 12px;
            border: 1px solid var(--color-border);
            border-radius: 4px;
        }

        .add-subtask-form button {
            padding: 6px 12px;
            font-size: 12px;
        }

        .task-remove {
            background: transparent;
            border: none;
            color: var(--color-error);
            cursor: pointer;
            font-size: 16px;
            padding: 5px 10px;
            border-radius: 4px;
            transition: background 0.2s;
            margin-left: auto;
        }

        .task-remove:hover {
            background: rgba(244, 67, 54, 0.1);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--color-text-secondary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .action-buttons button {
            flex: 1;
        }

        .scrollbar {
            scrollbar-width: thin;
            scrollbar-color: var(--color-border) transparent;
        }

        .scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .scrollbar::-webkit-scrollbar-thumb {
            background: var(--color-border);
            border-radius: 3px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .add-task-section {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 24px;
            }

            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Daily Todo Checklist</h1>
            <div class="sync-status" id="syncStatus">Connecting to cloud...</div>
        </div>

        <div class="stats">
            <div class="stat-box">
                <span class="value" id="completionPercent">0%</span>
                <span class="label">Today's Progress</span>
            </div>
            <div class="stat-box">
                <span class="value" id="completedCount">0</span>
                <span class="label">Completed Today</span>
            </div>
            <div class="stat-box">
                <span class="value" id="streakCount">0</span>
                <span class="label">Day Streak</span>
            </div>
        </div>

        <div class="add-task-section">
            <input type="text" id="taskInput" placeholder="What do you want to accomplish today?" />
            <select id="prioritySelect">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
            </select>
            <button class="btn btn-primary" onclick="addTask()">Add Task</button>
        </div>

        <div class="tasks-container scrollbar" id="tasksContainer">
            <div class="empty-state">
                <div class="empty-state-icon">🎯</div>
                <p>No tasks yet. Add one to get started!</p>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-secondary" onclick="resetToday()">Reset Today</button>
            <button class="btn btn-danger" onclick="clearAllTasks()">Clear All</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, getDocs } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCoCFw0hezldX3t33AYa1ytddYMuQCWliM",
            authDomain: "daily-todo-1e4ad.firebaseapp.com",
            projectId: "daily-todo-1e4ad",
            storageBucket: "daily-todo-1e4ad.firebasestorage.app",
            messagingSenderId: "629797690976",
            appId: "1:629797690976:web:fda66df1691eb920e12d05",
            measurementId: "G-KG0NGWBFCW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let tasks = [];
        let today = new Date().toDateString();
        let expandedTasks = new Set();

        function updateSyncStatus(status) {
            const el = document.getElementById('syncStatus');
            if (status === 'synced') {
                el.textContent = '✓ Synced';
                el.className = 'sync-status synced';
            } else if (status === 'syncing') {
                el.textContent = 'Syncing...';
                el.className = 'sync-status';
            } else {
                el.textContent = 'Error: ' + status;
                el.className = 'sync-status';
            }
        }

        async function loadTasksFromFirestore() {
            try {
                updateSyncStatus('syncing');
                const snapshot = await getDocs(collection(db, 'tasks'));
                tasks = [];
                snapshot.forEach(doc => {
                    tasks.push({ id: doc.id, ...doc.data() });
                });
                tasks.sort((a, b) => {
                    const aIsToday = a.date === today ? 0 : 1;
                    const bIsToday = b.date === today ? 0 : 1;
                    if (aIsToday !== bIsToday) return aIsToday - bIsToday;
                    return new Date(b.date) - new Date(a.date);
                });
                renderTasks();
                updateSyncStatus('synced');
            } catch (error) {
                console.error('Error loading tasks:', error);
                updateSyncStatus(error.message);
            }
        }

        function getStreakCount() {
            return parseInt(localStorage.getItem('streakCount')) || 0;
        }

        async function updateStreakCounter() {
            try {
                const lastUsedKey = 'lastUsedDate';
                const streakKey = 'streakCount';
                const lastUsed = localStorage.getItem(lastUsedKey);
                let streak = parseInt(localStorage.getItem(streakKey)) || 1;

                const yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);

                if (lastUsed === yesterday.toDateString()) {
                    streak++;
                } else if (lastUsed !== today) {
                    streak = 1;
                }

                localStorage.setItem(streakKey, streak.toString());
                localStorage.setItem(lastUsedKey, today);
            } catch (error) {
                console.error('Error updating streak:', error);
            }
        }

        window.addTask = async function() {
            const input = document.getElementById('taskInput');
            const priority = document.getElementById('prioritySelect').value;
            const text = input.value.trim();

            if (!text) {
                alert('Please enter a task!');
                return;
            }

            try {
                updateSyncStatus('syncing');
                await updateStreakCounter();
                await addDoc(collection(db, 'tasks'), {
                    text: text,
                    completed: false,
                    priority: priority,
                    date: today,
                    subtasks: [],
                    createdAt: new Date().toISOString()
                });
                input.value = '';
                await loadTasksFromFirestore();
                input.focus();
            } catch (error) {
                console.error('Error adding task:', error);
                updateSyncStatus(error.message);
            }
        };

        window.toggleTask = async function(id) {
            try {
                updateSyncStatus('syncing');
                const task = tasks.find(t => t.id === id);
                if (task) {
                    await updateDoc(doc(db, 'tasks', id), {
                        completed: !task.completed
                    });
                    await loadTasksFromFirestore();
                }
            } catch (error) {
                console.error('Error toggling task:', error);
                updateSyncStatus(error.message);
            }
        };

        window.addSubtask = async function(taskId) {
            const input = document.getElementById(`subtask-input-${taskId}`);
            const text = input.value.trim();

            if (!text) {
                alert('Please enter a subtask!');
                return;
            }

            try {
                updateSyncStatus('syncing');
                const task = tasks.find(t => t.id === taskId);
                if (task) {
                    const subtasks = task.subtasks || [];
                    const newSubtask = {
                        id: Date.now(),
                        text: text,
                        completed: false
                    };
                    await updateDoc(doc(db, 'tasks', taskId), {
                        subtasks: [...subtasks, newSubtask]
                    });
                    input.value = '';
                    await loadTasksFromFirestore();
                }
            } catch (error) {
                console.error('Error adding subtask:', error);
                updateSyncStatus(error.message);
            }
        };

        window.toggleSubtask = async function(taskId, subtaskId) {
            try {
                updateSyncStatus('syncing');
                const task = tasks.find(t => t.id === taskId);
                if (task) {
                    const subtasks = task.subtasks || [];
                    const updatedSubtasks = subtasks.map(s => 
                        s.id === subtaskId ? { ...s, completed: !s.completed } : s
                    );
                    
                    await updateDoc(doc(db, 'tasks', taskId), {
                        subtasks: updatedSubtasks
                    });

                    // Auto-complete main task if all subtasks done
                    const allCompleted = updatedSubtasks.every(s => s.completed);
                    if (allCompleted && updatedSubtasks.length > 0) {
                        await updateDoc(doc(db, 'tasks', taskId), {
                            completed: true
                        });
                    } else if (!allCompleted) {
                        await updateDoc(doc(db, 'tasks', taskId), {
                            completed: false
                        });
                    }

                    await loadTasksFromFirestore();
                }
            } catch (error) {
                console.error('Error toggling subtask:', error);
                updateSyncStatus(error.message);
            }
        };

        window.removeSubtask = async function(taskId, subtaskId) {
            try {
                updateSyncStatus('syncing');
                const task = tasks.find(t => t.id === taskId);
                if (task) {
                    const subtasks = (task.subtasks || []).filter(s => s.id !== subtaskId);
                    await updateDoc(doc(db, 'tasks', taskId), {
                        subtasks: subtasks
                    });
                    await loadTasksFromFirestore();
                }
            } catch (error) {
                console.error('Error removing subtask:', error);
                updateSyncStatus(error.message);
            }
        };

        window.removeTask = async function(id) {
            try {
                updateSyncStatus('syncing');
                await deleteDoc(doc(db, 'tasks', id));
                await loadTasksFromFirestore();
            } catch (error) {
                console.error('Error removing task:', error);
                updateSyncStatus(error.message);
            }
        };

        window.toggleExpand = function(taskId) {
            if (expandedTasks.has(taskId)) {
                expandedTasks.delete(taskId);
            } else {
                expandedTasks.add(taskId);
            }
            renderTasks();
        };

        window.resetToday = async function() {
            if (confirm('Reset all today\'s tasks?')) {
                try {
                    updateSyncStatus('syncing');
                    for (let task of tasks) {
                        if (task.date === today && task.completed) {
                            const subtasks = (task.subtasks || []).map(s => ({ ...s, completed: false }));
                            await updateDoc(doc(db, 'tasks', task.id), {
                                completed: false,
                                subtasks: subtasks
                            });
                        }
                    }
                    await loadTasksFromFirestore();
                } catch (error) {
                    console.error('Error resetting tasks:', error);
                    updateSyncStatus(error.message);
                }
            }
        };

        window.clearAllTasks = async function() {
            if (confirm('Delete all tasks permanently?')) {
                try {
                    updateSyncStatus('syncing');
                    for (let task of tasks) {
                        await deleteDoc(doc(db, 'tasks', task.id));
                    }
                    tasks = [];
                    renderTasks();
                    updateSyncStatus('synced');
                } catch (error) {
                    console.error('Error clearing tasks:', error);
                    updateSyncStatus(error.message);
                }
            }
        };

        function renderTasks() {
            const container = document.getElementById('tasksContainer');
            const todayTasks = tasks.filter(t => t.date === today);
            const completedToday = todayTasks.filter(t => t.completed).length;
            const percentToday = todayTasks.length > 0 ? Math.round((completedToday / todayTasks.length) * 100) : 0;

            document.getElementById('completionPercent').textContent = percentToday + '%';
            document.getElementById('completedCount').textContent = completedToday + '/' + todayTasks.length;
            document.getElementById('streakCount').textContent = getStreakCount();

            if (tasks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🎯</div>
                        <p>No tasks yet. Add one to get started!</p>
                    </div>
                `;
                return;
            }

            let html = '';
            let lastDate = null;

            const priorityOrder = { high: 0, medium: 1, low: 2 };
            const sortedTasks = [...tasks].sort((a, b) => priorityOrder[a.priority] - priorityOrder[b.priority]);

            for (let task of sortedTasks) {
                if (lastDate !== task.date) {
                    const isOverdue = task.date !== today;
                    const dateStr = task.date === today ? 'Today' : new Date(task.date).toLocaleDateString('en-IN');
                    html += `<div class="task-date-header ${isOverdue ? 'overdue' : ''}">${dateStr}</div>`;
                    lastDate = task.date;
                }

                const isOverdue = task.date !== today && !task.completed;
                const hasSubtasks = task.subtasks && task.subtasks.length > 0;
                const isExpanded = expandedTasks.has(task.id);
                const subtaskCount = hasSubtasks ? task.subtasks.length : 0;
                const completedSubtasks = hasSubtasks ? task.subtasks.filter(s => s.completed).length : 0;

                html += `
                    <div class="task-item priority-${task.priority} ${task.completed ? 'completed' : ''} ${isOverdue ? 'overdue' : ''}">
                        <input 
                            type="checkbox" 
                            class="task-checkbox" 
                            ${task.completed ? 'checked' : ''} 
                            onchange="window.toggleTask('${task.id}')"
                        />
                        <div class="task-content">
                            <div class="task-text">${escapeHtml(task.text)}</div>
                            <div class="task-info">
                                <span class="task-priority ${task.priority}">${task.priority.toUpperCase()}</span>
                                ${isOverdue ? '<span class="task-badge">OVERDUE</span>' : ''}
                                ${hasSubtasks ? `<span class="task-badge" style="background: rgba(32, 128, 132, 0.2); color: var(--color-primary);">${completedSubtasks}/${subtaskCount}</span>` : ''}
                            </div>
                            ${hasSubtasks ? `
                                <div class="task-actions">
                                    <button class="btn btn-sm btn-secondary" onclick="window.toggleExpand('${task.id}')">
                                        ${isExpanded ? '▼ Hide' : '▶ Show'} Subtasks
                                    </button>
                                </div>
                            ` : ''}
                            ${isExpanded && hasSubtasks ? `
                                <div class="subtasks-container">
                                    ${task.subtasks.map(sub => `
                                        <div class="subtask-item">
                                            <input 
                                                type="checkbox" 
                                                class="subtask-checkbox" 
                                                ${sub.completed ? 'checked' : ''} 
                                                onchange="window.toggleSubtask('${task.id}', ${sub.id})"
                                            />
                                            <span class="subtask-text ${sub.completed ? 'completed' : ''}">${escapeHtml(sub.text)}</span>
                                            <button class="subtask-remove" onclick="window.removeSubtask('${task.id}', ${sub.id})">✕</button>
                                        </div>
                                    `).join('')}
                                    <div class="add-subtask-form">
                                        <input type="text" id="subtask-input-${task.id}" placeholder="Add a subtask..." />
                                        <button class="btn btn-sm btn-primary" onclick="window.addSubtask('${task.id}')">Add</button>
                                    </div>
                                </div>
                            ` : ''}
                            ${!isExpanded && !hasSubtasks ? `
                                <div class="task-actions">
                                    <button class="btn btn-sm btn-secondary" onclick="window.toggleExpand('${task.id}')">+ Add Subtasks</button>
                                </div>
                            ` : ''}
                        </div>
                        <button class="task-remove" onclick="window.removeTask('${task.id}')">✕</button>
                    </div>
                `;
            }

            container.innerHTML = html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize
        document.getElementById('taskInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addTask();
            }
        });

        loadTasksFromFirestore();
        updateStreakCounter();

        setInterval(() => {
            const newToday = new Date().toDateString();
            if (newToday !== today) {
                today = newToday;
                loadTasksFromFirestore();
                updateStreakCounter();
            }
        }, 60000);
    </script>
</body>
</html>
