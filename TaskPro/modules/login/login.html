<div id="auth-container" class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <h2 id="auth-title">Welcome to TaskPro</h2>
            <p id="auth-subtitle">Login to sync your productivity</p>
        </div>

        <form id="auth-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="auth-email" placeholder="name@company.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="auth-password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" id="auth-submit-btn" class="btn-auth">Sign In</button>
        </form>

        <div class="auth-footer">
            <p id="toggle-text">Don't have an account? <a href="#" onclick="toggleAuthMode()">Sign Up</a></p>
        </div>
    </div>
</div>
