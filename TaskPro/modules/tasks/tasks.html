<section id="tasks-section" class="app-section">
    <div class="section-header">
        <h2>My Tasks</h2>
        <button id="add-task-btn" onclick="openTaskModal()" class="btn-primary">+ Add New Task</button>
    </div>

    <div class="task-filters">
        <button class="filter-btn active" onclick="filterTasks('all')">All</button>
        <button class="filter-btn" onclick="filterTasks('pending')">Pending</button>
        <button class="filter-btn" onclick="filterTasks('completed')">Completed</button>
    </div>

    <div id="tasks-list" class="tasks-grid">
        </div>
</section>

<div id="task-modal" class="modal" style="display:none;">
    <div class="modal-content">
        <h3 id="modal-title">Create New Task</h3>
        <form id="task-form">
            <input type="hidden" id="task-id">
            <input type="text" id="task-title" placeholder="Task Title" required>
            <div class="form-group">
                <input type="date" id="task-date" required>
                <select id="task-priority">
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>
            </div>
            <input type="text" id="task-tag" placeholder="Tag (e.g., Work)">
            <div class="modal-actions">
                <button type="button" onclick="closeTaskModal()">Cancel</button>
                <button type="submit" class="btn-save">Save Task</button>
            </div>
        </form>
    </div>
</div>
