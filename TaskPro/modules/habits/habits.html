<section id="habits-section" class="app-section">
    <div class="section-header">
        <h2>Habit Tracker</h2>
        <button id="add-habit-btn" onclick="openHabitModal()" class="btn-primary">+ New Habit</button>
    </div>

    <div id="habits-list" class="habits-grid">
        </div>
</section>

<div id="habit-modal" class="modal" style="display:none;">
    <div class="modal-content">
        <h3>Track New Habit</h3>
        <form id="habit-form">
            <input type="text" id="habit-name" placeholder="E.g., Morning Meditating, Gym, Reading" required>
            <div class="modal-actions">
                <button type="button" onclick="closeHabitModal()">Cancel</button>
                <button type="submit" class="btn-save">Start Tracking</button>
            </div>
        </form>
    </div>
</div>
