<section id="calendar-section" class="app-section">
    <div class="calendar-controls">
        <button onclick="changeMonth(-1)">❮</button>
        <h2 id="current-month-year">Month Year</h2>
        <button onclick="changeMonth(1)">❯</button>
    </div>

    <div class="calendar-wrapper">
        <div class="calendar-weekdays">
            <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div>
            <div>Thu</div><div>Fri</div><div>Sat</div>
        </div>
        <div id="calendar-grid" class="calendar-days">
            </div>
    </div>
</section>

<div id="calendar-preview" class="task-preview-popup" style="display:none;">
    <ul id="preview-task-list"></ul>
</div>
