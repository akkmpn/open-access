<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskPro - Calendar</title>
    <link rel="stylesheet" href="../shared/styles.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="header-bar">
            <div class="header-left">
                <div class="logo">⚡ TaskPro Pro</div>
            </div>
            <div class="header-right">
                <div class="status-indicator" id="syncStatus"></div>
                <button class="btn btn-secondary" onclick="goBack()" style="font-size: 12px;">← Back</button>
            </div>
        </div>

        <div class="sidebar scrollbar">
            <a href="../index.html" class="nav-item">📊 Dashboard</a>
            <a href="lists.html" class="nav-item">📝 Tasks</a>
            <a href="calendar.html" class="nav-item active">📅 Calendar</a>
        </div>

        <div class="main-content scrollbar">
            <div class="content-header">
                <h1>📅 Calendar View</h1>
                <p>See all tasks by due date</p>
            </div>

            <div class="card">
                <h3>Calendar - <span id="currentMonth">January 2026</span></h3>
                <div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-top: 15px;">
                    <div class="badge badge-medium" style="padding: 10px; text-align: center; background: var(--bg-surface); color: white;">Sun</div>
                    <div class="badge badge-medium" style="padding: 10px; text-align: center; background: var(--bg-surface); color: white;">Mon</div>
                    <div class="badge badge-medium" style="padding: 10px; text-align: center; background: var(--bg-surface); color: white;">Tue</div>
                    <div class="badge badge-medium" style="padding: 10px; text-align: center; background: var(--bg-surface); color: white;">Wed</div>
                    <div class="badge badge-medium" style="padding: 10px; text-align: center; background: var(--bg-surface); color: white;">Thu</div>
                    <div class="badge badge-medium" style="padding: 10px; text-align: center; background: var(--bg-surface); color: white;">Fri</div>
                    <div class="badge badge-medium" style="padding: 10px; text-align: center; background: var(--bg-surface); color: white;">Sat</div>
                    <div id="calendarDays" style="grid-column: 1/-1; display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px;"></div>
                </div>
            </div>

            <div class="card">
                <h3>Upcoming Tasks</h3>
                <div id="upcomingTasks"></div>
            </div>
        </div>
    </div>

    <script src="../shared/firebase-config.js"></script>
    <script src="../shared/shared.js"></script>
    <script>
        window.addEventListener('load', async () => {
            await initApp();
            renderCalendar();
        });

        async function renderCalendar() {
            const tasks = await window.getAllTasks();
            const today = new Date();
            const year = today.getFullYear();
            const month = today.getMonth();

            document.getElementById('currentMonth').textContent = new Date(year, month).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysContainer = document.getElementById('calendarDays');

            let html = '';
            for (let i = 0; i < firstDay; i++) {
                html += '<div style="background: var(--bg-surface); padding: 10px; border-radius: 8px;"></div>';
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayTasks = tasks.filter(t => t.dueDate === dateStr);
                const hasTask = dayTasks.length > 0;

                html += `
                    <div style="background: ${hasTask ? 'var(--accent)' : 'var(--bg-surface)'}; padding: 10px; border-radius: 8px; text-align: center; cursor: pointer;" 
                         onclick="showDayTasks('${dateStr}')">
                        <div style="font-weight: 700;">${day}</div>
                        <div style="font-size: 11px; margin-top: 4px;">
                            ${hasTask ? '📌 ' + dayTasks.length : ''}
                        </div>
                    </div>
                `;
            }

            daysContainer.innerHTML = html;

            // Show upcoming tasks
            const upcoming = tasks.filter(t => !t.completed && t.dueDate).sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));
            const upcomingContainer = document.getElementById('upcomingTasks');

            if (upcoming.length === 0) {
                upcomingContainer.innerHTML = '<p style="color: var(--text-secondary);">No upcoming tasks</p>';
            } else {
                upcomingContainer.innerHTML = upcoming.slice(0, 10).map(task => `
                    <div style="padding: 10px; border-left: 3px solid var(--accent); background: var(--bg-surface); border-radius: 6px; margin-bottom: 10px;">
                        <div style="font-weight: 600;">${window.escapeHtml(task.text)}</div>
                        <div style="font-size: 12px; color: var(--text-secondary); margin-top: 4px;">
                            📅 ${window.formatDate(task.dueDate)} • <span class="badge badge-${task.priority}">${task.priority}</span>
                        </div>
                    </div>
                `).join('');
            }
        }

        function showDayTasks(dateStr) {
            alert(`Tasks for ${dateStr}. Click "Tasks" to see details.`);
        }

        function goBack() {
            window.location.href = '../index.html';
        }
    </script>
</body>
</html>
