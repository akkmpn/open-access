<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS | Bionic Workspace</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Palette: Deep Space & Bioluminescence */
            --bg-void: #09090b;
            --bg-panel: #18181b;
            --bg-surface: #27272a;
            
            --accent-bio: #2dd4bf;   /* Teal */
            --accent-plasma: #d946ef; /* Magenta */
            --accent-solar: #f59e0b; /* Amber */
            --accent-alert: #ef4444; /* Red */
            
            --text-primary: #f4f4f5;
            --text-muted: #a1a1aa;
            
            --border: 1px solid rgba(255,255,255,0.08);
            --radius-sm: 6px;
            --radius-lg: 16px;
            
            --font-ui: 'Space Grotesk', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; user-select: none; scrollbar-width: thin; }
        
        body {
            background-color: var(--bg-void);
            color: var(--text-primary);
            font-family: var(--font-ui);
            height: 100vh;
            overflow: hidden;
            display: grid;
            grid-template-rows: 60px 1fr;
        }

        /* --- 1. HEADER (The Uplink) --- */
        .header {
            background: rgba(9, 9, 11, 0.9);
            border-bottom: var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 25px;
            z-index: 100;
        }
        .logo { font-family: var(--font-code); font-weight: 800; font-size: 20px; letter-spacing: -1px; color: var(--accent-bio); display: flex; gap: 10px; align-items: center; }
        .sync-pill { font-size: 11px; background: rgba(45, 212, 191, 0.1); color: var(--accent-bio); padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(45, 212, 191, 0.3); display: flex; gap: 6px; align-items: center; }
        .sync-dot { width: 6px; height: 6px; background: currentColor; border-radius: 50%; box-shadow: 0 0 8px currentColor; animation: pulse 2s infinite; }
        
        /* --- 2. LAYOUT GRID (Tri-Core) --- */
        .nexus-grid {
            display: grid;
            grid-template-columns: 350px 1fr 300px; /* Fixed Left, Fluid Center, Fixed Right */
            height: calc(100vh - 60px);
            overflow: hidden;
        }

        /* PANEL STYLES */
        .panel { padding: 20px; overflow-y: auto; border-right: var(--border); display: flex; flex-direction: column; }
        .panel-title { font-family: var(--font-code); font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; display: flex; justify-content: space-between; }

        /* --- LEFT: TASK REACTOR --- */
        .task-input-group {
            background: var(--bg-surface); border-radius: var(--radius-sm);
            padding: 8px; display: flex; gap: 8px; margin-bottom: 20px;
            border: var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .nexus-input { background: transparent; border: none; color: white; font-family: var(--font-ui); flex: 1; }
        
        .task-card {
            background: var(--bg-panel); border: var(--border); border-radius: var(--radius-sm);
            padding: 12px; margin-bottom: 10px; transition: 0.2s; position: relative;
            border-left: 3px solid transparent;
        }
        .task-card:hover { transform: translateX(4px); background: var(--bg-surface); }
        .task-card.p-3 { border-left-color: var(--accent-alert); }
        .task-card.p-2 { border-left-color: var(--accent-solar); }
        .task-card.completed { opacity: 0.5; filter: grayscale(1); }
        .task-card.completed .task-txt { text-decoration: line-through; }

        .subtask-container {
            margin-top: 10px; padding-top: 10px; border-top: 1px dashed rgba(255,255,255,0.1);
            display: none; /* Hidden by default */
        }
        .task-card.expanded .subtask-container { display: block; }
        
        .subtask-row { display: flex; align-items: center; gap: 8px; font-size: 12px; margin-bottom: 5px; color: var(--text-muted); }
        
        /* --- CENTER: THE BRIDGE (Analytics & Vis) --- */
        .stats-deck { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-module { background: var(--bg-panel); border: var(--border); padding: 15px; border-radius: var(--radius-lg); text-align: center; }
        .stat-val { font-family: var(--font-code); font-size: 24px; font-weight: 800; }
        .stat-lbl { font-size: 10px; color: var(--text-muted); text-transform: uppercase; margin-top: 5px; }

        .chart-frame { background: var(--bg-panel); border: var(--border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 20px; height: 250px; position: relative; }
        
        .calendar-heatmap { display: grid; grid-template-columns: repeat(53, 1fr); gap: 3px; height: 100px; }
        .heat-bit { background: rgba(255,255,255,0.05); border-radius: 2px; }
        .heat-bit:hover { transform: scale(1.5); background: var(--accent-bio); box-shadow: 0 0 10px var(--accent-bio); z-index: 2; }

        /* --- RIGHT: THE ENGINE (Focus & XP) --- */
        .engine-panel { background: #0c0c0e; }
        
        .xp-orb {
            width: 120px; height: 120px; margin: 0 auto 30px;
            border-radius: 50%; border: 2px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative;
        }
        .xp-orb::before {
            content: ''; position: absolute; inset: -5px; border-radius: 50%;
            background: conic-gradient(var(--accent-plasma) var(--xp-pct), transparent 0);
            mask: radial-gradient(farthest-side, transparent calc(100% - 2px), black calc(100% - 2px));
            -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 2px), black calc(100% - 2px));
        }
        
        .focus-readout {
            font-family: var(--font-code); font-size: 48px; text-align: center;
            color: var(--accent-bio); text-shadow: 0 0 20px rgba(45, 212, 191, 0.4);
            margin-bottom: 20px;
        }

        .audio-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        
        /* UTILS */
        .btn { border: none; padding: 8px 16px; border-radius: 4px; font-family: var(--font-code); font-size: 11px; cursor: pointer; transition: 0.2s; text-transform: uppercase; font-weight: 700; }
        .btn-bio { background: var(--accent-bio); color: #000; }
        .btn-bio:hover { box-shadow: 0 0 15px var(--accent-bio); }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
        .btn-ghost:hover { border-color: var(--accent-bio); color: var(--text-primary); }
        .btn-mini { padding: 4px 8px; font-size: 10px; }

        .modal-shade {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px);
            z-index: 999; display: none; place-items: center;
        }
        .modal-window { background: var(--bg-surface); padding: 30px; border: 1px solid var(--accent-bio); border-radius: var(--radius-lg); width: 350px; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* Mobile Responsive */
        @media (max-width: 1024px) {
            .nexus-grid { grid-template-columns: 1fr; overflow-y: auto; height: auto; }
            .panel { height: auto; border-right: none; border-bottom: var(--border); overflow: visible; }
            body { overflow-y: auto; display: block; }
        }
    </style>
</head>
<body>

    <div class="modal-shade" id="authModal">
        <div class="modal-window">
            <h2 style="font-family:var(--font-code); color:var(--accent-bio); margin-bottom:20px;">:: IDENTITY_VERIFY ::</h2>
            <input type="email" id="email" placeholder="USER_ID" style="width:100%; padding:10px; background:#000; border:1px solid #333; color:white; margin-bottom:10px;">
            <input type="password" id="pass" placeholder="ACCESS_KEY" style="width:100%; padding:10px; background:#000; border:1px solid #333; color:white; margin-bottom:20px;">
            <div style="display:flex; gap:10px;">
                <button class="btn btn-bio" style="flex:1" onclick="Auth.login()">LOGIN</button>
                <button class="btn btn-ghost" style="flex:1" onclick="Auth.register()">INIT_NEW</button>
            </div>
            <button class="btn btn-ghost" style="width:100%; margin-top:10px; border:none;" onclick="Auth.guest()">CONTINUE_OFFLINE</button>
        </div>
    </div>

    <header class="header">
        <div class="logo"><i class="fas fa-dna"></i> NEXUS</div>
        <div class="sync-pill">
            <div class="sync-dot" id="sync-status-dot"></div>
            <span id="sync-status-text">SYSTEM OFFLINE</span>
        </div>
        <button class="btn btn-ghost" onclick="Auth.logout()" id="auth-btn">GUEST</button>
    </header>

    <main class="nexus-grid">
        
        <section class="panel">
            <div class="panel-title">
                <span>Task Reactor</span>
                <span id="task-count">0 ACTIVE</span>
            </div>
            
            <div class="task-input-group">
                <input type="text" class="nexus-input" id="task-in" placeholder="Input directive...">
                <select id="task-prio" style="background:#000; color:var(--text-muted); border:none; border-radius:4px; font-size:10px;">
                    <option value="1">LOW</option>
                    <option value="2" selected>MED</option>
                    <option value="3">CRIT</option>
                </select>
                <button class="btn btn-bio btn-mini" onclick="Tasks.add()"><i class="fas fa-plus"></i></button>
            </div>

            <div id="task-list"></div>
        </section>

        <section class="panel" style="background: #101012;">
            <div class="panel-title">Analytics Bridge</div>
            
            <div class="stats-deck">
                <div class="stat-module">
                    <div class="stat-val" style="color:var(--accent-bio)" id="stat-completed">0</div>
                    <div class="stat-lbl">Directives Executed</div>
                </div>
                <div class="stat-module">
                    <div class="stat-val" style="color:var(--accent-plasma)" id="stat-streak">0</div>
                    <div class="stat-lbl">Day Streak</div>
                </div>
                <div class="stat-module">
                    <div class="stat-val" style="color:var(--accent-solar)" id="stat-focus">0h</div>
                    <div class="stat-lbl">Deep Focus Time</div>
                </div>
            </div>

            <div class="chart-frame">
                <canvas id="velocityChart"></canvas>
            </div>

            <div class="panel-title">Activity Heatmap</div>
            <div class="calendar-heatmap" id="heatmap"></div>
        </section>

        <section class="panel engine-panel">
            <div class="panel-title">Focus Engine</div>
            
            <div class="xp-orb" style="--xp-pct: 0%">
                <i class="fas fa-crown" style="color:var(--accent-plasma); font-size:24px; margin-bottom:5px;"></i>
                <div style="font-family:var(--font-code); font-weight:bold;" id="lvl-display">LVL 1</div>
            </div>

            <div class="focus-readout" id="timer-display">25:00</div>
            
            <div style="display:flex; gap:10px; justify-content:center; margin-bottom:30px;">
                <button class="btn btn-bio" onclick="Focus.toggle()" id="timer-btn">INITIATE</button>
                <button class="btn btn-ghost" onclick="Focus.reset()">RESET</button>
            </div>

            <div class="panel-title">Bionic Audio</div>
            <div class="audio-controls">
                <button class="btn btn-ghost" onclick="AudioEngine.toggle('pink')"><i class="fas fa-wind"></i> PINK</button>
                <button class="btn btn-ghost" onclick="AudioEngine.toggle('brown')"><i class="fas fa-water"></i> BROWN</button>
                <button class="btn btn-ghost" onclick="AudioEngine.toggle('white')"><i class="fas fa-tv"></i> WHITE</button>
                <button class="btn btn-ghost" onclick="AudioEngine.stop()">OFF</button>
            </div>
            
            <div class="panel-title" style="margin-top:auto;">Global Uplink</div>
            <div style="background:rgba(255,255,255,0.03); padding:10px; border-radius:6px; font-size:12px; color:var(--text-muted);">
                <i class="fas fa-satellite-dish" style="color:var(--accent-bio); margin-right:5px;"></i> 
                <span id="social-status">Searching for active nodes...</span>
            </div>
        </section>

    </main>

    <script type="module">
        // --- IMPORTS ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // --- CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyCoCFw0hezldX3t33AYa1ytddYMuQCWliM",
            authDomain: "daily-todo-1e4ad.firebaseapp.com",
            projectId: "daily-todo-1e4ad",
            storageBucket: "daily-todo-1e4ad.firebasestorage.app",
            messagingSenderId: "629797690976",
            appId: "1:629797690976:web:fda66df1691eb920e12d05"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- GLOBAL STATE ---
        const State = {
            user: null,
            tasks: [],
            stats: { xp: 0, level: 1, focusMins: 0, streak: 0 },
            audioCtx: null,
            audioNode: null
        };

        // --- 1. TASK MANAGER (RECURSIVE) ---
        window.Tasks = {
            add: async () => {
                const txt = document.getElementById('task-in').value.trim();
                const prio = document.getElementById('task-prio').value;
                if(!txt) return;

                const task = {
                    text: txt, priority: parseInt(prio), completed: false,
                    createdAt: Date.now(), subtasks: [], expanded: false
                };

                if(State.user) await addDoc(collection(db, 'tasks'), { ...task, uid: State.user.uid });
                else { State.tasks.push({ ...task, id: 'loc_'+Date.now() }); Sync.saveLocal(); Tasks.render(); }
                
                document.getElementById('task-in').value = '';
                Gamification.addXP(10);
            },

            addSubtask: async (parentId) => {
                const subTxt = prompt("Subtask directive:");
                if(!subTxt) return;
                
                const task = State.tasks.find(t => t.id === parentId);
                const newSub = { id: Date.now(), text: subTxt, completed: false };
                
                if(State.user) {
                    const subs = [...(task.subtasks || []), newSub];
                    await updateDoc(doc(db, 'tasks', parentId), { subtasks: subs, expanded: true });
                } else {
                    if(!task.subtasks) task.subtasks = [];
                    task.subtasks.push(newSub);
                    task.expanded = true;
                    Sync.saveLocal();
                    Tasks.render();
                }
            },

            toggle: async (id) => {
                const t = State.tasks.find(x => x.id === id);
                if(State.user) await updateDoc(doc(db, 'tasks', id), { completed: !t.completed });
                else { t.completed = !t.completed; Sync.saveLocal(); Tasks.render(); }
                if(!t.completed) Gamification.addXP(25);
            },

            toggleSub: async (parentId, subId) => {
                const task = State.tasks.find(t => t.id === parentId);
                const subs = task.subtasks.map(s => s.id === subId ? {...s, completed: !s.completed} : s);
                if(State.user) await updateDoc(doc(db, 'tasks', parentId), { subtasks: subs });
                else { task.subtasks = subs; Sync.saveLocal(); Tasks.render(); }
            },

            toggleExpand: async (id) => {
                const t = State.tasks.find(x => x.id === id);
                if(State.user) await updateDoc(doc(db, 'tasks', id), { expanded: !t.expanded });
                else { t.expanded = !t.expanded; Sync.saveLocal(); Tasks.render(); }
            },

            del: async (id) => {
                if(!confirm("Purge directive?")) return;
                if(State.user) await deleteDoc(doc(db, 'tasks', id));
                else { State.tasks = State.tasks.filter(x => x.id !== id); Sync.saveLocal(); Tasks.render(); }
            },

            render: () => {
                const list = document.getElementById('task-list');
                list.innerHTML = '';
                document.getElementById('task-count').innerText = `${State.tasks.filter(t=>!t.completed).length} ACTIVE`;

                // Entropy Sort: Priority * Age
                const sorted = [...State.tasks].sort((a,b) => {
                    if(a.completed !== b.completed) return a.completed - b.completed;
                    const scoreA = a.priority + ((Date.now() - a.createdAt)/86400000);
                    const scoreB = b.priority + ((Date.now() - b.createdAt)/86400000);
                    return scoreB - scoreA;
                });

                sorted.forEach(t => {
                    const subsHtml = (t.subtasks || []).map(s => `
                        <div class="subtask-row" style="text-decoration:${s.completed?'line-through':''}; opacity:${s.completed?0.5:1}">
                            <i class="fas ${s.completed?'fa-check-square':'fa-square'}" 
                               onclick="Tasks.toggleSub('${t.id}', ${s.id})" style="cursor:pointer"></i>
                            ${s.text}
                        </div>
                    `).join('');

                    const html = `
                        <div class="task-card p-${t.priority} ${t.completed?'completed':''} ${t.expanded?'expanded':''}">
                            <div style="display:flex; align-items:center; gap:10px;">
                                <i class="fas ${t.completed?'fa-circle-check':'fa-circle'}" 
                                   style="color:${t.completed?'var(--text-muted)':'var(--accent-bio)'}; cursor:pointer;"
                                   onclick="Tasks.toggle('${t.id}')"></i>
                                <div class="task-txt" style="flex:1; font-weight:500; font-size:14px;">${t.text}</div>
                                <i class="fas fa-chevron-down" style="font-size:10px; cursor:pointer; opacity:0.5;" onclick="Tasks.toggleExpand('${t.id}')"></i>
                                <i class="fas fa-plus" style="font-size:10px; cursor:pointer; color:var(--accent-bio)" onclick="Tasks.addSubtask('${t.id}')"></i>
                                <i class="fas fa-times" style="font-size:10px; cursor:pointer; color:var(--accent-alert)" onclick="Tasks.del('${t.id}')"></i>
                            </div>
                            <div class="subtask-container">${subsHtml}</div>
                        </div>
                    `;
                    list.insertAdjacentHTML('beforeend', html);
                });
            }
        };

        // --- 2. FOCUS ENGINE (Web Audio API) ---
        window.AudioEngine = {
            init: () => { if(!State.audioCtx) State.audioCtx = new (window.AudioContext || window.webkitAudioContext)(); },
            toggle: (type) => {
                AudioEngine.init();
                AudioEngine.stop();
                
                const bufferSize = 2 * State.audioCtx.sampleRate;
                const buffer = State.audioCtx.createBuffer(1, bufferSize, State.audioCtx.sampleRate);
                const data = buffer.getChannelData(0);

                for (let i = 0; i < bufferSize; i++) {
                    const white = Math.random() * 2 - 1;
                    if(type === 'pink') {
                         data[i] = (lastOut + (0.02 * white)) / 1.02; // Approximation
                         lastOut = data[i]; data[i] *= 3.5;
                    } else if(type === 'brown') {
                         data[i] = (lastOut + (0.02 * white)) / 1.02; 
                         lastOut = data[i]; data[i] *= 3.5;
                    } else { data[i] = white * 0.1; }
                }
                let lastOut = 0;

                const noise = State.audioCtx.createBufferSource();
                noise.buffer = buffer;
                noise.loop = true;
                const gain = State.audioCtx.createGain();
                gain.gain.value = 0.05;
                noise.connect(gain).connect(State.audioCtx.destination);
                noise.start();
                State.audioNode = noise;
            },
            stop: () => { if(State.audioNode) { State.audioNode.stop(); State.audioNode = null; } }
        };

        window.Focus = {
            timer: null, timeLeft: 1500,
            toggle: () => {
                if(Focus.timer) {
                    clearInterval(Focus.timer); Focus.timer = null;
                    document.getElementById('timer-btn').innerText = "RESUME";
                } else {
                    document.getElementById('timer-btn').innerText = "PAUSE";
                    Focus.timer = setInterval(() => {
                        Focus.timeLeft--;
                        const m = Math.floor(Focus.timeLeft/60).toString().padStart(2,'0');
                        const s = (Focus.timeLeft%60).toString().padStart(2,'0');
                        document.getElementById('timer-display').innerText = `${m}:${s}`;
                        if(Focus.timeLeft<=0) { 
                            clearInterval(Focus.timer); Focus.timeLeft=1500; 
                            alert("CYCLE COMPLETE"); Gamification.addXP(100); 
                            State.stats.focusMins += 25; Sync.saveLocalStats();
                            Analytics.render();
                        }
                    }, 1000);
                }
            },
            reset: () => { clearInterval(Focus.timer); Focus.timer=null; Focus.timeLeft=1500; document.getElementById('timer-display').innerText="25:00"; }
        };

        // --- 3. GAMIFICATION & ANALYTICS ---
        window.Gamification = {
            addXP: (amt) => {
                State.stats.xp += amt;
                if(State.stats.xp >= 100) { State.stats.level++; State.stats.xp %= 100; alert("LEVEL UP!"); }
                document.getElementById('lvl-display').innerText = `LVL ${State.stats.level}`;
                document.querySelector('.xp-orb').style.setProperty('--xp-pct', `${State.stats.xp}%`);
                Sync.saveLocalStats();
            }
        };

        window.Analytics = {
            init: () => {
                // Generate Heatmap
                const heat = document.getElementById('heatmap');
                heat.innerHTML = '';
                for(let i=0; i<265; i++) { // Approx a year visible
                    const div = document.createElement('div');
                    div.className = 'heat-bit';
                    if(Math.random() > 0.8) div.style.background = 'var(--accent-bio)';
                    heat.appendChild(div);
                }
                
                // Chart
                const ctx = document.getElementById('velocityChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: ['M','T','W','T','F','S','S'],
                        datasets: [{ 
                            label: 'Velocity', data: [12,19,3,5,2,3,20], 
                            borderColor: '#2dd4bf', backgroundColor: 'rgba(45,212,191,0.1)', fill: true, tension:0.4 
                        }]
                    },
                    options: { plugins: { legend: {display:false} }, scales: { x:{display:false}, y:{grid:{color:'#333'}} } }
                });

                document.getElementById('stat-completed').innerText = State.tasks.filter(t=>t.completed).length;
                document.getElementById('stat-focus').innerText = Math.floor(State.stats.focusMins/60) + 'h';
            },
            render: () => {
                document.getElementById('stat-completed').innerText = State.tasks.filter(t=>t.completed).length;
                document.getElementById('stat-focus').innerText = Math.floor(State.stats.focusMins/60) + 'h';
            }
        };

        // --- 4. SYNC & AUTH ---
        window.Sync = {
            saveLocal: () => localStorage.setItem('nexus_tasks', JSON.stringify(State.tasks)),
            saveLocalStats: () => localStorage.setItem('nexus_stats', JSON.stringify(State.stats))
        };

        window.Auth = {
            login: async () => {
                try { await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value); document.getElementById('authModal').style.display='none'; }
                catch(e) { alert(e.message); }
            },
            register: async () => {
                try { await createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value); document.getElementById('authModal').style.display='none'; }
                catch(e) { alert(e.message); }
            },
            logout: async () => { await signOut(auth); window.location.reload(); },
            guest: () => { document.getElementById('authModal').style.display='none'; }
        };

        // --- INIT ---
        onAuthStateChanged(auth, (user) => {
            if(user) {
                State.user = user;
                document.getElementById('sync-status-text').innerText = "UPLINK ESTABLISHED";
                document.getElementById('sync-status-dot').style.color = "var(--accent-bio)";
                document.getElementById('auth-btn').innerText = user.email.split('@')[0];
                const q = query(collection(db, 'tasks'), where('uid', '==', user.uid));
                onSnapshot(q, (snap) => {
                    State.tasks = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    Tasks.render(); Analytics.render();
                });
            } else {
                document.getElementById('authModal').style.display = 'grid';
                State.tasks = JSON.parse(localStorage.getItem('nexus_tasks')) || [];
                State.stats = JSON.parse(localStorage.getItem('nexus_stats')) || { xp:0, level:1, focusMins:0 };
                Tasks.render(); Analytics.render();
                Gamification.addXP(0); // visual refresh
            }
        });

        document.getElementById('task-in').addEventListener('keydown', (e) => { if(e.key === 'Enter') Tasks.add(); });
        Analytics.init();

    </script>
</body>
</html>
