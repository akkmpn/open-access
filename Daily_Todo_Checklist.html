<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Todo Checklist</title>
    <style>
        :root {
            --color-primary: #208084;
            --color-primary-hover: #186c71;
            --color-bg: #f5f5f5;
            --color-surface: #ffffff;
            --color-text: #1a1a1a;
            --color-text-secondary: #666;
            --color-border: #e0e0e0;
            --color-success: #4caf50;
            --color-warning: #ff9800;
            --color-error: #f44336;
            --color-high: #f44336;
            --color-medium: #ff9800;
            --color-low: #4caf50;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            background: var(--color-surface);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
            padding: 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--color-text);
            font-size: 28px;
            margin-bottom: 15px;
        }

        .sync-status {
            font-size: 11px;
            color: #666;
            text-align: center;
            margin-top: 10px;
        }

        .sync-status.synced {
            color: #4caf50;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-box .value {
            font-size: 24px;
            font-weight: bold;
            display: block;
        }

        .stat-box .label {
            font-size: 12px;
            margin-top: 5px;
            opacity: 0.9;
        }

        .add-task-section {
            display: grid;
            grid-template-columns: 1fr 120px 80px;
            gap: 10px;
            margin-bottom: 25px;
        }

        input[type="text"] {
            padding: 12px;
            border: 2px solid var(--color-border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(32, 128, 132, 0.1);
        }

        select {
            padding: 12px;
            border: 2px solid var(--color-border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            background-color: var(--color-surface);
            cursor: pointer;
            transition: border-color 0.3s;
        }

        select:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--color-primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--color-primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(32, 128, 132, 0.3);
        }

        .btn-danger {
            background: var(--color-error);
            color: white;
            padding: 8px 16px;
            font-size: 12px;
        }

        .btn-danger:hover {
            background: #d32f2f;
        }

        .btn-secondary {
            background: var(--color-border);
            color: var(--color-text);
            padding: 8px 16px;
            font-size: 12px;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .tasks-container {
            max-height: 500px;
            overflow-y: auto;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: var(--color-bg);
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid var(--color-border);
            transition: all 0.2s;
        }

        .task-item.completed {
            opacity: 0.6;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: var(--color-text-secondary);
        }

        .task-item.priority-high {
            border-left-color: var(--color-high);
        }

        .task-item.priority-medium {
            border-left-color: var(--color-medium);
        }

        .task-item.priority-low {
            border-left-color: var(--color-low);
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            margin-right: 15px;
            cursor: pointer;
            accent-color: var(--color-primary);
        }

        .task-content {
            flex: 1;
        }

        .task-text {
            font-size: 14px;
            color: var(--color-text);
            margin-bottom: 5px;
            font-weight: 500;
        }

        .task-priority {
            display: inline-block;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 600;
        }

        .task-priority.high {
            background: rgba(244, 67, 54, 0.2);
            color: var(--color-high);
        }

        .task-priority.medium {
            background: rgba(255, 152, 0, 0.2);
            color: var(--color-medium);
        }

        .task-priority.low {
            background: rgba(76, 175, 80, 0.2);
            color: var(--color-low);
        }

        .task-remove {
            background: transparent;
            border: none;
            color: var(--color-error);
            cursor: pointer;
            font-size: 16px;
            padding: 5px 10px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .task-remove:hover {
            background: rgba(244, 67, 54, 0.1);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--color-text-secondary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .action-buttons button {
            flex: 1;
        }

        .scrollbar {
            scrollbar-width: thin;
            scrollbar-color: var(--color-border) transparent;
        }

        .scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .scrollbar::-webkit-scrollbar-thumb {
            background: var(--color-border);
            border-radius: 3px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .add-task-section {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 24px;
            }

            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Daily Todo Checklist</h1>
            <div class="sync-status" id="syncStatus">Connecting to cloud...</div>
        </div>

        <div class="stats">
            <div class="stat-box">
                <span class="value" id="completionPercent">0%</span>
                <span class="label">Completed Today</span>
            </div>
            <div class="stat-box">
                <span class="value" id="completedCount">0</span>
                <span class="label">Tasks Done</span>
            </div>
            <div class="stat-box">
                <span class="value" id="streakCount">0</span>
                <span class="label">Day Streak</span>
            </div>
        </div>

        <div class="add-task-section">
            <input type="text" id="taskInput" placeholder="What do you want to accomplish today?" />
            <select id="prioritySelect">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
            </select>
            <button class="btn btn-primary" onclick="addTask()">Add Task</button>
        </div>

        <div class="tasks-container scrollbar" id="tasksContainer">
            <div class="empty-state">
                <div class="empty-state-icon">🎯</div>
                <p>No tasks yet. Add one to get started!</p>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-secondary" onclick="resetToday()">Reset Today</button>
            <button class="btn btn-danger" onclick="clearAllTasks()">Clear All</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCoCFw0hezldX3t33AYa1ytddYMuQCWliM",
            authDomain: "daily-todo-1e4ad.firebaseapp.com",
            projectId: "daily-todo-1e4ad",
            storageBucket: "daily-todo-1e4ad.firebasestorage.app",
            messagingSenderId: "629797690976",
            appId: "1:629797690976:web:fda66df1691eb920e12d05",
            measurementId: "G-KG0NGWBFCW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let tasks = [];
        let today = new Date().toDateString();

        function updateSyncStatus(status) {
            const el = document.getElementById('syncStatus');
            if (status === 'synced') {
                el.textContent = '✓ Synced';
                el.className = 'sync-status synced';
            } else if (status === 'syncing') {
                el.textContent = 'Syncing...';
                el.className = 'sync-status';
            } else {
                el.textContent = 'Error: ' + status;
                el.className = 'sync-status';
            }
        }

        async function loadTasksFromFirestore() {
            try {
                updateSyncStatus('syncing');
                const q = query(collection(db, 'tasks'), where('date', '==', today));
                const snapshot = await getDocs(q);
                tasks = [];
                snapshot.forEach(doc => {
                    tasks.push({ id: doc.id, ...doc.data() });
                });
                renderTasks();
                updateSyncStatus('synced');
            } catch (error) {
                console.error('Error loading tasks:', error);
                updateSyncStatus(error.message);
            }
        }

        window.addTask = async function() {
            const input = document.getElementById('taskInput');
            const priority = document.getElementById('prioritySelect').value;
            const text = input.value.trim();

            if (!text) {
                alert('Please enter a task!');
                return;
            }

            try {
                updateSyncStatus('syncing');
                await addDoc(collection(db, 'tasks'), {
                    text: text,
                    completed: false,
                    priority: priority,
                    date: today,
                    createdAt: new Date().toISOString()
                });
                input.value = '';
                await loadTasksFromFirestore();
                input.focus();
            } catch (error) {
                console.error('Error adding task:', error);
                updateSyncStatus(error.message);
            }
        };

        window.toggleTask = async function(id) {
            try {
                updateSyncStatus('syncing');
                const task = tasks.find(t => t.id === id);
                if (task) {
                    await updateDoc(doc(db, 'tasks', id), {
                        completed: !task.completed
                    });
                    await loadTasksFromFirestore();
                }
            } catch (error) {
                console.error('Error toggling task:', error);
                updateSyncStatus(error.message);
            }
        };

        window.removeTask = async function(id) {
            try {
                updateSyncStatus('syncing');
                await deleteDoc(doc(db, 'tasks', id));
                await loadTasksFromFirestore();
            } catch (error) {
                console.error('Error removing task:', error);
                updateSyncStatus(error.message);
            }
        };

        window.resetToday = async function() {
            if (confirm('Reset all tasks for today?')) {
                try {
                    updateSyncStatus('syncing');
                    for (let task of tasks) {
                        if (task.completed) {
                            await updateDoc(doc(db, 'tasks', task.id), {
                                completed: false
                            });
                        }
                    }
                    await loadTasksFromFirestore();
                } catch (error) {
                    console.error('Error resetting tasks:', error);
                    updateSyncStatus(error.message);
                }
            }
        };

        window.clearAllTasks = async function() {
            if (confirm('Delete all tasks permanently?')) {
                try {
                    updateSyncStatus('syncing');
                    for (let task of tasks) {
                        await deleteDoc(doc(db, 'tasks', task.id));
                    }
                    tasks = [];
                    renderTasks();
                    updateSyncStatus('synced');
                } catch (error) {
                    console.error('Error clearing tasks:', error);
                    updateSyncStatus(error.message);
                }
            }
        };

        function renderTasks() {
            const container = document.getElementById('tasksContainer');
            const completedCount = tasks.filter(t => t.completed).length;
            const completionPercent = tasks.length > 0 ? Math.round((completedCount / tasks.length) * 100) : 0;

            document.getElementById('completionPercent').textContent = completionPercent + '%';
            document.getElementById('completedCount').textContent = completedCount + '/' + tasks.length;
            document.getElementById('streakCount').textContent = tasks.length > 0 ? completedCount : '0';

            if (tasks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🎯</div>
                        <p>No tasks yet. Add one to get started!</p>
                    </div>
                `;
                return;
            }

            const priorityOrder = { high: 0, medium: 1, low: 2 };
            const sortedTasks = [...tasks].sort((a, b) => priorityOrder[a.priority] - priorityOrder[b.priority]);

            container.innerHTML = sortedTasks.map(task => `
                <div class="task-item priority-${task.priority} ${task.completed ? 'completed' : ''}">
                    <input 
                        type="checkbox" 
                        class="task-checkbox" 
                        ${task.completed ? 'checked' : ''} 
                        onchange="window.toggleTask('${task.id}')"
                    />
                    <div class="task-content">
                        <div class="task-text">${escapeHtml(task.text)}</div>
                        <span class="task-priority ${task.priority}">${task.priority.toUpperCase()}</span>
                    </div>
                    <button class="task-remove" onclick="window.removeTask('${task.id}')">✕</button>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize
        document.getElementById('taskInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addTask();
            }
        });

        loadTasksFromFirestore();

        // Auto-update if date changes
        setInterval(() => {
            const newToday = new Date().toDateString();
            if (newToday !== today) {
                today = newToday;
                loadTasksFromFirestore();
            }
        }, 60000);
    </script>
</body>
</html>
