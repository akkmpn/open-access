<!DOCTYPE html>
<html lang="en" data-theme="dark" data-design="default">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enterprise TaskPro - v4.0 (Ultra)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* ==================== CORE VARIABLES ==================== */
        :root {
            --bg-body: #0f172a;
            --bg-sidebar: #1e293b;
            --bg-card: #334155;
            --bg-input: #1e293b;
            --bg-hover: rgba(255,255,255,0.05);
            --accent: #208084;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #475569;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --radius: 10px;
            --font-main: 'Inter', sans-serif;
            --border-width: 1px;
            --sidebar-width: 260px;
        }

        [data-theme="light"] {
            --bg-body: #f1f5f9;
            --bg-sidebar: #ffffff;
            --bg-card: #ffffff;
            --bg-input: #f8fafc;
            --bg-hover: #f1f5f9;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: var(--font-main);
            background: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            transition: background 0.3s, color 0.3s;
        }

        /* ==================== SIDEBAR ==================== */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-right: var(--border-width) solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            transition: transform 0.3s ease;
            z-index: 50;
            flex-shrink: 0;
        }

        .logo { font-size: 20px; font-weight: 800; color: var(--text-main); margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
        .logo i { color: var(--accent); }

        .nav-link {
            display: flex; align-items: center; gap: 12px; padding: 12px 15px;
            color: var(--text-muted); text-decoration: none; border-radius: var(--radius);
            margin-bottom: 5px; transition: 0.2s; cursor: pointer; font-size: 14px; font-weight: 500;
            border: var(--border-width) solid transparent; background: none; width: 100%; text-align: left;
        }
        .nav-link:hover { background: var(--bg-hover); color: var(--text-main); }
        .nav-link.active { background: var(--accent); color: white; box-shadow: var(--shadow); border-color: var(--accent); }

        .sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 40; display: none; backdrop-filter: blur(2px);
        }

        /* ==================== MAIN CONTENT ==================== */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; width: 100%; }

        .header {
            height: 60px; border-bottom: var(--border-width) solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; background: var(--bg-body); flex-shrink: 0;
        }

        .menu-btn { display: none; background: none; border: none; color: var(--text-main); font-size: 20px; cursor: pointer; }
        .header-actions { display: flex; align-items: center; gap: 10px; }

        .view-container { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 20px; display: none; animation: fadeIn 0.3s ease; }
        .view-container.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ==================== COMPONENTS ==================== */
        .btn {
            padding: 8px 14px; border-radius: var(--radius); border: var(--border-width) solid transparent;
            font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 13px;
            display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-family: var(--font-main);
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: var(--bg-card); color: var(--text-main); border-color: var(--border); }
        .btn-icon { padding: 8px; border-radius: 50%; width: 36px; height: 36px; }

        .input-group {
            background: var(--bg-card); padding: 15px; border-radius: var(--radius);
            display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px;
            border: var(--border-width) solid var(--border); align-items: center;
        }
        .main-input { background: transparent; border: none; color: var(--text-main); padding: 10px; flex: 1; min-width: 200px; outline: none; }
        .date-input, .select-input { background: var(--bg-body); border: 1px solid var(--border); color: var(--text-main); padding: 10px; border-radius: var(--radius); }

        /* Tasks */
        .task-card {
            background: var(--bg-card); border-radius: var(--radius); padding: 16px;
            border: 1px solid var(--border); border-left: 4px solid var(--border);
            margin-bottom: 10px; transition: all 0.2s; position: relative;
        }
        .priority-high { border-left-color: var(--danger); }
        .priority-medium { border-left-color: var(--warning); }
        .priority-low { border-left-color: var(--success); }

        .tag { padding: 2px 8px; border-radius: 10px; background: rgba(32, 128, 132, 0.15); color: var(--accent); font-size: 11px; font-weight: 600; margin-left: 5px; }

        /* Calendar Mobile Optimized */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 20px; }
        .cal-cell {
            background: var(--bg-card); border-radius: var(--radius); min-height: 80px; padding: 5px;
            border: 1px solid var(--border); overflow: hidden; position: relative;
        }
        .cal-task-dot {
            width: 100%; margin-bottom: 2px; padding: 2px; border-radius: 3px;
            font-size: 9px; background: var(--bg-input); color: var(--text-main);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        
        /* Habits */
        .habit-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .habit-card {
            background: var(--bg-card); padding: 15px; border-radius: var(--radius);
            border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between;
        }
        .streak-flame { color: #f59e0b; font-weight: bold; display: flex; align-items: center; gap: 5px; }

        /* Focus & Audio */
        .timer-circle {
            width: 220px; height: 220px; border-radius: 50%; border: 8px solid var(--bg-card);
            display: flex; align-items: center; justify-content: center; margin: 30px auto;
            font-size: 42px; font-weight: 700; background: radial-gradient(circle, var(--bg-sidebar) 0%, var(--bg-body) 100%);
        }
        .timer-active { border-color: var(--accent); box-shadow: 0 0 30px rgba(32, 128, 132, 0.4); }

        /* Filter Buttons */
        .filter-bar { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .filter-btn {
            background: var(--bg-card); border: 1px solid var(--border); color: var(--text-muted);
            padding: 4px 12px; border-radius: 15px; font-size: 11px; cursor: pointer; white-space: nowrap;
        }
        .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* Clock Widget */
        .clock-widget {
            font-family: 'Roboto Mono', monospace; font-size: 12px; color: var(--text-muted);
            text-align: right; display: flex; flex-direction: column; line-height: 1.2;
        }

        /* Chat */
        .chat-layout { display: flex; height: 500px; background: var(--bg-body); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
        .chat-main { flex: 1; display: flex; flex-direction: column; }
        .chat-msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .chat-msg { max-width: 80%; padding: 8px 12px; border-radius: 12px; font-size: 13px; word-wrap: break-word; }
        .chat-msg.them { background: var(--bg-card); align-self: flex-start; }
        .chat-msg.me { background: var(--accent); color: white; align-self: flex-end; }

        @media (max-width: 768px) {
            .sidebar { position: fixed; top: 0; left: 0; bottom: 0; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .menu-btn { display: block; }
            .cal-cell { min-height: 50px; }
            /* Mobile Calendar Fix */
            .cal-task-dot { display: none; } 
            .cal-cell.has-task::after {
                content: ''; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
                width: 6px; height: 6px; background-color: var(--accent); border-radius: 50%;
            }
            .chat-layout { flex-direction: column; }
        }
    </style>
    <style id="dynamic-theme-style"></style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="app.toggleSidebar()"></div>

<aside class="sidebar" id="sidebar">
    <div class="logo">
        <i class="fas fa-layer-group"></i> TaskPro 4.0
    </div>
    
    <nav>
        <button class="nav-link active" onclick="app.switchTab('dashboard')"><i class="fas fa-chart-pie"></i> Dashboard</button>
        <button class="nav-link" onclick="app.switchTab('tasks')"><i class="fas fa-tasks"></i> My Tasks</button>
        <button class="nav-link" onclick="app.switchTab('habits')"><i class="fas fa-check-circle"></i> Habits</button>
        <button class="nav-link" onclick="app.switchTab('calendar')"><i class="far fa-calendar-alt"></i> Calendar</button>
        <button class="nav-link" onclick="app.switchTab('focus')"><i class="fas fa-stopwatch"></i> Focus Mode</button>
        <button class="nav-link" onclick="app.switchTab('community')"><i class="fas fa-users"></i> Community</button>
    </nav>

    <div style="margin-top: auto;">
        <button class="btn btn-primary" style="width:100%; margin-bottom:10px;" onclick="app.manualSave()">
            <i class="fas fa-save"></i> Save Data
        </button>
        <div class="nav-link" style="cursor: default; opacity: 0.7;">
            <i class="fas fa-cloud"></i> <span id="syncText">Offline</span>
        </div>
        <button class="btn btn-secondary" style="width:100%; margin-top:5px;" id="authBtn" onclick="app.toggleAuth()">Sign In</button>
    </div>
</aside>

<main class="main">
    <header class="header">
        <div style="display:flex; align-items:center; gap:10px;">
            <button class="menu-btn" onclick="app.toggleSidebar()"><i class="fas fa-bars"></i></button>
            <h2 id="pageTitle" style="font-size: 18px;">Dashboard</h2>
        </div>
        
        <div class="header-actions">
            <div class="clock-widget" id="clockWidget">
                <span id="clockTime">--:--</span>
                <span id="clockLoc" style="font-size:10px; opacity:0.7;">Locating...</span>
            </div>
            <button class="btn btn-icon btn-secondary" onclick="app.toggleTheme()"><i class="fas fa-moon" id="themeIcon"></i></button>
        </div>
    </header>

    <div id="dashboard" class="view-container active">
        <div class="filter-bar">
            <button class="filter-btn active" onclick="app.filterDash('all', this)">All Time</button>
            <button class="filter-btn" onclick="app.filterDash('today', this)">Today</button>
            <button class="filter-btn" onclick="app.filterDash('week', this)">This Week</button>
            <button class="filter-btn" onclick="app.filterDash('month', this)">This Month</button>
        </div>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 20px;">
            <div class="task-card" style="text-align:center;">
                <div style="font-size:24px; font-weight:700; color:var(--accent);" id="dashTotal">0</div>
                <div style="font-size:11px; opacity:0.7;">TOTAL</div>
            </div>
            <div class="task-card" style="text-align:center;">
                <div style="font-size:24px; font-weight:700; color:var(--success);" id="dashDone">0</div>
                <div style="font-size:11px; opacity:0.7;">COMPLETED</div>
            </div>
            <div class="task-card" style="text-align:center;">
                <div style="font-size:24px; font-weight:700; color:var(--warning);" id="dashPending">0</div>
                <div style="font-size:11px; opacity:0.7;">PENDING</div>
            </div>
        </div>

        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap:20px;">
            <div class="task-card">
                <h3>Productivity Trend</h3>
                <div style="height: 200px;"><canvas id="mainChart"></canvas></div>
            </div>
            <div class="task-card">
                <h3>Hashtag Performance</h3>
                <div style="height: 200px;"><canvas id="tagChart"></canvas></div>
            </div>
        </div>
    </div>

    <div id="tasks" class="view-container">
        <div class="input-group">
            <input type="hidden" id="editTaskId">
            <input type="text" id="taskInput" class="main-input" placeholder="New task... (Use #tag)">
            <input type="date" id="dateInput" class="date-input">
            <select id="prioInput" class="select-input">
                <option value="medium">Medium</option>
                <option value="high">High</option>
                <option value="low">Low</option>
            </select>
            <button class="btn btn-primary" onclick="app.addTask()"><i class="fas fa-plus"></i></button>
        </div>

        <div id="taskList" style="padding-bottom: 20px;"></div>

        <div style="margin-top:30px;">
            <button class="btn btn-secondary" onclick="document.getElementById('completedList').style.display = document.getElementById('completedList').style.display === 'none' ? 'block' : 'none'" style="width:100%; justify-content:space-between;">
                <span>Show Completed History</span> <i class="fas fa-chevron-down"></i>
            </button>
            <div id="completedList" style="display:none; margin-top:10px; opacity:0.7;"></div>
        </div>
    </div>

    <div id="habits" class="view-container">
        <div class="input-group">
            <input type="text" id="habitInput" class="main-input" placeholder="New Habit (e.g. Read 10 pages)">
            <button class="btn btn-primary" onclick="app.addHabit()">Add Habit</button>
        </div>
        <div class="habit-grid" id="habitList"></div>
    </div>

    <div id="calendar" class="view-container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 id="calMonthYear"></h2>
            <div>
                <button class="btn btn-secondary btn-icon" onclick="app.changeMonth(-1)"><i class="fas fa-chevron-left"></i></button>
                <button class="btn btn-secondary btn-icon" onclick="app.changeMonth(1)"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>
        <div class="calendar-grid" id="calGrid"></div>
        <div style="margin-top:10px; font-size:12px; color:var(--text-muted); text-align:center;">
            * On mobile, dots indicate tasks. Click day to view in Tasks tab.
        </div>
    </div>

    <div id="focus" class="view-container">
        <div style="text-align:center; max-width:500px; margin:0 auto;">
            <h2>Deep Work</h2>
            
            <div style="margin: 20px 0;">
                <label style="display:block; font-size:12px; margin-bottom:5px; color:var(--text-muted);">Select Task to Focus On:</label>
                <select id="focusTaskSelect" class="select-input" style="width:100%; max-width:300px;">
                    <option value="">-- General Focus --</option>
                </select>
            </div>

            <div class="timer-circle" id="timerCircle">
                <span id="timerDisplay">25:00</span>
            </div>

            <div style="display:flex; justify-content:center; gap:10px; margin-bottom:20px;">
                <button class="btn btn-primary" onclick="focusMode.start()">Start</button>
                <button class="btn btn-secondary" onclick="focusMode.pause()">Pause</button>
                <button class="btn btn-secondary btn-danger" onclick="focusMode.reset()">Reset</button>
            </div>

            <div style="display:flex; justify-content:center; gap:10px;">
                <button class="btn btn-secondary" onclick="focusMode.toggleNoise('white')"><i class="fas fa-wave-square"></i> White Noise</button>
                <button class="btn btn-secondary" onclick="focusMode.toggleNoise('brown')"><i class="fas fa-water"></i> Deep Noise</button>
            </div>
        </div>
    </div>

    <div id="community" class="view-container">
        <div class="task-card" style="margin-bottom:20px;">
            <h3><i class="fas fa-trophy" style="color:#fbbf24;"></i> Leaderboard</h3>
            <table style="width:100%; text-align:left; margin-top:10px; font-size:14px; border-collapse:collapse;">
                <tbody id="leaderboardBody">
                    </tbody>
            </table>
        </div>

        <div class="chat-layout">
            <div class="chat-main">
                <div style="padding:10px; border-bottom:1px solid var(--border); font-weight:bold;">Global Chat Room</div>
                <div class="chat-msgs" id="chatMsgs"></div>
                <div style="padding:10px; border-top:1px solid var(--border); display:flex; gap:10px;">
                    <input type="text" id="chatInput" class="main-input" placeholder="Type message..." onkeydown="if(event.key==='Enter') app.sendMsg()">
                    <button class="btn btn-primary" onclick="app.sendMsg()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

</main>

<div id="authModal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; display:none; align-items:center; justify-content:center;">
    <div style="background:var(--bg-card); padding:30px; border-radius:16px; width:300px; text-align:center;">
        <h3>Cloud Sync</h3>
        <p style="font-size:12px; margin-bottom:15px; color:var(--text-muted);">Sign in to sync tasks & chat real-time.</p>
        <input type="email" id="authEmail" class="main-input" placeholder="Email" style="border:1px solid var(--border); margin-bottom:10px; width:100%;">
        <input type="password" id="authPass" class="main-input" placeholder="Password" style="border:1px solid var(--border); margin-bottom:20px; width:100%;">
        <div style="display:flex; gap:10px;">
            <button class="btn btn-primary" style="flex:1" onclick="app.login()">Login</button>
            <button class="btn btn-secondary" style="flex:1" onclick="app.register()">Sign Up</button>
        </div>
        <button class="btn" style="margin-top:10px; background:none; color:var(--text-muted);" onclick="document.getElementById('authModal').style.display='none'">Close</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, where, orderBy, limit, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCoCFw0hezldX3t33AYa1ytddYMuQCWliM",
        authDomain: "daily-todo-1e4ad.firebaseapp.com",
        projectId: "daily-todo-1e4ad",
        storageBucket: "daily-todo-1e4ad.firebasestorage.app",
        messagingSenderId: "629797690976",
        appId: "1:629797690976:web:fda66df1691eb920e12d05"
    };

    const appInit = initializeApp(firebaseConfig);
    const auth = getAuth(appInit);
    const db = getFirestore(appInit);

    const state = {
        user: null,
        tasks: JSON.parse(localStorage.getItem('tasks')) || [],
        habits: JSON.parse(localStorage.getItem('habits')) || [],
        currentDate: new Date(),
        charts: {},
        audioCtx: null,
        oscillator: null,
        location: 'Unknown'
    };

    window.app = {
        // === CORE ===
        init: () => {
            app.renderAll();
            app.getLocation();
            setInterval(app.updateClock, 1000);
            
            // Listen for Global Chat regardless of login (ReadOnly) or RW if logged in
            const chatQ = query(collection(db, 'global_chat'), orderBy('createdAt', 'desc'), limit(50));
            onSnapshot(chatQ, snapshot => {
                const msgs = snapshot.docs.map(d => d.data()).reverse();
                const box = document.getElementById('chatMsgs');
                box.innerHTML = msgs.map(m => `
                    <div class="chat-msg ${state.user && m.uid === state.user.uid ? 'me' : 'them'}">
                        <strong>${m.user.split('@')[0]}</strong>: ${m.text}
                    </div>
                `).join('');
                box.scrollTop = box.scrollHeight;
            });
        },

        manualSave: () => {
            localStorage.setItem('tasks', JSON.stringify(state.tasks));
            localStorage.setItem('habits', JSON.stringify(state.habits));
            alert("Data saved securely to local storage!");
        },

        getLocation: () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        // Simple timezone approximation
                        const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
                        state.location = tz;
                        document.getElementById('clockLoc').textContent = tz.replace('_', ' ');
                    }, 
                    () => document.getElementById('clockLoc').textContent = "Location Denied"
                );
            }
        },

        updateClock: () => {
            const now = new Date();
            document.getElementById('clockTime').textContent = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        },

        toggleSidebar: () => {
            document.getElementById('sidebar').classList.toggle('open');
            const overlay = document.getElementById('sidebarOverlay');
            overlay.style.display = overlay.style.display === 'block' ? 'none' : 'block';
        },

        switchTab: (id) => {
            document.querySelectorAll('.view-container').forEach(e => e.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('pageTitle').textContent = id.charAt(0).toUpperCase() + id.slice(1);
            if(window.innerWidth <= 768) app.toggleSidebar();
            if(id === 'dashboard') app.filterDash('all');
            if(id === 'focus') app.populateFocusDropdown();
        },

        // === TASKS ===
        addTask: async () => {
            const input = document.getElementById('taskInput');
            const text = input.value.trim();
            if(!text) return;
            
            const task = {
                id: 't_' + Date.now(),
                text: text,
                completed: false,
                date: document.getElementById('dateInput').value || new Date().toISOString().split('T')[0],
                priority: document.getElementById('prioInput').value,
                tags: (text.match(/#\w+/g) || []).map(t => t.replace('#','')),
                createdAt: Date.now()
            };

            if(state.user) {
                await addDoc(collection(db, 'tasks'), { ...task, uid: state.user.uid });
            } else {
                state.tasks.push(task);
                app.manualSave();
                app.renderAll();
            }
            input.value = '';
        },

        toggleTask: async (id) => {
            const t = state.tasks.find(x => x.id === id);
            if(state.user) {
                // Find doc id logic omitted for brevity, assuming local sync handles UI
                // In real app, need doc ID mapping. For this file, we update local + reload
            }
            t.completed = !t.completed;
            app.manualSave();
            app.renderAll();
        },

        deleteTask: (id) => {
            if(!confirm("Delete?")) return;
            state.tasks = state.tasks.filter(x => x.id !== id);
            app.manualSave();
            app.renderAll();
        },

        // === HABITS ===
        addHabit: () => {
            const input = document.getElementById('habitInput');
            if(!input.value) return;
            state.habits.push({
                id: 'h_' + Date.now(),
                title: input.value,
                streak: 0,
                lastDone: null
            });
            input.value = '';
            app.manualSave();
            app.renderHabits();
        },

        toggleHabit: (id) => {
            const h = state.habits.find(x => x.id === id);
            const today = new Date().toISOString().split('T')[0];
            
            if (h.lastDone === today) {
                h.lastDone = null;
                h.streak = Math.max(0, h.streak - 1);
            } else {
                // Check if broken streak (missed yesterday) logic could be here
                h.lastDone = today;
                h.streak++;
            }
            app.manualSave();
            app.renderHabits();
        },

        // === RENDERERS ===
        renderAll: () => {
            app.renderTasks();
            app.renderHabits();
            app.renderCalendar();
            app.renderLeaderboard();
        },

        renderTasks: () => {
            const list = document.getElementById('taskList');
            const doneList = document.getElementById('completedList');
            list.innerHTML = ''; doneList.innerHTML = '';

            const sorted = state.tasks.sort((a,b) => b.createdAt - a.createdAt);
            
            sorted.forEach(t => {
                const html = `
                    <div class="task-card priority-${t.priority}" style="opacity: ${t.completed ? 0.7 : 1}">
                        <div style="display:flex; align-items:flex-start; gap:10px;">
                            <input type="checkbox" ${t.completed ? 'checked' : ''} onchange="app.toggleTask('${t.id}')" style="width:20px; height:20px; margin-top:3px;">
                            <div style="flex:1;">
                                <div style="font-weight:600; text-decoration:${t.completed?'line-through':''}">${t.text.replace(/#\w+/g,'')} 
                                    ${t.tags.map(tag => `<span class="tag">#${tag}</span>`).join('')}
                                </div>
                                <div style="font-size:11px; color:var(--text-muted); margin-top:5px;">
                                    <i class="far fa-calendar"></i> ${t.date} • ${t.priority.toUpperCase()}
                                </div>
                            </div>
                            <button onclick="app.deleteTask('${t.id}')" style="background:none; border:none; color:var(--danger);"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
                if(t.completed) doneList.insertAdjacentHTML('beforeend', html);
                else list.insertAdjacentHTML('beforeend', html);
            });
        },

        renderHabits: () => {
            const grid = document.getElementById('habitList');
            grid.innerHTML = '';
            const today = new Date().toISOString().split('T')[0];

            state.habits.forEach(h => {
                const isDone = h.lastDone === today;
                grid.innerHTML += `
                    <div class="habit-card" style="border-color: ${isDone ? 'var(--success)' : 'var(--border)'}">
                        <div>
                            <div style="font-weight:600;">${h.title}</div>
                            <div class="streak-flame"><i class="fas fa-fire"></i> ${h.streak} Day Streak</div>
                        </div>
                        <button class="btn ${isDone ? 'btn-primary' : 'btn-secondary'}" onclick="app.toggleHabit('${h.id}')">
                            <i class="fas ${isDone ? 'fa-check' : 'fa-plus'}"></i>
                        </button>
                    </div>
                `;
            });
        },

        renderCalendar: () => {
            const grid = document.getElementById('calGrid');
            const d = state.currentDate;
            const year = d.getFullYear();
            const month = d.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const firstDay = new Date(year, month, 1).getDay();

            document.getElementById('calMonthYear').textContent = d.toLocaleString('default', {month:'long', year:'numeric'});
            
            grid.innerHTML = `
                <div style="text-align:center; font-size:10px; opacity:0.7">Sun</div>
                <div style="text-align:center; font-size:10px; opacity:0.7">Mon</div>
                <div style="text-align:center; font-size:10px; opacity:0.7">Tue</div>
                <div style="text-align:center; font-size:10px; opacity:0.7">Wed</div>
                <div style="text-align:center; font-size:10px; opacity:0.7">Thu</div>
                <div style="text-align:center; font-size:10px; opacity:0.7">Fri</div>
                <div style="text-align:center; font-size:10px; opacity:0.7">Sat</div>
            `;
            
            for(let i=0; i<firstDay; i++) grid.innerHTML += `<div></div>`;

            for(let day=1; day<=daysInMonth; day++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                const dayTasks = state.tasks.filter(t => t.date === dateStr);
                const hasTask = dayTasks.length > 0;
                
                // Mobile dot logic handled in CSS via .cal-cell.has-task
                const dots = dayTasks.map(t => `<div class="cal-task-dot" style="text-decoration:${t.completed?'line-through':''}">${t.text}</div>`).join('');
                
                grid.innerHTML += `
                    <div class="cal-cell ${hasTask ? 'has-task' : ''}" onclick="app.switchTab('tasks'); document.getElementById('taskInput').focus();">
                        <div style="font-size:12px; font-weight:bold; margin-bottom:4px;">${day}</div>
                        ${dots}
                    </div>
                `;
            }
        },

        renderLeaderboard: () => {
            const body = document.getElementById('leaderboardBody');
            // Simulation mixed with real user if exists
            const simUsers = [
                {name: 'Sarah C.', score: 1240},
                {name: 'Mike D.', score: 980},
                {name: 'You', score: state.tasks.filter(t=>t.completed).length * 10}
            ];
            const sorted = simUsers.sort((a,b) => b.score - a.score);
            body.innerHTML = sorted.map((u, i) => `
                <tr style="border-bottom:1px solid var(--border)">
                    <td style="padding:10px;">#${i+1}</td>
                    <td>${u.name}</td>
                    <td style="text-align:right;">${u.score} pts</td>
                </tr>
            `).join('');
        },

        // === DASHBOARD & ANALYTICS ===
        filterDash: (range, btn) => {
            if(btn) {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            
            let filtered = state.tasks;
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];

            if(range === 'today') filtered = state.tasks.filter(t => t.date === todayStr);
            if(range === 'week') {
                const weekAgo = new Date(now.setDate(now.getDate() - 7));
                filtered = state.tasks.filter(t => new Date(t.date) >= weekAgo);
            }
            if(range === 'month') {
                 filtered = state.tasks.filter(t => new Date(t.date).getMonth() === new Date().getMonth());
            }

            // Stats
            document.getElementById('dashTotal').textContent = filtered.length;
            document.getElementById('dashDone').textContent = filtered.filter(t=>t.completed).length;
            document.getElementById('dashPending').textContent = filtered.filter(t=>!t.completed).length;

            app.renderCharts(filtered);
        },

        renderCharts: (data) => {
            // Main Chart
            const ctx1 = document.getElementById('mainChart').getContext('2d');
            if(state.charts.main) state.charts.main.destroy();
            state.charts.main = new Chart(ctx1, {
                type: 'bar',
                data: {
                    labels: ['Pending', 'Completed'],
                    datasets: [{
                        label: 'Tasks',
                        data: [data.filter(t=>!t.completed).length, data.filter(t=>t.completed).length],
                        backgroundColor: ['#f59e0b', '#10b981']
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            // Tag Chart
            const tags = {};
            data.forEach(t => t.tags.forEach(tag => tags[tag] = (tags[tag] || 0) + 1));
            const ctx2 = document.getElementById('tagChart').getContext('2d');
            if(state.charts.tags) state.charts.tags.destroy();
            state.charts.tags = new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(tags),
                    datasets: [{
                        data: Object.values(tags),
                        backgroundColor: ['#208084', '#ef4444', '#f59e0b', '#10b981', '#6366f1']
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
            });
        },

        // === CHAT ===
        sendMsg: async () => {
            if(!state.user) { alert("Please Sign In to chat!"); app.toggleAuth(); return; }
            const input = document.getElementById('chatInput');
            if(!input.value.trim()) return;

            await addDoc(collection(db, 'global_chat'), {
                text: input.value,
                uid: state.user.uid,
                user: state.user.email,
                createdAt: serverTimestamp()
            });
            input.value = '';
        },

        // === UTILS ===
        changeMonth: (off) => { state.currentDate.setMonth(state.currentDate.getMonth() + off); app.renderCalendar(); },
        toggleTheme: () => {
            const html = document.documentElement;
            html.setAttribute('data-theme', html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        },
        toggleAuth: () => {
            if(state.user) signOut(auth);
            else document.getElementById('authModal').style.display = 'flex';
        },
        login: async () => {
            try { await signInWithEmailAndPassword(auth, document.getElementById('authEmail').value, document.getElementById('authPass').value); document.getElementById('authModal').style.display = 'none'; } catch(e){ alert(e.message); }
        },
        register: async () => {
            try { await createUserWithEmailAndPassword(auth, document.getElementById('authEmail').value, document.getElementById('authPass').value); document.getElementById('authModal').style.display = 'none'; } catch(e){ alert(e.message); }
        },
        
        populateFocusDropdown: () => {
            const sel = document.getElementById('focusTaskSelect');
            sel.innerHTML = '<option value="">-- General Focus --</option>';
            state.tasks.filter(t => !t.completed).forEach(t => {
                sel.innerHTML += `<option value="${t.id}">${t.text}</option>`;
            });
        }
    };

    // === FOCUS MODE & AUDIO ===
    window.focusMode = {
        interval: null,
        timeLeft: 1500,
        start: () => {
            if(focusMode.interval) return;
            document.getElementById('timerCircle').classList.add('timer-active');
            focusMode.interval = setInterval(() => {
                focusMode.timeLeft--;
                const m = Math.floor(focusMode.timeLeft/60).toString().padStart(2,'0');
                const s = (focusMode.timeLeft%60).toString().padStart(2,'0');
                document.getElementById('timerDisplay').textContent = `${m}:${s}`;
                if(focusMode.timeLeft <= 0) {
                    focusMode.reset();
                    new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg').play();
                    alert("Focus Session Complete!");
                    // If task selected, mark done? (Optional, just logging for now)
                }
            }, 1000);
        },
        pause: () => {
            clearInterval(focusMode.interval);
            focusMode.interval = null;
            document.getElementById('timerCircle').classList.remove('timer-active');
            if(state.oscillator) { state.oscillator.stop(); state.oscillator = null; }
        },
        reset: () => {
            focusMode.pause();
            focusMode.timeLeft = 1500;
            document.getElementById('timerDisplay').textContent = "25:00";
        },
        toggleNoise: (type) => {
            if(state.oscillator) { state.oscillator.stop(); state.oscillator = null; return; }
            // Simple Web Audio Noise Generation
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const bufferSize = ctx.sampleRate * 2;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                const white = Math.random() * 2 - 1;
                data[i] = (lastOut + (0.02 * white)) / 1.02;
                lastOut = data[i];
                data[i] *= 3.5; 
            }
            let lastOut = 0;
            
            const noise = ctx.createBufferSource();
            noise.buffer = buffer;
            noise.loop = true;
            const gain = ctx.createGain();
            gain.gain.value = 0.05;
            noise.connect(gain);
            gain.connect(ctx.destination);
            noise.start();
            state.oscillator = noise;
        }
    };

    // Init Auth Listener
    onAuthStateChanged(auth, user => {
        state.user = user;
        document.getElementById('authBtn').textContent = user ? "Sign Out" : "Sign In";
        document.getElementById('syncText').textContent = user ? "Synced" : "Offline";
        if(user) {
            // Fetch real tasks
             onSnapshot(query(collection(db, 'tasks'), where('uid','==',user.uid)), s => {
                 state.tasks = s.docs.map(d => ({id:d.id, ...d.data()}));
                 app.renderAll();
             });
        }
    });

    // Start
    app.init();
</script>
</body>
</html>
