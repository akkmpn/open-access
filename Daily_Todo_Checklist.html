<!DOCTYPE html>
<html lang="en" data-theme="dark" data-design="default" data-layout="sidebar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TaskPro Ultimate: Unified v3.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* ==================== 1. CORE VARIABLES (Base) ==================== */
        :root {
            /* DYNAMIC ENGINE VARIABLES (For Magic Mode) */
            --hue: 200;
            --sat: 50%;
            --light: 10%;

            /* DEFAULT (ENTERPRISE) */
            --bg-body: #0f172a;
            --bg-sidebar: #1e293b;
            --bg-card: #334155;
            --bg-input: #1e293b;
            --bg-hover: rgba(255,255,255,0.05);
            --accent: #208084;
            --accent-hover: #2ba8ad;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #475569;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --radius: 10px;
            --font-main: 'Inter', sans-serif;
            --border-width: 1px;
        }

        /* ==================== 2. LAYOUT ENGINES (From File 2) ==================== */
        
        /* STANDARD SIDEBAR */
        [data-layout="sidebar"] body { display: flex; }
        [data-layout="sidebar"] .sidebar { width: 260px; height: 100vh; }
        [data-layout="sidebar"] .bottom-nav { display: none; }

        /* FLOATING ISLAND */
        [data-layout="island"] body {
            padding: 20px; align-items: center; justify-content: center;
            background: linear-gradient(135deg, var(--bg-body), var(--bg-card));
        }
        [data-layout="island"] .sidebar {
            width: 80px; height: 90vh; border-radius: var(--radius); margin-right: 20px;
            padding: 20px 0; align-items: center;
        }
        [data-layout="island"] .logo span, [data-layout="island"] .nav-link span { display: none; }
        [data-layout="island"] .nav-link { justify-content: center; padding: 15px; }
        [data-layout="island"] .main {
            height: 90vh; border-radius: var(--radius); border: 1px solid var(--border);
            box-shadow: var(--shadow); overflow: hidden;
        }
        [data-layout="island"] .bottom-nav { display: none; }

        /* ==================== 3. WEB DESIGN ALGORITHMS (THEMES) ==================== */
        
        /* MAGIC MODE (From File 2 - Dynamic HSL) */
        [data-design="magic"] {
            --bg-body: hsl(var(--hue), var(--sat), var(--light));
            --bg-sidebar: hsl(var(--hue), 30%, calc(var(--light) + 5%));
            --bg-card: hsl(var(--hue), 20%, calc(var(--light) + 10%));
            --accent: hsl(calc(var(--hue) + 180), 70%, 50%);
            --text-main: #ffffff;
            --text-muted: #cbd5e1;
            --border: rgba(255,255,255,0.1);
        }

        /* DESIGN 2: CYBERPUNK (From File 1) */
        [data-design="cyberpunk"] {
            --bg-body: #050505; --bg-sidebar: #000000; --bg-card: #111111; --bg-input: #000000;
            --accent: #00ff41; --accent-hover: #00cc33; --text-main: #00ff41; --text-muted: #008f11;
            --border: #00ff41; --success: #00ff41; --danger: #ff0055; --warning: #efff00;
            --radius: 0px; --font-main: 'Courier New', monospace; --shadow: 0 0 10px rgba(0, 255, 65, 0.2);
        }

        /* DESIGN 3: NEUBRUTALISM (From File 1) */
        [data-design="brutalist"] {
            --bg-body: #e0e7ff; --bg-sidebar: #a5b4fc; --bg-card: #ffffff; --bg-input: #ffffff;
            --accent: #4f46e5; --text-main: #000000; --text-muted: #444444; --border: #000000;
            --radius: 4px; --shadow: 4px 4px 0px #000000; --font-main: 'Arial Black', sans-serif; --border-width: 2px;
        }

        /* DESIGN 4: MINIMALIST (From File 1) */
        [data-design="minimal"] {
            --bg-body: #ffffff; --bg-sidebar: #f8f9fa; --bg-card: #ffffff; --bg-input: #f8f9fa;
            --accent: #000000; --accent-hover: #333333; --text-main: #111111; --text-muted: #888888;
            --border: #eeeeee; --shadow: none; --radius: 0px; --font-main: 'Georgia', serif;
        }

        /* DESIGN 5: GLASSMORPHISM (From File 1) */
        [data-design="glass"] {
            --bg-body: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bg-sidebar: rgba(255, 255, 255, 0.1); --bg-card: rgba(255, 255, 255, 0.15);
            --bg-input: rgba(0, 0, 0, 0.2); --accent: #ffffff; --text-main: #ffffff; --text-muted: #e2e8f0;
            --border: rgba(255, 255, 255, 0.2); --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37); --radius: 16px;
        }
        [data-design="glass"] .sidebar, [data-design="glass"] .task-card { backdrop-filter: blur(8px); }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: var(--font-main);
            background: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            transition: background 0.3s, color 0.3s, font-family 0.3s;
        }

        /* ==================== UI COMPONENTS ==================== */
        .sidebar {
            background: var(--bg-sidebar);
            border-right: var(--border-width) solid var(--border);
            display: flex; flex-direction: column; padding: 20px;
            transition: transform 0.3s ease; z-index: 50;
        }

        .logo { font-size: 20px; font-weight: 800; color: var(--text-main); margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
        .logo i { color: var(--accent); }

        .nav-link {
            display: flex; align-items: center; gap: 12px; padding: 12px 15px;
            color: var(--text-muted); text-decoration: none; border-radius: var(--radius);
            margin-bottom: 5px; transition: 0.2s; cursor: pointer; font-size: 14px; font-weight: 500;
            border: none; background: none; width: 100%; text-align: left; font-family: var(--font-main);
        }
        .nav-link:hover { background: var(--bg-hover); color: var(--text-main); }
        .nav-link.active { background: var(--accent); color: white; box-shadow: var(--shadow); }

        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; width: 100%; background: var(--bg-body); }

        .header {
            height: 60px; border-bottom: var(--border-width) solid var(--border);
            display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
            background: var(--bg-body); flex-shrink: 0;
        }

        .icon-btn-header {
            background: var(--bg-card); border: var(--border-width) solid var(--border); color: var(--text-muted);
            width: 36px; height: 36px; border-radius: var(--radius); display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s; box-shadow: var(--shadow); margin-left: 5px;
        }
        .icon-btn-header:hover { color: var(--accent); border-color: var(--accent); }

        .view-container { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 20px; display: none; animation: fadeIn 0.3s ease; }
        .view-container.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Buttons & Inputs */
        .btn {
            padding: 10px 16px; border-radius: var(--radius); border: none; font-weight: 600;
            cursor: pointer; transition: 0.2s; font-size: 13px; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            font-family: var(--font-main); box-shadow: var(--shadow);
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { filter: brightness(1.1); }
        .btn-secondary { background: var(--bg-card); color: var(--text-main); border: var(--border-width) solid var(--border); }
        .btn-icon { padding: 8px; border-radius: 50%; width: 36px; height: 36px; }
        .btn-danger { color: var(--danger); background: rgba(239, 68, 68, 0.1); }

        .input-group {
            background: var(--bg-card); padding: 15px; border-radius: var(--radius); display: flex; flex-wrap: wrap; gap: 10px;
            margin-bottom: 20px; border: var(--border-width) solid var(--border); align-items: center; box-shadow: var(--shadow);
        }
        .main-input {
            background: transparent; border: none; color: var(--text-main); padding: 10px; flex: 1; min-width: 200px; outline: none; font-size: 16px; font-family: var(--font-main);
        }
        .date-input, .select-input {
            background: var(--bg-body); border: var(--border-width) solid var(--border); color: var(--text-main);
            padding: 10px 12px; border-radius: 6px; outline: none; font-size: 14px; font-family: var(--font-main);
        }

        /* Task Cards (Restored from File 1) */
        .task-list { display: flex; flex-direction: column; gap: 12px; padding-bottom: 80px; }
        .task-card {
            background: var(--bg-card); border-radius: var(--radius); padding: 16px;
            border: var(--border-width) solid var(--border); border-left: 4px solid var(--border);
            transition: all 0.2s; box-shadow: var(--shadow);
        }
        .task-header { display: flex; align-items: flex-start; gap: 15px; }
        .checkbox {
            appearance: none; width: 24px; height: 24px; border: 2px solid var(--text-muted);
            border-radius: 6px; cursor: pointer; flex-shrink: 0; position: relative;
        }
        .checkbox:checked { background: var(--accent); border-color: var(--accent); }
        .checkbox:checked::after { content: '✓'; position: absolute; color: white; font-size: 14px; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .task-title { font-size: 15px; margin-bottom: 5px; line-height: 1.4; color: var(--text-main); }
        .tag { padding: 2px 8px; border-radius: 10px; background: rgba(32, 128, 132, 0.15); color: var(--accent); font-size: 11px; font-weight: 600; white-space: nowrap;}
        .priority-high { border-left-color: var(--danger); }
        .priority-medium { border-left-color: var(--warning); }
        .priority-low { border-left-color: var(--success); }

        /* Subtasks (Restored from File 1) */
        .subtasks { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
        .subtask-row { display: flex; align-items: center; gap: 12px; font-size: 14px; padding-left: 5px; }

        /* Suggestions & History */
        .suggestions { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 10px; }
        .suggestion-chip {
            padding: 6px 14px; background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 20px; font-size: 12px; cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 8px; color: var(--text-muted);
        }

        /* Focus Timer (Restored from File 1) */
        .timer-circle {
            width: 220px; height: 220px; border-radius: 50%; border: 8px solid var(--bg-card);
            display: flex; align-items: center; justify-content: center; margin: 30px auto;
            font-size: 42px; font-weight: 700; background: radial-gradient(circle, var(--bg-sidebar) 0%, var(--bg-body) 100%);
            box-shadow: var(--shadow); color: var(--text-main); transition: 0.3s;
        }
        .timer-active { border-color: var(--accent); box-shadow: 0 0 30px rgba(32, 128, 132, 0.4); }

        /* Calendar (Restored from File 1) */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 20px; }
        .cal-day-header { text-align: center; font-size: 11px; color: var(--text-muted); padding-bottom: 5px; }
        .cal-cell {
            background: var(--bg-card); border-radius: 6px; min-height: 80px; padding: 5px;
            border: 1px solid var(--border); position: relative; overflow: hidden;
        }
        .cal-cell.today { border-color: var(--accent); background: rgba(32, 128, 132, 0.05); }
        .cal-task-dot {
            width: 100%; margin-bottom: 2px; padding: 2px; border-radius: 3px; font-size: 9px;
            background: var(--bg-input); color: var(--text-main); white-space: nowrap; overflow: hidden;
        }

        /* Chat (Enhanced with File 2 Styles) */
        .chat-container { display: flex; flex-direction: column; height: 450px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-body); overflow: hidden; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .chat-msg { max-width: 80%; padding: 8px 12px; border-radius: 12px; font-size: 13px; line-height: 1.4; }
        .chat-msg.them { background: var(--bg-card); align-self: flex-start; border-bottom-left-radius: 0; border: 1px solid var(--border); }
        .chat-msg.me { background: var(--accent); color: white; align-self: flex-end; border-bottom-right-radius: 0; }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .sidebar { position: fixed; top: 0; left: 0; bottom: 0; transform: translateX(-100%); box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
            .sidebar.open { transform: translateX(0); }
            [data-layout="island"] .sidebar { display: none; }
            [data-layout="island"] .main { width: 100%; height: 100vh; border-radius: 0; border: none; }
            .timer-circle { width: 180px; height: 180px; font-size: 36px; border-width: 6px; }
        }
    </style>
</head>
<body>

    <div style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:40; display:none; backdrop-filter:blur(2px);" id="sidebarOverlay" onclick="app.toggleSidebar()"></div>

    <aside class="sidebar" id="sidebar">
        <div class="logo">
            <i class="fas fa-layer-group"></i> TaskPro ∞
        </div>
        
        <nav>
            <button class="nav-link active" onclick="app.switchTab('dashboard')"><i class="fas fa-chart-pie"></i> Dashboard</button>
            <button class="nav-link" onclick="app.switchTab('tasks')">
                <i class="fas fa-tasks"></i> My Tasks
                <span id="badge" style="margin-left:auto; background:var(--accent); padding:2px 8px; border-radius:10px; font-size:10px; color: white;">0</span>
            </button>
            <button class="nav-link" onclick="app.switchTab('calendar')"><i class="far fa-calendar-alt"></i> Calendar</button>
            <button class="nav-link" onclick="app.switchTab('focus')"><i class="fas fa-stopwatch"></i> Focus Mode</button>
            <button class="nav-link" onclick="app.switchTab('community')"><i class="fas fa-users"></i> Community</button>
        </nav>

        <div style="margin-top: auto;">
            <button class="nav-link" onclick="app.backupData()"><i class="fas fa-download"></i> Backup Data</button>
            <div class="nav-link" style="cursor: default; opacity: 0.7;">
                <i class="fas fa-cloud"></i> <span id="syncText">Offline</span>
            </div>
            <button class="btn btn-secondary" style="width:100%; margin-top:10px;" id="authBtn" onclick="app.toggleAuth()">Sign In</button>
        </div>
    </aside>

    <main class="main">
        <header class="header">
            <div style="display:flex; align-items:center; gap:10px;">
                <button class="btn btn-icon" style="background:transparent; color:var(--text-main); display:none; @media(max-width:768px){display:block;}" onclick="app.toggleSidebar()">
                    <i class="fas fa-bars"></i>
                </button>
                <h2 id="pageTitle" style="color:var(--text-main); font-size: 18px;">Dashboard</h2>
            </div>
            
            <div style="display:flex; align-items:center; gap:5px;">
                <button class="icon-btn-header" onclick="app.magicDesign()" title="Magic Random Design"><i class="fas fa-magic"></i></button>
                <button class="icon-btn-header" onclick="app.cycleDesign()" title="Cycle Design Theme"><i class="fas fa-palette"></i></button>
                <button class="icon-btn-header" onclick="app.toggleLayout()" title="Switch Layout"><i class="fas fa-columns"></i></button>
                <div style="margin-left:10px; width: 8px; height: 8px; border-radius: 50%; background: var(--warning);" id="syncDot"></div>
            </div>
        </header>

        <div id="dashboard" class="view-container active">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 30px;">
                <div class="task-card" style="text-align:center;">
                    <div style="font-size:28px; font-weight:700; color:var(--accent);" id="dashTotal">0</div>
                    <div style="color:var(--text-muted); font-size:11px;">TOTAL TASKS</div>
                </div>
                <div class="task-card" style="text-align:center;">
                    <div style="font-size:28px; font-weight:700; color:var(--success);" id="dashDone">0</div>
                    <div style="color:var(--text-muted); font-size:11px;">COMPLETED</div>
                </div>
                <div class="task-card" style="text-align:center;">
                    <div style="font-size:28px; font-weight:700; color:var(--warning);" id="dashPending">0</div>
                    <div style="color:var(--text-muted); font-size:11px;">PENDING</div>
                </div>
            </div>
            <div class="task-card">
                <h3 style="margin-bottom:15px; color:var(--text-main);">Productivity Trend</h3>
                <div style="height: 250px;"><canvas id="mainChart"></canvas></div>
            </div>
        </div>

        <div id="tasks" class="view-container">
            <div class="suggestions" id="suggestionsBox"></div>
            <div class="input-group">
                <input type="hidden" id="editTaskId">
                <input type="text" id="taskInput" class="main-input" placeholder="Add a task... (Use #tag)">
                <input type="date" id="dateInput" class="date-input">
                <select id="prioInput" class="select-input">
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                    <option value="low">Low</option>
                </select>
                <button class="btn btn-primary" id="addUpdateBtn" onclick="app.handleTaskSubmit()">
                    <i class="fas fa-plus"></i> Add
                </button>
                <button class="btn btn-secondary" id="cancelEditBtn" style="display:none;" onclick="app.cancelEdit()">Cancel</button>
            </div>
            <div id="taskList" class="task-list"></div>
        </div>

        <div id="calendar" class="view-container">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h2 id="calMonthYear" style="font-size:18px;">January 2026</h2>
                <div style="display:flex; gap:5px;">
                    <button class="btn btn-secondary btn-icon" onclick="app.changeMonth(-1)"><i class="fas fa-chevron-left"></i></button>
                    <button class="btn btn-secondary btn-icon" onclick="app.changeMonth(1)"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
            <div class="calendar-grid" id="calGrid"></div>
        </div>

        <div id="focus" class="view-container">
            <div style="text-align:center; max-width:500px; margin:0 auto;">
                <h2>Deep Work</h2>
                <div id="sessionCount" style="color:var(--text-muted); font-size:12px; margin-bottom:15px;">Sessions: 0</div>
                <div style="display:flex; justify-content:center; gap:8px; margin-bottom:15px;">
                    <button class="btn btn-secondary" onclick="focusMode.setDuration(25)">25m</button>
                    <button class="btn btn-secondary" onclick="focusMode.setDuration(15)">15m</button>
                    <button class="btn btn-secondary" onclick="focusMode.setDuration(5)">5m</button>
                    <select id="soundSelect" class="select-input" style="width:auto;">
                        <option value="none">No Sound</option>
                        <option value="rain">Rain</option>
                        <option value="white">White Noise</option>
                        <option value="cafe">Cafe</option>
                    </select>
                </div>
                <div class="timer-circle" id="timerCircle">
                    <span id="timerDisplay">25:00</span>
                </div>
                <div style="display:flex; justify-content:center; gap:10px;">
                    <button class="btn btn-primary" onclick="focusMode.start()">Start</button>
                    <button class="btn btn-secondary" onclick="focusMode.pause()">Pause</button>
                    <button class="btn btn-secondary btn-danger" onclick="focusMode.reset()">Reset</button>
                </div>
                <audio id="bgMusic" loop></audio>
            </div>
        </div>

        <div id="community" class="view-container">
            <div id="commBoard">
                <div class="task-card">
                    <h3><i class="fas fa-trophy"></i> Leaderboard</h3>
                    <table style="width:100%; margin-top:10px; font-size:14px; text-align:left; border-collapse:collapse;">
                        <tr style="border-bottom:1px solid var(--border);"><th>Rank</th><th>User</th><th>Score</th></tr>
                        <tr><td><span style="color:#fbbf24">1</span></td><td>Sarah C.</td><td>1,250</td></tr>
                        <tr><td><span style="color:#94a3b8">2</span></td><td>John W.</td><td>1,100</td></tr>
                        <tr><td><span style="color:#b45309">3</span></td><td>You</td><td>340</td></tr>
                    </table>
                </div>
                <div class="task-card" style="margin-top:20px; display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <div style="font-weight:bold;">Productivity Sprint</div>
                        <div style="font-size:12px; color:var(--text-muted);">Live Now • 250 Joined</div>
                    </div>
                    <button class="btn btn-primary" onclick="app.joinGroup('Productivity Sprint')">Join Chat</button>
                </div>
            </div>

            <div id="groupChat" style="display:none;" class="chat-container">
                <div style="padding:10px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; background:var(--bg-card);">
                    <strong id="chatTitle">Group</strong>
                    <button class="btn btn-secondary btn-icon" style="width:24px; height:24px; font-size:12px;" onclick="app.leaveGroup()">✕</button>
                </div>
                <div class="chat-messages" id="chatMsgs"></div>
                <div style="padding:10px; background:var(--bg-card); display:flex; gap:10px;">
                    <input type="text" id="chatInput" class="main-input" style="margin:0;" placeholder="Message..." onkeydown="if(event.key==='Enter') app.sendMessage()">
                    <button class="btn btn-primary" onclick="app.sendMessage()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>

    </main>

    <div style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; display:none; align-items:center; justify-content:center; backdrop-filter: blur(5px);" id="authModal">
        <div style="background:var(--bg-sidebar); padding:30px; border-radius:16px; width:90%; max-width:400px; border:1px solid var(--border); text-align:center;">
            <h2 style="margin-bottom:20px; color:var(--text-main);">Cloud Sync</h2>
            <input type="email" id="authEmail" class="main-input" style="background:var(--bg-body); margin-bottom:10px;" placeholder="Email">
            <input type="password" id="authPass" class="main-input" style="background:var(--bg-body); margin-bottom:20px;" placeholder="Password">
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <button class="btn btn-primary" style="flex:1" onclick="app.login()">Login</button>
                <button class="btn btn-secondary" style="flex:1" onclick="app.register()">Sign Up</button>
            </div>
            <button class="btn btn-secondary" style="width:100%" onclick="document.getElementById('authModal').style.display='none'">Close</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyCoCFw0hezldX3t33AYa1ytddYMuQCWliM",
            authDomain: "daily-todo-1e4ad.firebaseapp.com",
            projectId: "daily-todo-1e4ad",
            storageBucket: "daily-todo-1e4ad.firebasestorage.app",
            messagingSenderId: "629797690976",
            appId: "1:629797690976:web:fda66df1691eb920e12d05"
        };

        const appInit = initializeApp(firebaseConfig);
        const auth = getAuth(appInit);
        const db = getFirestore(appInit);

        const state = {
            user: null,
            tasks: [],
            history: JSON.parse(localStorage.getItem('taskHistory')) || ["Meeting", "Workout", "Study"],
            currentDate: new Date(),
            chart: null,
            designIndex: 0
        };

        const designs = ['default', 'cyberpunk', 'brutalist', 'minimal', 'glass'];
        const layouts = ['sidebar', 'island'];
        let layoutIndex = 0;

        window.app = {
            // WEB DESIGN SWITCHER (Restored & Enhanced)
            cycleDesign: () => {
                state.designIndex = (state.designIndex + 1) % designs.length;
                const newDesign = designs[state.designIndex];
                document.documentElement.setAttribute('data-design', newDesign);
                localStorage.setItem('webDesign', newDesign);
            },
            
            // MAGIC DESIGN (From File 2)
            magicDesign: () => {
                const hue = Math.floor(Math.random() * 360);
                const sat = 30 + Math.floor(Math.random() * 50);
                const light = 5 + Math.floor(Math.random() * 15);
                const root = document.documentElement;
                root.setAttribute('data-design', 'magic');
                root.style.setProperty('--hue', hue);
                root.style.setProperty('--sat', sat + '%');
                root.style.setProperty('--light', light + '%');
                alert(`Magic Generated! Hue: ${hue}`);
            },

            // LAYOUT ENGINE (From File 2)
            toggleLayout: () => {
                layoutIndex = (layoutIndex + 1) % layouts.length;
                document.documentElement.setAttribute('data-layout', layouts[layoutIndex]);
            },

            // BACKUP FEATURE (Restored from File 1)
            backupData: () => {
                const data = {
                    date: new Date().toISOString(),
                    tasks: state.tasks,
                    history: state.history,
                    user: state.user ? state.user.email : 'guest'
                };
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data));
                const downNode = document.createElement('a');
                downNode.setAttribute("href", dataStr);
                downNode.setAttribute("download", "taskpro_ultimate_backup.json");
                document.body.appendChild(downNode);
                downNode.click();
                downNode.remove();
            },

            toggleSidebar: () => {
                document.getElementById('sidebar').classList.toggle('open');
                const overlay = document.getElementById('sidebarOverlay');
                overlay.style.display = overlay.style.display === 'block' ? 'none' : 'block';
            },

            // AUTH
            toggleAuth: () => {
                if(state.user) signOut(auth);
                else document.getElementById('authModal').style.display = 'flex';
            },
            login: async () => {
                try {
                    await signInWithEmailAndPassword(auth, document.getElementById('authEmail').value, document.getElementById('authPass').value);
                    document.getElementById('authModal').style.display = 'none';
                } catch(e) { alert(e.message); }
            },
            register: async () => {
                try {
                    await createUserWithEmailAndPassword(auth, document.getElementById('authEmail').value, document.getElementById('authPass').value);
                    document.getElementById('authModal').style.display = 'none';
                } catch(e) { alert(e.message); }
            },

            switchTab: (id) => {
                document.querySelectorAll('.view-container').forEach(el => el.classList.remove('active'));
                document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
                document.getElementById(id).classList.add('active');
                event.currentTarget.classList.add('active');
                document.getElementById('pageTitle').textContent = id.charAt(0).toUpperCase() + id.slice(1);
                
                if(window.innerWidth <= 768) app.toggleSidebar();
                if(id === 'dashboard') renderChart();
                if(id === 'calendar') renderCalendar();
            },

            // CHAT
            joinGroup: (groupName) => {
                document.getElementById('commBoard').style.display = 'none';
                document.getElementById('groupChat').style.display = 'flex';
                document.getElementById('chatTitle').textContent = groupName;
                document.getElementById('chatMsgs').innerHTML = `<div class="chat-msg them">Welcome to the ${groupName} chat!</div>`;
            },
            leaveGroup: () => {
                document.getElementById('groupChat').style.display = 'none';
                document.getElementById('commBoard').style.display = 'block';
            },
            sendMessage: () => {
                const input = document.getElementById('chatInput');
                if(!input.value.trim()) return;
                const box = document.getElementById('chatMsgs');
                box.insertAdjacentHTML('beforeend', `<div class="chat-msg me">${input.value}</div>`);
                input.value = '';
                box.scrollTop = box.scrollHeight;
                setTimeout(() => {
                    const replies = ["Solid work.", "Keep grinding.", "Nice update.", "Let's focus."];
                    box.insertAdjacentHTML('beforeend', `<div class="chat-msg them">${replies[Math.floor(Math.random()*replies.length)]}</div>`);
                    box.scrollTop = box.scrollHeight;
                }, 1000);
            },

            // TASK LOGIC (Restored full capability: Tags, Priorities, Subtasks)
            handleTaskSubmit: async () => {
                const id = document.getElementById('editTaskId').value;
                if(id) await app.updateTask(id); else await app.addTask();
            },

            addTask: async (title = null) => {
                const input = document.getElementById('taskInput');
                const text = title || input.value.trim();
                if(!text) return;

                if(!state.history.includes(text)) {
                    state.history.unshift(text);
                    if(state.history.length > 8) state.history.pop();
                    localStorage.setItem('taskHistory', JSON.stringify(state.history));
                    renderSuggestions();
                }

                const newTask = {
                    text: text,
                    completed: false,
                    date: document.getElementById('dateInput').value || new Date().toISOString().split('T')[0],
                    priority: document.getElementById('prioInput').value,
                    tags: (text.match(/#\w+/g) || []).map(t => t.replace('#','')),
                    subtasks: [],
                    createdAt: Date.now(),
                    uid: state.user ? state.user.uid : 'local'
                };

                if(state.user) {
                    await addDoc(collection(db, 'tasks'), newTask);
                } else {
                    newTask.id = 'local_' + Date.now();
                    state.tasks.push(newTask);
                    saveLocal();
                }
                input.value = '';
                renderSuggestions();
            },

            startEdit: (id) => {
                const task = state.tasks.find(t => t.id === id);
                if(!task) return;
                document.getElementById('taskInput').value = task.text;
                document.getElementById('dateInput').value = task.date;
                document.getElementById('prioInput').value = task.priority;
                document.getElementById('editTaskId').value = task.id;
                document.getElementById('addUpdateBtn').innerHTML = '<i class="fas fa-save"></i> Update';
                document.getElementById('cancelEditBtn').style.display = 'inline-flex';
                app.switchTab('tasks');
            },

            updateTask: async (id) => {
                const text = document.getElementById('taskInput').value;
                const date = document.getElementById('dateInput').value;
                const priority = document.getElementById('prioInput').value;
                const tags = (text.match(/#\w+/g) || []).map(t => t.replace('#',''));

                if(state.user) await updateDoc(doc(db, 'tasks', id), { text, date, priority, tags });
                else {
                    const task = state.tasks.find(t => t.id === id);
                    task.text = text; task.date = date; task.priority = priority; task.tags = tags;
                    saveLocal();
                }
                app.cancelEdit();
            },

            cancelEdit: () => {
                document.getElementById('taskInput').value = '';
                document.getElementById('editTaskId').value = '';
                document.getElementById('cancelEditBtn').style.display = 'none';
                document.getElementById('addUpdateBtn').innerHTML = '<i class="fas fa-plus"></i> Add';
            },

            toggleTask: async (id) => {
                const task = state.tasks.find(t => t.id === id);
                if(state.user) await updateDoc(doc(db, 'tasks', id), { completed: !task.completed });
                else { task.completed = !task.completed; saveLocal(); }
                if(document.getElementById('dashboard').classList.contains('active')) renderChart();
            },

            deleteTask: async (id) => {
                if(!confirm("Delete?")) return;
                if(state.user) await deleteDoc(doc(db, 'tasks', id));
                else { state.tasks = state.tasks.filter(t => t.id !== id); saveLocal(); }
            },

            addSubtask: async (parentId) => {
                const input = document.getElementById(`sub-input-${parentId}`);
                if(!input.value.trim()) return;
                const task = state.tasks.find(t => t.id === parentId);
                const subtasks = [...(task.subtasks || []), { id: Date.now(), text: input.value, completed: false }];
                if(state.user) await updateDoc(doc(db, 'tasks', parentId), { subtasks });
                else { task.subtasks = subtasks; saveLocal(); }
            },

            toggleSubtask: async (parentId, subId) => {
                const task = state.tasks.find(t => t.id === parentId);
                const subtasks = task.subtasks.map(s => s.id == subId ? {...s, completed: !s.completed} : s);
                if(state.user) await updateDoc(doc(db, 'tasks', parentId), { subtasks });
                else { task.subtasks = subtasks; saveLocal(); }
            },

            deleteSubtask: async (parentId, subId) => {
                const task = state.tasks.find(t => t.id === parentId);
                const subtasks = task.subtasks.filter(s => s.id != subId);
                if(state.user) await updateDoc(doc(db, 'tasks', parentId), { subtasks });
                else { task.subtasks = subtasks; saveLocal(); }
            },

            changeMonth: (offset) => {
                state.currentDate.setMonth(state.currentDate.getMonth() + offset);
                renderCalendar();
            },
            
            removeSuggestion: (e, text) => {
                e.stopPropagation();
                state.history = state.history.filter(h => h !== text);
                localStorage.setItem('taskHistory', JSON.stringify(state.history));
                renderSuggestions();
            }
        };

        // FOCUS MODE (Restored from File 1)
        let timerInterval = null;
        let timeLeft = 25 * 60;
        
        window.focusMode = {
            setDuration: (min) => {
                focusMode.pause();
                timeLeft = min * 60;
                updateTimerDisplay();
            },
            start: () => {
                if(timerInterval) return;
                const sound = document.getElementById('soundSelect').value;
                const audio = document.getElementById('bgMusic');
                if(sound === 'rain') audio.src = 'https://assets.mixkit.co/sfx/preview/mixkit-light-rain-loop-1253.mp3';
                else if(sound === 'white') audio.src = 'https://assets.mixkit.co/sfx/preview/mixkit-white-noise-1254.mp3';
                else if(sound === 'cafe') audio.src = 'https://assets.mixkit.co/sfx/preview/mixkit-restaurant-ambience-1255.mp3';
                if(sound !== 'none') audio.play().catch(e=>console.log(e));
                
                document.getElementById('timerCircle').classList.add('timer-active');
                timerInterval = setInterval(() => {
                    timeLeft--;
                    updateTimerDisplay();
                    if(timeLeft <= 0) {
                        clearInterval(timerInterval);
                        alert("Session Complete!");
                        focusMode.reset();
                    }
                }, 1000);
            },
            pause: () => {
                clearInterval(timerInterval);
                timerInterval = null;
                document.getElementById('timerCircle').classList.remove('timer-active');
                document.getElementById('bgMusic').pause();
            },
            reset: () => {
                focusMode.pause();
                timeLeft = 25 * 60;
                updateTimerDisplay();
            }
        };

        function updateTimerDisplay() {
            const m = Math.floor(timeLeft / 60).toString().padStart(2,'0');
            const s = (timeLeft % 60).toString().padStart(2,'0');
            document.getElementById('timerDisplay').textContent = `${m}:${s}`;
        }

        function renderTasks() {
            const list = document.getElementById('taskList');
            list.innerHTML = "";
            const total = state.tasks.length;
            const completed = state.tasks.filter(t => t.completed).length;
            document.getElementById('dashTotal').textContent = total;
            document.getElementById('dashDone').textContent = completed;
            document.getElementById('dashPending').textContent = total - completed;
            document.getElementById('badge').textContent = total - completed;

            state.tasks.sort((a,b) => (a.completed === b.completed ? 0 : a.completed ? 1 : -1)).forEach(task => {
                const subsHtml = (task.subtasks || []).map(s => `
                    <div class="subtask-row">
                        <input type="checkbox" ${s.completed ? 'checked' : ''} onchange="app.toggleSubtask('${task.id}', '${s.id}')">
                        <span style="opacity:${s.completed?0.5:1}; text-decoration:${s.completed?'line-through':'none'}; flex:1; color:var(--text-muted);">${s.text}</span>
                        <i class="fas fa-times" style="color:var(--danger); cursor:pointer;" onclick="app.deleteSubtask('${task.id}', '${s.id}')"></i>
                    </div>`).join('');

                const tagsHtml = (task.tags || []).map(t => `<span class="tag">#${t}</span>`).join('');
                
                list.insertAdjacentHTML('beforeend', `
                    <div class="task-card priority-${task.priority}">
                        <div class="task-header">
                            <input type="checkbox" class="checkbox" ${task.completed ? 'checked' : ''} onchange="app.toggleTask('${task.id}')">
                            <div style="flex:1; min-width:0;">
                                <div class="task-title" style="text-decoration: ${task.completed ? 'line-through' : 'none'}; opacity: ${task.completed ? 0.5 : 1}">
                                    ${task.text.replace(/#\w+/g, '')} ${tagsHtml}
                                </div>
                                <div style="font-size:12px; color:var(--text-muted);"><i class="far fa-calendar"></i> ${task.date} • ${task.priority.toUpperCase()}</div>
                            </div>
                            <button class="btn btn-icon" style="color:var(--text-muted)" onclick="app.startEdit('${task.id}')"><i class="fas fa-pencil-alt"></i></button>
                            <button class="btn btn-icon btn-danger" onclick="app.deleteTask('${task.id}')"><i class="fas fa-trash"></i></button>
                        </div>
                        ${!task.completed ? `<div class="subtasks">${subsHtml}
                            <div class="subtask-row"><input type="text" id="sub-input-${task.id}" placeholder="+ Subtask..." style="background:transparent; border:none; border-bottom:1px solid var(--border); color:var(--text-main); flex:1; padding:5px; outline:none;" onkeydown="if(event.key === 'Enter') app.addSubtask('${task.id}')">
                            <button class="btn btn-secondary" style="padding:2px 8px; font-size:10px;" onclick="app.addSubtask('${task.id}')">Add</button></div></div>` : ''}
                    </div>
                `);
            });
        }

        function renderCalendar() {
            const grid = document.getElementById('calGrid');
            grid.innerHTML = `<div class="cal-day-header">Sun</div><div class="cal-day-header">Mon</div><div class="cal-day-header">Tue</div><div class="cal-day-header">Wed</div><div class="cal-day-header">Thu</div><div class="cal-day-header">Fri</div><div class="cal-day-header">Sat</div>`;
            const year = state.currentDate.getFullYear();
            const month = state.currentDate.getMonth();
            document.getElementById('calMonthYear').textContent = new Date(year, month).toLocaleString('default', { month: 'short', year: 'numeric' });
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const todayStr = new Date().toISOString().split('T')[0];

            for(let i=0; i<firstDay; i++) grid.insertAdjacentHTML('beforeend', `<div></div>`);
            for(let d=1; d<=daysInMonth; d++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const dots = state.tasks.filter(t => t.date === dateStr).map(t => `<div class="cal-task-dot ${t.completed?'done':''}">${t.text}</div>`).join('');
                grid.insertAdjacentHTML('beforeend', `<div class="cal-cell ${dateStr===todayStr ? 'today' : ''}"><div style="font-size:10px; font-weight:bold; margin-bottom:2px;">${d}</div>${dots}</div>`);
            }
        }

        function renderSuggestions() {
            document.getElementById('suggestionsBox').innerHTML = state.history.map(h => 
                `<div class="suggestion-chip" onclick="app.addTask('${h}')"><span>${h}</span><span style="font-weight:bold;" onclick="app.removeSuggestion(event, '${h}')">×</span></div>`
            ).join('');
        }

        function renderChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            const labels = [], data = [];
            for(let i=6; i>=0; i--) {
                const d = new Date(); d.setDate(d.getDate() - i);
                const ds = d.toISOString().split('T')[0];
                labels.push(ds.slice(5)); 
                data.push(state.tasks.filter(t => t.date === ds && t.completed).length);
            }
            if(state.chart) state.chart.destroy();
            state.chart = new Chart(ctx, {
                type: 'bar',
                data: { labels: labels, datasets: [{ label: 'Completed', data: data, backgroundColor: '#208084', borderRadius: 4 }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true }, x: { grid: { display: false } } }, plugins: { legend: { display: false } } }
            });
        }

        function saveLocal() {
            localStorage.setItem('local_tasks', JSON.stringify(state.tasks));
            renderTasks();
            if(document.getElementById('calendar').classList.contains('active')) renderCalendar();
        }

        onAuthStateChanged(auth, (user) => {
            if(user) {
                state.user = user;
                document.getElementById('authBtn').textContent = "Sign Out";
                document.getElementById('syncDot').style.background = "var(--success)";
                document.getElementById('syncText').textContent = "Synced";
                const q = query(collection(db, 'tasks'), where('uid', '==', user.uid));
                onSnapshot(q, (snap) => {
                    state.tasks = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    renderTasks(); renderChart(); renderCalendar();
                });
            } else {
                state.user = null;
                document.getElementById('authBtn').textContent = "Sign In";
                document.getElementById('syncDot').style.background = "var(--warning)";
                document.getElementById('syncText').textContent = "Offline";
                state.tasks = JSON.parse(localStorage.getItem('local_tasks')) || [];
                renderTasks();
            }
        });

        document.getElementById('dateInput').valueAsDate = new Date();
        renderSuggestions();
        const savedDesign = localStorage.getItem('webDesign');
        if(savedDesign) { document.documentElement.setAttribute('data-design', savedDesign); }
    </script>
</body>
</html>
