<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Todo Checklist - Pro Sync</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        :root {
            --color-primary: #208084;
            --color-primary-hover: #186c71;
            --color-bg: #f5f5f5;
            --color-surface: #ffffff;
            --color-text: #1a1a1a;
            --color-text-secondary: #666;
            --color-border: #e0e0e0;
            --color-success: #4caf50;
            --color-warning: #ff9800;
            --color-error: #f44336;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            background: var(--color-surface);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 700px;
            width: 100%;
            padding: 30px;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: var(--color-text); font-size: 28px; margin-bottom: 5px; }
        
        .sync-status { font-size: 11px; color: #666; text-align: center; margin-bottom: 15px; }
        .sync-status.synced { color: var(--color-success); }
        .sync-status.error { color: var(--color-error); }

        /* AUTH SECTION */
        .auth-section { display: none; background: #f8f9fa; padding: 20px; border-radius: 10px; border: 1px solid var(--color-border); }
        .auth-section.show { display: block; animation: fadeIn 0.3s; }
        
        .auth-form { display: flex; flex-direction: column; gap: 10px; }
        .auth-header { text-align: center; margin-bottom: 10px; color: var(--color-primary); font-weight: bold; }
        
        .user-bar { display: flex; justify-content: space-between; align-items: center; background: rgba(32, 128, 132, 0.1); padding: 10px 15px; border-radius: 8px; margin-bottom: 20px; }
        .user-email { font-size: 13px; font-weight: 600; color: var(--color-primary); }
        .btn-logout { background: none; border: 1px solid var(--color-primary); color: var(--color-primary); padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }

        /* TABS */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid var(--color-border); }
        .tab-btn {
            padding: 12px 20px; background: transparent; border: none; cursor: pointer;
            font-size: 14px; font-weight: 600; color: var(--color-text-secondary);
            border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.3s;
        }
        .tab-btn.active { color: var(--color-primary); border-bottom-color: var(--color-primary); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* STATS */
        .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 15px; border-radius: 10px; text-align: center;
        }
        .stat-box .value { font-size: 24px; font-weight: bold; display: block; }
        .stat-box .label { font-size: 12px; margin-top: 5px; opacity: 0.9; }

        /* INPUTS */
        .add-task-section {
            display: grid; grid-template-columns: 1fr auto auto auto; gap: 10px; margin-bottom: 15px;
        }
        @media (max-width: 600px) { .add-task-section { grid-template-columns: 1fr; } }

        input[type="text"], input[type="date"], input[type="email"], input[type="password"], select {
            padding: 12px; border: 2px solid var(--color-border); border-radius: 8px;
            font-size: 14px; font-family: inherit; width: 100%;
        }
        input:focus, select:focus { outline: none; border-color: var(--color-primary); }

        .btn {
            padding: 12px 20px; border: none; border-radius: 8px; font-size: 14px;
            font-weight: 600; cursor: pointer; transition: all 0.3s; color: white;
        }
        .btn-primary { background: var(--color-primary); }
        .btn-primary:hover { background: var(--color-primary-hover); }
        .btn-danger { background: var(--color-error); }
        .btn-secondary { background: var(--color-border); color: var(--color-text); }
        .btn-full { width: 100%; margin-top: 5px; }

        /* TASKS LIST */
        .tasks-container { max-height: 600px; overflow-y: auto; margin-bottom: 15px; padding-right: 5px; }
        
        .task-item {
            background: var(--color-bg); border-radius: 8px; margin-bottom: 10px;
            padding: 15px; border-left: 4px solid var(--color-border);
            display: flex; flex-direction: column; transition: all 0.2s;
        }
        
        .task-header { display: flex; align-items: center; width: 100%; gap: 12px; }
        
        .task-item.completed .task-text { text-decoration: line-through; color: var(--color-text-secondary); }
        .task-item.priority-high { border-left-color: #ff5252; }
        .task-item.priority-medium { border-left-color: #ff9800; }
        .task-item.priority-low { border-left-color: #4caf50; }
        .task-item.overdue { background: rgba(244, 67, 54, 0.08); }

        .task-checkbox { width: 20px; height: 20px; accent-color: var(--color-primary); cursor: pointer; }
        .task-content { flex: 1; }
        .task-text { font-size: 15px; font-weight: 500; color: var(--color-text); }
        
        .task-meta { display: flex; gap: 10px; margin-top: 4px; align-items: center; font-size: 11px; }
        .priority-badge { padding: 2px 6px; border-radius: 4px; text-transform: uppercase; font-weight: bold; color: white;}
        .priority-badge.high { background: #ff5252; }
        .priority-badge.medium { background: #ff9800; }
        .priority-badge.low { background: #4caf50; }
        .task-date { color: var(--color-text-secondary); }
        .task-date.overdue-text { color: var(--color-error); font-weight: bold; }

        .task-remove {
            background: none; border: none; color: var(--color-error);
            font-size: 18px; cursor: pointer; padding: 0 5px;
        }

        /* SUBTASKS */
        .subtasks-list {
            margin-top: 10px; padding: 10px; background: rgba(0,0,0,0.03);
            border-radius: 6px; width: 100%;
        }
        .subtask-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 13px; }
        .subtask-item.completed .subtask-text { text-decoration: line-through; opacity: 0.7; }
        .add-subtask-form { display: flex; gap: 5px; margin-top: 8px; }
        .btn-mini { padding: 6px 10px; font-size: 12px; }

        /* REPORTS */
        .chart-container { position: relative; height: 300px; width: 100%; margin-top: 20px; }
        .scrollbar::-webkit-scrollbar { width: 6px; }
        .scrollbar::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

        .empty-state { text-align: center; padding: 40px; color: #888; }
        .empty-state-icon { font-size: 40px; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📋 Daily Todo Pro</h1>
        <div id="syncStatus" class="sync-status">Initializing...</div>
    </div>

    <div id="authScreen" class="auth-section">
        <div class="auth-header">Login to Sync Across Devices</div>
        <div class="auth-form">
            <input type="email" id="authEmail" placeholder="Email">
            <input type="password" id="authPassword" placeholder="Password (min 6 chars)">
            <div style="display:flex; gap:10px;">
                <button class="btn btn-primary btn-full" onclick="window.handleLogin()">Login</button>
                <button class="btn btn-secondary btn-full" onclick="window.handleSignup()">Sign Up</button>
            </div>
            <button class="btn btn-secondary btn-full" style="background:#ddd; color:#333" onclick="window.continueGuest()">Continue as Guest (Offline)</button>
        </div>
    </div>

    <div id="appScreen" style="display:none;">
        <div class="user-bar">
            <span id="userEmailDisplay" class="user-email">Guest User</span>
            <button class="btn-logout" id="logoutBtn" onclick="window.handleLogout()">Logout</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('tasks')">My Tasks</button>
            <button class="tab-btn" onclick="switchTab('reports')">Reports</button>
        </div>

        <div id="tasks" class="tab-content active">
            <div class="stats">
                <div class="stat-box">
                    <span class="value" id="completionPercent">0%</span>
                    <span class="label">Completed</span>
                </div>
                <div class="stat-box">
                    <span class="value" id="completedCount">0</span>
                    <span class="label">Tasks Done</span>
                </div>
                <div class="stat-box">
                    <span class="value" id="pendingCount">0</span>
                    <span class="label">Pending</span>
                </div>
            </div>

            <div class="add-task-section">
                <input type="text" id="taskInput" placeholder="What needs to be done?" />
                <input type="date" id="dateInput" />
                <select id="prioritySelect">
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                </select>
                <button class="btn btn-primary" onclick="window.handleAddTask()">Add</button>
            </div>

            <div class="tasks-container scrollbar" id="tasksContainer">
                </div>

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-secondary" style="flex:1" onclick="window.cleanupCompleted()">Clear Completed</button>
            </div>
        </div>

        <div id="reports" class="tab-content">
            <h3 style="margin-bottom: 15px;">Task Overview</h3>
            <div class="chart-container">
                <canvas id="reportChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, where, orderBy, setDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // --- CONFIGURATION ---
    const firebaseConfig = {
        apiKey: "AIzaSyCoCFw0hezldX3t33AYa1ytddYMuQCWliM",
        authDomain: "daily-todo-1e4ad.firebaseapp.com",
        projectId: "daily-todo-1e4ad",
        storageBucket: "daily-todo-1e4ad.firebasestorage.app",
        messagingSenderId: "629797690976",
        appId: "1:629797690976:web:fda66df1691eb920e12d05",
        measurementId: "G-KG0NGWBFCW"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // STATE
    let tasks = [];
    let currentUser = null;
    let isGuest = false;
    let unsubscribe = null; // Firestore listener
    let myChart = null;

    // --- INITIALIZATION ---
    document.getElementById('dateInput').valueAsDate = new Date();

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            isGuest = false;
            showApp();
            
            // FIX: Set correct email and button text for logged-in user
            document.getElementById('userEmailDisplay').textContent = user.email;
            document.getElementById('logoutBtn').textContent = "Logout";
            
            syncFirestore();
        } else {
            currentUser = null;
            // Only go back to login screen if we are NOT in guest mode
            if(!isGuest) {
                document.getElementById('authScreen').style.display = 'block';
                document.getElementById('appScreen').style.display = 'none';
                updateStatus('Please Login');
            }
        }
    });

    // --- AUTH FUNCTIONS ---
    window.handleLogin = async function() {
        const email = document.getElementById('authEmail').value;
        const pass = document.getElementById('authPassword').value;
        try {
            updateStatus('Logging in...');
            await signInWithEmailAndPassword(auth, email, pass);
        } catch (e) { alert(e.message); updateStatus('Login Failed', 'error'); }
    };

    window.handleSignup = async function() {
        const email = document.getElementById('authEmail').value;
        const pass = document.getElementById('authPassword').value;
        try {
            updateStatus('Creating Account...');
            await createUserWithEmailAndPassword(auth, email, pass);
        } catch (e) { alert(e.message); updateStatus('Signup Failed', 'error'); }
    };

    window.handleLogout = async function() {
        if(unsubscribe) unsubscribe();
        tasks = [];
        
        if (isGuest) {
            // Guest Logout logic
            isGuest = false;
            updateStatus('Exited Guest Mode');
            document.getElementById('authScreen').style.display = 'block';
            document.getElementById('appScreen').style.display = 'none';
        } else {
            // Firebase Logout logic
            await signOut(auth);
            isGuest = false;
            updateStatus('Logged out');
            // onAuthStateChanged will handle hiding appScreen
        }
    };

    window.continueGuest = function() {
        isGuest = true;
        
        // FIX: Explicitly overwrite the old email text from previous sessions
        document.getElementById('userEmailDisplay').textContent = "Guest (Offline)";
        document.getElementById('logoutBtn').textContent = "Exit Guest";

        showApp();
        loadLocalTasks();
    };

    function showApp() {
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('appScreen').style.display = 'block';
    }

    // --- SYNC LOGIC ---

    function syncFirestore() {
        updateStatus('Syncing...');
        const q = query(collection(db, "tasks"), where("uid", "==", currentUser.uid));
        
        unsubscribe = onSnapshot(q, (snapshot) => {
            tasks = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderTasks();
            updateStats();
            updateStatus('✓ Synced', 'success');
        }, (err) => {
            console.error(err);
            updateStatus('Sync Error', 'error');
        });
    }

    function loadLocalTasks() {
        const stored = localStorage.getItem('guest_tasks');
        tasks = stored ? JSON.parse(stored) : [];
        renderTasks();
        updateStats();
        updateStatus('Guest Mode (Offline)', 'normal');
    }

    function saveLocal() {
        if(isGuest) {
            localStorage.setItem('guest_tasks', JSON.stringify(tasks));
            renderTasks();
            updateStats();
        }
    }

    function updateStatus(msg, type) {
        const el = document.getElementById('syncStatus');
        el.textContent = msg;
        el.className = 'sync-status ' + (type === 'success' ? 'synced' : type === 'error' ? 'error' : '');
    }

    // --- CRUD OPERATIONS ---

    window.handleAddTask = async function() {
        const text = document.getElementById('taskInput').value.trim();
        const dateVal = document.getElementById('dateInput').value;
        const priority = document.getElementById('prioritySelect').value;

        if (!text) return alert("Enter a task");

        const newTask = {
            text, 
            dueDate: dateVal, 
            priority, 
            completed: false, 
            createdAt: new Date().toISOString(),
            subtasks: []
        };

        try {
            if (isGuest) {
                newTask.id = Date.now().toString();
                tasks.push(newTask);
                saveLocal();
            } else {
                updateStatus('Saving...');
                await addDoc(collection(db, "tasks"), { ...newTask, uid: currentUser.uid });
            }
            document.getElementById('taskInput').value = '';
        } catch (e) { console.error(e); }
    };

    window.toggleTask = async function(id, currentStatus) {
        if (isGuest) {
            const t = tasks.find(x => x.id === id);
            if(t) t.completed = !t.completed;
            saveLocal();
        } else {
            await updateDoc(doc(db, "tasks", id), { completed: !currentStatus });
        }
    };

    window.removeTask = async function(id) {
        if (!confirm("Delete task?")) return;
        if (isGuest) {
            tasks = tasks.filter(t => t.id !== id);
            saveLocal();
        } else {
            await deleteDoc(doc(db, "tasks", id));
        }
    };

    // --- SUBTASK LOGIC ---
    window.addSubtask = async function(taskId) {
        const input = document.getElementById(`sub-input-${taskId}`);
        const text = input.value.trim();
        if(!text) return;

        const task = tasks.find(t => t.id === taskId);
        const newSubtasks = [...(task.subtasks || []), { id: Date.now().toString(), text, completed: false }];

        if (isGuest) {
            task.subtasks = newSubtasks;
            saveLocal();
        } else {
            await updateDoc(doc(db, "tasks", taskId), { subtasks: newSubtasks });
        }
    };

    window.toggleSubtask = async function(taskId, subId) {
        const task = tasks.find(t => t.id === taskId);
        const newSubtasks = task.subtasks.map(s => s.id === subId ? {...s, completed: !s.completed} : s);
        
        if (isGuest) {
            task.subtasks = newSubtasks;
            saveLocal();
        } else {
            await updateDoc(doc(db, "tasks", taskId), { subtasks: newSubtasks });
        }
    };

    window.removeSubtask = async function(taskId, subId) {
        const task = tasks.find(t => t.id === taskId);
        const newSubtasks = task.subtasks.filter(s => s.id !== subId);
        
        if (isGuest) {
            task.subtasks = newSubtasks;
            saveLocal();
        } else {
            await updateDoc(doc(db, "tasks", taskId), { subtasks: newSubtasks });
        }
    };

    window.cleanupCompleted = async function() {
        if(!confirm("Remove all completed tasks?")) return;
        const toDelete = tasks.filter(t => t.completed);
        
        if(isGuest) {
            tasks = tasks.filter(t => !t.completed);
            saveLocal();
        } else {
            updateStatus('Cleaning...');
            const promises = toDelete.map(t => deleteDoc(doc(db, "tasks", t.id)));
            await Promise.all(promises);
            updateStatus('Cleaned', 'success');
        }
    };

    // --- UI RENDER ---

    function renderTasks() {
        const container = document.getElementById('tasksContainer');
        const today = new Date().toISOString().split('T')[0];
        
        // Filter: Show all incomplete tasks + today's completed tasks
        const visibleTasks = tasks.filter(t => !t.completed || t.dueDate === today || t.createdAt.startsWith(today));

        // Sort: Overdue -> Priority -> Created
        visibleTasks.sort((a,b) => {
            if(a.completed !== b.completed) return a.completed - b.completed;
            const prio = {high:0, medium:1, low:2};
            return prio[a.priority] - prio[b.priority];
        });

        if (visibleTasks.length === 0) {
            container.innerHTML = `<div class="empty-state"><span class="empty-state-icon">✅</span><p>All caught up!</p></div>`;
            return;
        }

        container.innerHTML = visibleTasks.map(task => {
            const isOverdue = !task.completed && task.dueDate < today;
            const subtasks = task.subtasks || [];
            
            const subtasksHtml = subtasks.map(st => `
                <div class="subtask-item ${st.completed ? 'completed' : ''}">
                    <input type="checkbox" ${st.completed ? 'checked' : ''} 
                        onchange="window.toggleSubtask('${task.id}', '${st.id}')">
                    <span class="subtask-text">${escapeHtml(st.text)}</span>
                    <button onclick="window.removeSubtask('${task.id}', '${st.id}')" style="border:none;background:none;color:#f44336;cursor:pointer;">×</button>
                </div>
            `).join('');

            return `
            <div class="task-item priority-${task.priority} ${task.completed ? 'completed' : ''} ${isOverdue ? 'overdue' : ''}">
                <div class="task-header">
                    <input type="checkbox" class="task-checkbox" 
                        ${task.completed ? 'checked' : ''} 
                        onchange="window.toggleTask('${task.id}', ${task.completed})">
                    
                    <div class="task-content">
                        <div class="task-text">${escapeHtml(task.text)}</div>
                        <div class="task-meta">
                            <span class="priority-badge ${task.priority}">${task.priority}</span>
                            <span class="task-date ${isOverdue ? 'overdue-text' : ''}">
                                ${isOverdue ? '⚠️ ' : '📅 '}${task.dueDate || 'No Date'}
                            </span>
                        </div>
                    </div>
                    <button class="task-remove" onclick="window.removeTask('${task.id}')">🗑</button>
                </div>

                <div class="subtasks-list">
                    ${subtasksHtml}
                    <div class="add-subtask-form">
                        <input type="text" id="sub-input-${task.id}" placeholder="New subtask..." style="padding:5px;font-size:12px;flex:1">
                        <button class="btn btn-primary btn-mini" onclick="window.addSubtask('${task.id}')">+</button>
                    </div>
                </div>
            </div>
            `;
        }).join('');
    }

    function escapeHtml(text) {
        if(!text) return '';
        return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    function updateStats() {
        const total = tasks.length;
        const completed = tasks.filter(t => t.completed).length;
        const percent = total > 0 ? Math.round((completed/total)*100) : 0;
        
        document.getElementById('completionPercent').textContent = percent + '%';
        document.getElementById('completedCount').textContent = completed;
        document.getElementById('pendingCount').textContent = total - completed;
    }

    // --- TABS & CHARTS ---
    window.switchTab = function(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.target.classList.add('active');
        if(tabId === 'reports') renderChart();
    };

    function renderChart() {
        const ctx = document.getElementById('reportChart');
        if(!ctx) return;
        
        if (myChart) myChart.destroy();

        const high = tasks.filter(t => t.priority === 'high' && !t.completed).length;
        const med = tasks.filter(t => t.priority === 'medium' && !t.completed).length;
        const low = tasks.filter(t => t.priority === 'low' && !t.completed).length;
        const done = tasks.filter(t => t.completed).length;

        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Done', 'High Priority', 'Medium', 'Low'],
                datasets: [{
                    data: [done, high, med, low],
                    backgroundColor: ['#4caf50', '#ff5252', '#ff9800', '#208084']
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

</script>
</body>
</html>
