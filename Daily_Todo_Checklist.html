<!DOCTYPE html>
<html lang="en" data-theme="dark" data-design="default">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enterprise TaskPro - v7.2 (Cloud Sync & Glow)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* ==================== CORE VARIABLES ==================== */
        :root {
            --bg-body: #0f172a;
            --bg-sidebar: #1e293b;
            --bg-card: #334155;
            --bg-input: #1e293b;
            --accent: #208084;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #475569;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --radius: 12px;
            --font-main: 'Inter', sans-serif;
            --sidebar-width: 260px;
        }

        [data-theme="light"] {
            --bg-body: #f1f5f9;
            --bg-sidebar: #ffffff;
            --bg-card: #ffffff;
            --bg-input: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: var(--font-main);
            background: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* SIDEBAR & LAYOUT */
        .sidebar { width: var(--sidebar-width); background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; z-index: 50; flex-shrink: 0; transition: transform 0.3s; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 15px; color: var(--text-muted); text-decoration: none; border-radius: var(--radius); margin-bottom: 5px; cursor: pointer; border: 1px solid transparent; background: none; width: 100%; font-family: var(--font-main); }
        .nav-link:hover { background: rgba(255,255,255,0.05); color: var(--text-main); }
        .nav-link.active { background: var(--accent); color: white; }
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        
        /* HEADER */
        .header { height: 70px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; flex-shrink: 0; }
        .view-container { flex: 1; overflow-y: auto; padding: 20px; display: none; }
        .view-container.active { display: block; }

        /* COMPONENTS */
        .btn { padding: 10px 16px; border-radius: var(--radius); border: 1px solid transparent; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-family: var(--font-main); }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: var(--bg-card); color: var(--text-main); border-color: var(--border); }
        .input-group { background: var(--bg-card); padding: 15px; border-radius: var(--radius); display: flex; gap: 10px; margin-bottom: 20px; border: 1px solid var(--border); flex-wrap: wrap; }
        .main-input { background: transparent; border: none; color: var(--text-main); padding: 10px; flex: 1; outline: none; }
        
        /* TASKS */
        .task-card { background: var(--bg-card); border-radius: var(--radius); padding: 16px; border: 1px solid var(--border); margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        
        /* === TIMER & GLOW EFFECTS === */
        .timer-container { text-align:center; max-width:500px; margin:0 auto; }
        .timer-circle { 
            width: 240px; height: 240px; border-radius: 50%; border: 6px solid var(--bg-card); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            margin: 30px auto; position: relative; 
            background: radial-gradient(circle, var(--bg-sidebar) 0%, var(--bg-body) 100%); 
            transition: all 0.5s ease;
        }
        .timer-time { font-size: 48px; font-weight: 700; line-height: 1; }
        
        /* Glow Modes */
        .timer-circle.focus-mode {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent), inset 0 0 30px rgba(32, 128, 132, 0.3);
        }
        .timer-circle.break-mode {
            border-color: var(--success);
            box-shadow: 0 0 20px var(--success), inset 0 0 30px rgba(16, 185, 129, 0.3);
        }
        .timer-circle.paused {
            border-color: var(--warning);
            animation: pulse-pause 2s infinite;
        }
        
        @keyframes pulse-pause {
            0% { box-shadow: 0 0 10px var(--warning); opacity: 1; }
            50% { box-shadow: 0 0 25px var(--warning); opacity: 0.7; }
            100% { box-shadow: 0 0 10px var(--warning); opacity: 1; }
        }

        .idle-tracker { margin-top: 30px; padding: 15px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }

        @media (max-width: 768px) {
            .sidebar { position: fixed; transform: translateX(-100%); height: 100%; box-shadow: 10px 0 20px rgba(0,0,0,0.5); }
            .sidebar.open { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:40; display:none;" id="sidebarOverlay" onclick="app.toggleSidebar()"></div>
    <aside class="sidebar" id="sidebar">
        <div style="font-size:20px; font-weight:800; color:var(--text-main); margin-bottom:30px;">
            <i class="fas fa-bolt" style="color:var(--accent);"></i> TaskPro 7.2
        </div>
        <nav>
            <button class="nav-link active" onclick="app.switchTab('dashboard')"><i class="fas fa-chart-pie"></i> Dashboard</button>
            <button class="nav-link" onclick="app.switchTab('tasks')"><i class="fas fa-tasks"></i> My Tasks</button>
            <button class="nav-link" onclick="app.switchTab('focus')"><i class="fas fa-stopwatch"></i> Focus & Idle</button>
        </nav>
        <div style="margin-top:auto;">
            <div class="nav-link" style="cursor:default; font-size:12px;"><i class="fas fa-circle" style="color:var(--warning); font-size:10px;" id="syncDot"></i> <span id="syncText">Offline</span></div>
            <button class="btn btn-secondary" style="width:100%; margin-top:10px;" id="authBtn" onclick="app.toggleAuth()">Sign In</button>
        </div>
    </aside>

    <main class="main">
        <header class="header">
            <button class="btn btn-secondary" onclick="app.toggleSidebar()" style="padding:8px;"><i class="fas fa-bars"></i></button>
            <h2 id="pageTitle" style="margin-left:15px; color:var(--text-main);">Dashboard</h2>
            <div style="margin-left:auto; font-size:14px; font-weight:bold; color:var(--text-muted);" id="clockDisplay">--:--</div>
        </header>

        <div id="dashboard" class="view-container active">
            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:15px;">
                <div class="task-card" style="display:block; text-align:center;">
                    <div style="font-size:30px; font-weight:bold; color:var(--accent);" id="dashTotal">0</div>
                    <div style="font-size:12px; color:var(--text-muted);">Total Tasks</div>
                </div>
                <div class="task-card" style="display:block; text-align:center;">
                    <div style="font-size:30px; font-weight:bold; color:var(--warning);" id="idleDash">0h</div>
                    <div style="font-size:12px; color:var(--text-muted);">Total Idle Time</div>
                </div>
            </div>
            <div style="margin-top:20px; height:300px;"><canvas id="mainChart"></canvas></div>
        </div>

        <div id="tasks" class="view-container">
            <div class="input-group">
                <input type="text" id="taskInput" class="main-input" placeholder="Add a new task...">
                <button class="btn btn-primary" onclick="app.addTask()">Add</button>
            </div>
            <div id="taskList"></div>
        </div>

        <div id="focus" class="view-container">
            <div class="timer-container">
                <h2 style="color:var(--text-main); margin-bottom:10px;">Pomodoro Sync</h2>
                
                <div style="margin-bottom:20px;">
                    <select id="focusTaskSelect" class="main-input" style="background:var(--bg-card); border:1px solid var(--border); padding:8px; border-radius:8px; width:100%; max-width:300px; color:var(--text-main);">
                        <option value="">-- Select Task to Focus On --</option>
                    </select>
                </div>

                <div style="display:flex; justify-content:center; gap:15px; margin-bottom:20px;">
                    <div>
                        <div style="font-size:10px; color:var(--text-muted);">Focus (min)</div>
                        <input type="number" id="focusDuration" value="25" style="width:60px; padding:5px; background:var(--bg-body); border:1px solid var(--border); color:var(--text-main); text-align:center; border-radius:5px;">
                    </div>
                    <div>
                        <div style="font-size:10px; color:var(--text-muted);">Soundscape</div>
                        <select id="soundSelect" onchange="audioEngine.change(this.value)" style="width:100px; padding:5px; background:var(--bg-body); border:1px solid var(--border); color:var(--text-main); border-radius:5px;">
                            <option value="none">Silent</option>
                            <option value="beats">Binaural</option>
                            <option value="wind">Pink Noise</option>
                            <option value="white">White Noise</option>
                        </select>
                    </div>
                </div>

                <div class="timer-circle" id="timerCircle">
                    <span id="timerDisplay" class="timer-time">25:00</span>
                    <span id="timerLabel" style="text-transform:uppercase; font-size:12px; color:var(--text-muted); margin-top:5px;">Ready</span>
                </div>

                <div style="display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin-bottom:30px;">
                    <button class="btn btn-primary" id="btnStart" onclick="focusMode.start('focus')">Start Focus</button>
                    <button class="btn btn-secondary" id="btnBreak" onclick="focusMode.start('break')" style="border-color:var(--success); color:var(--success);">Start Break</button>
                    <button class="btn btn-secondary" id="btnPause" onclick="focusMode.togglePause()" style="display:none; color:var(--warning); border-color:var(--warning);">Pause</button>
                    <button class="btn btn-secondary" onclick="focusMode.stop()" style="color:var(--danger); border-color:var(--danger);">Stop</button>
                </div>

                <div class="idle-tracker">
                    <div style="text-align:left;">
                        <h4 style="color:var(--text-main); font-size:15px;"><i class="fas fa-hourglass-half"></i> Idle Time</h4>
                        <div style="font-size:10px; color:var(--text-muted);">Increments when paused or not focusing.</div>
                    </div>
                    <div style="font-family:'Roboto Mono', monospace; font-size:24px; color:var(--warning);" id="idleDisplay">00:00:00</div>
                </div>
            </div>
        </div>
    </main>

    <div style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; display:none; align-items:center; justify-content:center;" id="authModal">
        <div style="background:var(--bg-sidebar); padding:30px; border-radius:16px; width:90%; max-width:400px; border:1px solid var(--border); text-align:center;">
            <h2 style="margin-bottom:20px; color:var(--text-main);">Cloud Sync</h2>
            <input type="email" id="authEmail" class="main-input" style="border:1px solid var(--border); margin-bottom:10px; width:100%; background:var(--bg-body);" placeholder="Email">
            <input type="password" id="authPass" class="main-input" style="border:1px solid var(--border); margin-bottom:20px; width:100%; background:var(--bg-body);" placeholder="Password">
            <div style="display:flex; gap:10px;">
                <button class="btn btn-primary" style="flex:1" onclick="app.login()">Login</button>
                <button class="btn btn-secondary" style="flex:1" onclick="app.register()">Sign Up</button>
            </div>
            <button onclick="document.getElementById('authModal').style.display='none'" style="background:none; border:none; color:var(--text-muted); margin-top:15px; cursor:pointer;">Close</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, where, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCoCFw0hezldX3t33AYa1ytddYMuQCWliM",
            authDomain: "daily-todo-1e4ad.firebaseapp.com",
            projectId: "daily-todo-1e4ad",
            storageBucket: "daily-todo-1e4ad.firebasestorage.app",
            messagingSenderId: "629797690976",
            appId: "1:629797690976:web:fda66df1691eb920e12d05"
        };

        const appInit = initializeApp(firebaseConfig);
        const auth = getAuth(appInit);
        const db = getFirestore(appInit);

        // --- STATE MANAGEMENT ---
        const state = {
            user: null,
            tasks: [],
            idleTotal: 0, // Total seconds from DB
            idleSession: 0, // Seconds in current session since last sync
            timer: { mode: 'idle', endTime: null, paused: false, remainingPaused: 0 }
        };

        // --- AUDIO ENGINE (SYNTH) ---
        window.audioEngine = {
            ctx: null, nodes: [],
            init: () => {
                if(!audioEngine.ctx) audioEngine.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if(audioEngine.ctx.state === 'suspended') audioEngine.ctx.resume();
            },
            play: (type) => {
                audioEngine.stop();
                if(type === 'none') return;
                audioEngine.init();
                const t = audioEngine.ctx.currentTime;
                const gain = audioEngine.ctx.createGain();
                gain.gain.setValueAtTime(0.1, t);
                gain.connect(audioEngine.ctx.destination);
                audioEngine.nodes.push(gain);

                if(type === 'white' || type === 'wind') {
                    const bSize = audioEngine.ctx.sampleRate * 2;
                    const b = audioEngine.ctx.createBuffer(1, bSize, audioEngine.ctx.sampleRate);
                    const d = b.getChannelData(0);
                    for(let i=0; i<bSize; i++) d[i] = Math.random() * 2 - 1;
                    const noise = audioEngine.ctx.createBufferSource();
                    noise.buffer = b;
                    noise.loop = true;
                    
                    if(type === 'wind') { // Pink/Brownish noise filter
                        const f = audioEngine.ctx.createBiquadFilter();
                        f.type = 'lowpass'; f.frequency.value = 400;
                        noise.connect(f); f.connect(gain);
                    } else { noise.connect(gain); }
                    noise.start();
                    audioEngine.nodes.push(noise);
                } else if (type === 'beats') { // Binaural 200Hz + 205Hz
                    [200, 205].forEach(f => {
                        const o = audioEngine.ctx.createOscillator();
                        o.type = 'sine'; o.frequency.value = f;
                        o.connect(gain); o.start();
                        audioEngine.nodes.push(o);
                    });
                }
            },
            stop: () => {
                audioEngine.nodes.forEach(n => { try{n.stop();}catch(e){} try{n.disconnect();}catch(e){} });
                audioEngine.nodes = [];
            },
            change: (val) => {
                if(state.timer.mode !== 'idle' && !state.timer.paused) audioEngine.play(val);
            }
        };

        // --- APP LOGIC ---
        window.app = {
            init: () => {
                setInterval(app.updateClock, 1000);
                // Idle Ticker (Local)
                setInterval(() => {
                    const isFocusing = state.timer.mode === 'focus';
                    const isPaused = state.timer.paused;
                    
                    // ISSUE 2 FIX: Idle runs if mode is idle OR if timer is paused
                    if (!isFocusing || isPaused) {
                        state.idleSession++;
                        app.renderIdle();
                    }
                }, 1000);

                // Idle Sync (Cloud) - Sync every 60s
                setInterval(() => {
                    if(state.user && state.idleSession > 0) {
                        const newTotal = state.idleTotal + state.idleSession;
                        updateDoc(doc(db, 'user_stats', state.user.uid), { idleTotal: newTotal });
                        state.idleTotal = newTotal;
                        state.idleSession = 0;
                    }
                }, 60000);
            },

            updateClock: () => {
                const now = new Date();
                document.getElementById('clockDisplay').innerText = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                
                // Timer Logic
                if (state.timer.mode !== 'idle' && !state.timer.paused && state.timer.endTime) {
                    const diff = state.timer.endTime - Date.now();
                    if (diff <= 0) focusMode.complete();
                    else focusMode.renderTime(Math.ceil(diff/1000));
                }
            },

            renderIdle: () => {
                const total = state.idleTotal + state.idleSession;
                const h = Math.floor(total/3600).toString().padStart(2,'0');
                const m = Math.floor((total%3600)/60).toString().padStart(2,'0');
                const s = (total%60).toString().padStart(2,'0');
                document.getElementById('idleDisplay').innerText = `${h}:${m}:${s}`;
                document.getElementById('idleDash').innerText = `${h}h ${m}m`;
            },

            // --- AUTH & SYNC ---
            toggleAuth: () => { if(state.user) signOut(auth); else document.getElementById('authModal').style.display = 'flex'; },
            login: async () => { await signInWithEmailAndPassword(auth, document.getElementById('authEmail').value, document.getElementById('authPass').value); document.getElementById('authModal').style.display='none'; },
            register: async () => { 
                const cred = await createUserWithEmailAndPassword(auth, document.getElementById('authEmail').value, document.getElementById('authPass').value); 
                // Create Stats Doc
                await setDoc(doc(db, 'user_stats', cred.user.uid), { idleTotal: 0, timerState: { mode: 'idle', endTime: null, paused: false, duration: 25 } });
                document.getElementById('authModal').style.display='none'; 
            },

            addTask: async () => {
                const txt = document.getElementById('taskInput').value;
                if(!txt) return;
                const task = { text: txt, completed: false, date: new Date().toISOString().split('T')[0] };
                if(state.user) await addDoc(collection(db, 'tasks'), { ...task, uid: state.user.uid });
                else { state.tasks.push(task); app.renderTasks(); }
                document.getElementById('taskInput').value = '';
            },

            renderTasks: () => {
                const list = document.getElementById('taskList');
                list.innerHTML = state.tasks.map(t => `
                    <div class="task-card">
                        <div style="flex:1;">${t.text}</div>
                    </div>
                `).join('');
                document.getElementById('dashTotal').innerText = state.tasks.length;
                
                // Populate Focus Select
                const sel = document.getElementById('focusTaskSelect');
                sel.innerHTML = '<option value="">-- Select Task --</option>';
                state.tasks.forEach(t => { sel.innerHTML += `<option value="${t.text}">${t.text}</option>`; });
            },

            toggleSidebar: () => {
                document.getElementById('sidebar').classList.toggle('open');
                const overlay = document.getElementById('sidebarOverlay');
                overlay.style.display = overlay.style.display === 'block' ? 'none' : 'block';
            },

            switchTab: (id) => {
                document.querySelectorAll('.view-container').forEach(e => e.classList.remove('active'));
                document.getElementById(id).classList.add('active');
            }
        };

        // --- FOCUS MODE (CLOUD SYNCED) ---
        window.focusMode = {
            start: async (mode) => {
                const mins = parseInt(document.getElementById('focusDuration').value) || 25;
                const newState = {
                    mode: mode,
                    endTime: Date.now() + (mins * 60000),
                    duration: mins,
                    paused: false,
                    remainingPaused: 0
                };
                
                audioEngine.play(document.getElementById('soundSelect').value);
                
                if(state.user) {
                    await updateDoc(doc(db, 'user_stats', state.user.uid), { timerState: newState });
                } else {
                    state.timer = newState;
                    focusMode.updateUI(newState);
                }
            },

            stop: async () => {
                audioEngine.stop();
                const newState = { mode: 'idle', endTime: null, paused: false, remainingPaused: 0 };
                if(state.user) await updateDoc(doc(db, 'user_stats', state.user.uid), { timerState: newState });
                else { state.timer = newState; focusMode.updateUI(newState); }
            },

            togglePause: async () => {
                if(state.timer.mode === 'idle') return;
                
                let newState = { ...state.timer };
                
                if(!state.timer.paused) {
                    // PAUSE: Calculate remaining time and save it
                    const remaining = state.timer.endTime - Date.now();
                    newState.paused = true;
                    newState.remainingPaused = remaining;
                    audioEngine.stop(); // Stop sound on pause
                } else {
                    // RESUME: Calculate new EndTime based on saved remaining time
                    newState.paused = false;
                    newState.endTime = Date.now() + state.timer.remainingPaused;
                    audioEngine.play(document.getElementById('soundSelect').value); // Resume sound
                }

                if(state.user) await updateDoc(doc(db, 'user_stats', state.user.uid), { timerState: newState });
                else { state.timer = newState; focusMode.updateUI(newState); }
            },

            complete: async () => {
                if(state.timer.mode === 'idle') return;
                // Play simple beep using raw oscillator (independent of soundscape)
                const ctx = audioEngine.ctx; 
                const o = ctx.createOscillator(); const g = ctx.createGain();
                o.connect(g); g.connect(ctx.destination);
                o.frequency.value = 523.25; g.gain.value = 0.5;
                o.start(); o.stop(ctx.currentTime + 1);
                
                alert("Timer Complete!");
                focusMode.stop();
            },

            updateUI: (timerData) => {
                const circle = document.getElementById('timerCircle');
                const btnPause = document.getElementById('btnPause');
                const btnStart = document.getElementById('btnStart');
                const label = document.getElementById('timerLabel');

                // 4. ISSUE FIX: Glow Effects & Logic
                circle.classList.remove('focus-mode', 'break-mode', 'paused');
                
                if (timerData.mode === 'idle') {
                    circle.style.borderColor = 'var(--bg-card)';
                    label.innerText = 'Ready';
                    btnPause.style.display = 'none';
                    btnStart.style.display = 'inline-block';
                    focusMode.renderTime(parseInt(document.getElementById('focusDuration').value) * 60);
                } else {
                    btnStart.style.display = 'none';
                    btnPause.style.display = 'inline-block';
                    
                    if (timerData.paused) {
                        circle.classList.add('paused');
                        label.innerText = 'Paused';
                        btnPause.innerText = 'Resume';
                        focusMode.renderTime(Math.ceil(timerData.remainingPaused / 1000));
                    } else {
                        btnPause.innerText = 'Pause';
                        if (timerData.mode === 'focus') {
                            circle.classList.add('focus-mode');
                            label.innerText = 'Focusing...';
                        } else {
                            circle.classList.add('break-mode');
                            label.innerText = 'On Break';
                        }
                    }
                }
            },

            renderTime: (seconds) => {
                const m = Math.floor(seconds/60).toString().padStart(2,'0');
                const s = (seconds%60).toString().padStart(2,'0');
                document.getElementById('timerDisplay').innerText = `${m}:${s}`;
            }
        };

        // --- AUTH LISTENER ---
        onAuthStateChanged(auth, async (user) => {
            if(user) {
                state.user = user;
                document.getElementById('authBtn').innerText = 'Sign Out';
                document.getElementById('syncDot').style.color = 'var(--success)';
                document.getElementById('syncText').innerText = 'Cloud Active';

                // Sync Tasks
                const q = query(collection(db, 'tasks'), where('uid', '==', user.uid));
                onSnapshot(q, (snap) => {
                    state.tasks = snap.docs.map(d => d.data());
                    app.renderTasks();
                });

                // Sync Stats (Idle & Timer) - ISSUE 1 FIX
                onSnapshot(doc(db, 'user_stats', user.uid), (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        
                        // Sync Idle
                        state.idleTotal = data.idleTotal || 0;
                        app.renderIdle();

                        // Sync Timer State
                        if (data.timerState) {
                            state.timer = data.timerState;
                            focusMode.updateUI(state.timer);
                        }
                    }
                });

            } else {
                state.user = null;
                document.getElementById('authBtn').innerText = 'Sign In';
                document.getElementById('syncDot').style.color = 'var(--warning)';
                document.getElementById('syncText').innerText = 'Offline';
                state.tasks = []; // Clear or load local
                app.renderTasks();
            }
        });

        app.init();
    </script>
</body>
</html>
