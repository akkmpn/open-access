<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Todo Checklist - Firebase Sync</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        :root {
            --color-primary: #208084;
            --color-primary-hover: #186c71;
            --color-bg: #f5f5f5;
            --color-surface: #ffffff;
            --color-text: #1a1a1a;
            --color-text-secondary: #666;
            --color-border: #e0e0e0;
            --color-success: #4caf50;
            --color-warning: #ff9800;
            --color-error: #f44336;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            background: var(--color-surface);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 700px;
            width: 100%;
            padding: 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: var(--color-text);
            font-size: 28px;
            margin-bottom: 15px;
        }

        .sync-status {
            font-size: 11px;
            color: #666;
            text-align: center;
            margin-top: 10px;
        }

        .sync-status.synced {
            color: #4caf50;
        }

        .sync-status.syncing {
            color: #ff9800;
        }

        .sync-status.error {
            color: #f44336;
        }

        .auth-section {
            display: none;
        }

        .auth-section.show {
            display: block;
        }

        .auth-form {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .auth-form .form-group {
            margin-bottom: 15px;
        }

        .auth-form label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--color-text);
            font-size: 13px;
        }

        .auth-form input {
            width: 100%;
            padding: 10px;
            border: 2px solid var(--color-border);
            border-radius: 6px;
            font-size: 13px;
        }

        .auth-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .auth-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
        }

        .auth-login {
            background: var(--color-primary);
            color: white;
        }

        .auth-signup {
            background: var(--color-border);
            color: var(--color-text);
        }

        .auth-guest {
            width: 100%;
            background: #e8e8e8;
            color: var(--color-text);
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
        }

        .user-info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-email {
            font-weight: 600;
            font-size: 14px;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .todo-section {
            display: none;
        }

        .todo-section.show {
            display: block;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--color-border);
            overflow-x: auto;
        }

        .tab-btn {
            padding: 12px 20px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: var(--color-text-secondary);
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
            margin-bottom: -2px;
            white-space: nowrap;
        }

        .tab-btn:hover {
            color: var(--color-primary);
        }

        .tab-btn.active {
            color: var(--color-primary);
            border-bottom-color: var(--color-primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-box .value {
            font-size: 24px;
            font-weight: bold;
            display: block;
        }

        .stat-box .label {
            font-size: 12px;
            margin-top: 5px;
            opacity: 0.9;
        }

        input[type="text"],
        input[type="date"] {
            padding: 12px;
            border: 2px solid var(--color-border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
            width: 100%;
        }

        input[type="text"]:focus,
        input[type="date"]:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(32, 128, 132, 0.1);
        }

        select {
            padding: 12px;
            border: 2px solid var(--color-border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            background-color: var(--color-surface);
            cursor: pointer;
            transition: border-color 0.3s;
            width: 100%;
        }

        select:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-primary {
            background: var(--color-primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--color-primary-hover);
            box-shadow: 0 5px 15px rgba(32, 128, 132, 0.3);
        }

        .btn-secondary {
            background: var(--color-border);
            color: var(--color-text);
            padding: 8px 16px;
            font-size: 12px;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .btn-danger {
            background: var(--color-error);
            color: white;
            padding: 8px 16px;
            font-size: 12px;
        }

        .btn-danger:hover {
            background: #d32f2f;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }

        .add-task-section {
            display: grid;
            grid-template-columns: 1fr 100px 120px 80px;
            gap: 10px;
            margin-bottom: 15px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--color-text);
            margin-top: 20px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title.completed {
            color: var(--color-success);
        }

        .section-title.overdue {
            color: var(--color-error);
        }

        .section-title.pending {
            color: var(--color-primary);
        }

        .tasks-container {
            max-height: 700px;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .task-item {
            display: flex;
            align-items: flex-start;
            padding: 12px;
            background: var(--color-bg);
            border-radius: 8px;
            margin-bottom: 8px;
            border-left: 4px solid var(--color-border);
            flex-direction: column;
        }

        .task-item.completed {
            opacity: 0.6;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: var(--color-text-secondary);
        }

        .task-item.overdue {
            border-left: 4px solid var(--color-error);
            background: rgba(244, 67, 54, 0.08);
        }

        .task-item.overdue .task-text {
            color: var(--color-error);
            font-weight: 600;
        }

        .task-item.priority-high {
            border-left: 4px solid #ff5252;
        }

        .task-item.priority-medium {
            border-left: 4px solid #ff9800;
        }

        .task-item.priority-low {
            border-left: 4px solid #4caf50;
        }

        .task-header {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--color-primary);
            flex-shrink: 0;
        }

        .task-content {
            flex: 1;
        }

        .task-meta {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-top: 4px;
            flex-wrap: wrap;
        }

        .task-text {
            font-size: 14px;
            color: var(--color-text);
            font-weight: 500;
        }

        .task-duedate {
            font-size: 11px;
            color: var(--color-text-secondary);
        }

        .priority-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .priority-badge.high {
            background: #ff5252;
            color: white;
        }

        .priority-badge.medium {
            background: #ff9800;
            color: white;
        }

        .priority-badge.low {
            background: #4caf50;
            color: white;
        }

        .task-remove {
            background: transparent;
            border: none;
            color: var(--color-error);
            cursor: pointer;
            font-size: 16px;
            padding: 5px 10px;
            border-radius: 4px;
        }

        .task-remove:hover {
            background: rgba(244, 67, 54, 0.1);
        }

        .subtasks-list {
            margin-top: 12px;
            margin-left: 0;
            width: 100%;
            background: rgba(32, 128, 132, 0.04);
            border-radius: 6px;
            padding: 10px;
            border: 1px solid rgba(32, 128, 132, 0.1);
        }

        .subtask-item {
            display: flex;
            align-items: center;
            padding: 8px;
            background: transparent;
            border-radius: 6px;
            margin-bottom: 6px;
            font-size: 13px;
            gap: 8px;
        }

        .subtask-item:last-child {
            margin-bottom: 0;
        }

        .subtask-item.completed {
            opacity: 0.6;
        }

        .subtask-item.completed .subtask-text {
            text-decoration: line-through;
            color: var(--color-text-secondary);
        }

        .subtask-checkbox {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: var(--color-primary);
            flex-shrink: 0;
        }

        .subtask-text {
            flex: 1;
            color: var(--color-text);
        }

        .subtask-remove {
            background: none;
            border: none;
            color: var(--color-error);
            cursor: pointer;
            font-size: 14px;
            padding: 0 5px;
        }

        .add-subtask-btn {
            background: rgba(32, 128, 132, 0.1);
            border: 1px dashed var(--color-primary);
            color: var(--color-primary);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 6px;
            width: 100%;
        }

        .add-subtask-btn:hover {
            background: rgba(32, 128, 132, 0.15);
        }

        .toggle-subtasks {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--color-primary);
            font-size: 12px;
            padding: 0;
            width: 16px;
            text-align: center;
        }

        .empty-state {
            text-align: center;
            padding: 30px 20px;
            color: var(--color-text-secondary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .action-buttons button {
            flex: 1;
        }

        .scrollbar {
            scrollbar-width: thin;
            scrollbar-color: var(--color-border) transparent;
        }

        .scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .scrollbar::-webkit-scrollbar-thumb {
            background: var(--color-border);
            border-radius: 3px;
        }

        .report-filters {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 10px;
            margin-bottom: 25px;
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin-bottom: 30px;
            background: var(--color-bg);
            padding: 20px;
            border-radius: 8px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .report-stat-box {
            background: var(--color-bg);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border-left: 4px solid var(--color-primary);
        }

        .report-stat-box.completed {
            border-left-color: var(--color-success);
        }

        .report-stat-box.pending {
            border-left-color: var(--color-warning);
        }

        .report-stat-box .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: var(--color-text);
            margin-bottom: 5px;
        }

        .report-stat-box .stat-label {
            font-size: 12px;
            color: var(--color-text-secondary);
            text-transform: uppercase;
        }

        .calendar-container {
            background: var(--color-bg);
            padding: 20px;
            border-radius: 8px;
        }

        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: white;
            border: 1px solid var(--color-border);
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .calendar-day:hover {
            transform: scale(1.05);
        }

        .calendar-day.header {
            font-weight: bold;
            background: var(--color-primary);
            color: white;
            cursor: default;
        }

        .calendar-day.progress-0 {
            background: rgba(244, 67, 54, 0.1);
            color: var(--color-error);
        }

        .calendar-day.progress-50 {
            background: rgba(255, 152, 0, 0.1);
            color: var(--color-warning);
        }

        .calendar-day.progress-100 {
            background: rgba(76, 175, 80, 0.1);
            color: var(--color-success);
        }

        .calendar-day .date {
            font-weight: 600;
        }

        .calendar-day .percent {
            font-size: 11px;
        }

        .progress-details {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--color-border);
            max-height: 400px;
            overflow-y: auto;
        }

        .progress-row {
            display: grid;
            grid-template-columns: 1fr 100px 100px;
            gap: 15px;
            padding: 10px 0;
            border-bottom: 1px solid var(--color-border);
            align-items: center;
        }

        .progress-row:last-child {
            border-bottom: none;
        }

        .progress-row-date {
            font-weight: 500;
            color: var(--color-text);
        }

        .progress-row-stats {
            text-align: center;
            font-size: 13px;
            color: var(--color-text-secondary);
        }

        .progress-bar {
            background: var(--color-border);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background: var(--color-primary);
            height: 100%;
            transition: width 0.3s;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .add-task-section {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .report-filters {
                grid-template-columns: 1fr;
            }

            .tab-btn {
                padding: 10px 15px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✓ Daily Todo Checklist</h1>
            <div class="sync-status" id="syncStatus">Connecting...</div>
        </div>

        <!-- AUTH SECTION -->
        <div class="auth-section show" id="authSection">
            <div class="auth-form">
                <div class="form-group">
                    <label>📧 Email</label>
                    <input type="email" id="authEmail" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>🔐 Password</label>
                    <input type="password" id="authPassword" placeholder="At least 6 characters">
                </div>
                <div class="auth-buttons">
                    <button class="auth-login" onclick="firebaseLogin()">🔐 Login</button>
                    <button class="auth-signup" onclick="firebaseSignup()">📝 Sign Up</button>
                </div>
                <button class="auth-guest" onclick="loginAsGuest()">👤 Continue as Guest (Local)</button>
            </div>
            <div style="text-align: center; color: #999; font-size: 12px;">
                <p>💡 Demo Account:</p>
                <p>Email: <strong>test@example.com</strong></p>
                <p>Password: <strong>123456</strong></p>
            </div>
        </div>

        <!-- TODO SECTION -->
        <div class="todo-section" id="todoSection">
            <div class="user-info">
                <span class="user-email" id="userEmail">Guest</span>
                <button class="logout-btn" id="logoutBtn" onclick="firebaseLogout()" style="display:none;">🚪 Logout</button>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('tasks')">📝 Tasks</button>
                <button class="tab-btn" onclick="switchTab('reports')">📊 Reports</button>
            </div>

            <!-- TASKS TAB -->
            <div id="tasks" class="tab-content active">
                <div class="stats">
                    <div class="stat-box">
                        <span class="value" id="completionPercent">0%</span>
                        <span class="label">Today's Progress</span>
                    </div>
                    <div class="stat-box">
                        <span class="value" id="completedCount">0/0</span>
                        <span class="label">Completed Today</span>
                    </div>
                    <div class="stat-box">
                        <span class="value" id="streakCount">0</span>
                        <span class="label">Day Streak</span>
                    </div>
                </div>

                <div class="add-task-section">
                    <input type="text" id="taskInput" placeholder="What do you want to accomplish today?">
                    <input type="date" id="dueDateInput">
                    <select id="prioritySelect">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                    <button class="btn btn-primary" onclick="addTask()">Add Task</button>
                </div>

                <div class="tasks-container scrollbar" id="tasksContainer">
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>No tasks yet. Add one to get started!</p>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="btn btn-secondary" onclick="resetToday()">Reset Today</button>
                    <button class="btn btn-danger" onclick="clearAllTasks()">Clear All</button>
                </div>
            </div>

            <!-- REPORTS TAB -->
            <div id="reports" class="tab-content">
                <div class="report-filters">
                    <input type="date" id="filterFromDate" onchange="updateReport()">
                    <input type="date" id="filterToDate" onchange="updateReport()">
                    <button class="btn btn-primary btn-small" onclick="generateReport()">Generate</button>
                </div>

                <div class="chart-container">
                    <canvas id="progressChart"></canvas>
                </div>

                <div class="stats-grid">
                    <div class="report-stat-box">
                        <div class="stat-value" id="reportTotal">0</div>
                        <div class="stat-label">Total Tasks</div>
                    </div>
                    <div class="report-stat-box completed">
                        <div class="stat-value" id="reportCompleted">0</div>
                        <div class="stat-label">Completed</div>
                    </div>
                    <div class="report-stat-box pending">
                        <div class="stat-value" id="reportPending">0</div>
                        <div class="stat-label">Pending</div>
                    </div>
                </div>

                <div class="calendar-container">
                    <h3 style="margin-bottom: 15px; color: var(--color-text);">Last 30 Days Calendar</h3>
                    <div class="calendar" id="calendarView"></div>
                </div>

                <div style="margin-top: 25px;">
                    <h3 style="margin-bottom: 15px; color: var(--color-text);">Daily Progress</h3>
                    <div class="progress-details" id="progressDetails"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK v9+ (Modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getDatabase, ref, set, get, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

        console.log('📝 Firebase module loading...');

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCoCFw0hezldX3t33AYa1ytddYMuQCWliM",
            authDomain: "daily-todo-1e4ad.firebaseapp.com",
            projectId: "daily-todo-1e4ad",
            storageBucket: "daily-todo-1e4ad.firebasestorage.app",
            messagingSenderId: "629797690976",
            appId: "1:629797690976:web:fda66df1691eb920e12d05",
            measurementId: "G-KG0NGWBFCW",
            databaseURL: "https://daily-todo-1e4ad-default-rtdb.firebaseio.com"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        console.log('✅ Firebase initialized');

        // Global Variables
        let tasks = [];
        let today = new Date().toDateString();
        let progressChart = null;
        let currentUser = null;
        let isGuest = false;
        let syncListener = null;
        // Use different storage keys for guest vs logged-in user
function getCurrentTasksKey() {
    if (isGuest || !currentUser) {
        return 'tasks_guest';
    }
    return 'tasks_' + currentUser.uid;
}


        // ===== FIREBASE AUTH =====
        window.firebaseLogin = async function() {
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value;

            if (!email || !password) {
                alert('Please enter email and password');
                return;
            }

            try {
                updateSyncStatus('Logging in...');
                const result = await signInWithEmailAndPassword(auth, email, password);
                currentUser = result.user;
                isGuest = false;
                console.log('✅ Login successful:', currentUser.email);
                updateSyncStatus('Synced');
            } catch (error) {
                console.error('Login error:', error);
                alert('❌ ' + error.message);
                updateSyncStatus('Error');
            }
        };

        window.firebaseSignup = async function() {
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value;

            if (!email || !password) {
                alert('Please enter email and password');
                return;
            }

            if (password.length < 6) {
                alert('Password must be at least 6 characters');
                return;
            }

            try {
                updateSyncStatus('Creating account...');
                const result = await createUserWithEmailAndPassword(auth, email, password);
                currentUser = result.user;
                isGuest = false;
                console.log('✅ Signup successful:', currentUser.email);
                updateSyncStatus('Synced');
            } catch (error) {
                console.error('Signup error:', error);
                alert('❌ ' + error.message);
                updateSyncStatus('Error');
            }
        };

window.firebaseLogout = async function() {
    if (!confirm('Logout?')) return;
    await signOut(auth);
    currentUser = null;
    isGuest = false;
    tasks = [];
    if (syncListener) syncListener();
    document.getElementById('userEmail').textContent = 'Guest';
    document.getElementById('logoutBtn').style.display = 'none';
    updateSyncStatus('Logged out');
    showAuthSection();
    renderTasks();  // show empty
};
    } catch (error) {
        console.error('Logout error:', error);
        alert(error.message);
        updateSyncStatus('Error');
    }
};


window.loginAsGuest = function() {
    isGuest = true;
    currentUser = null;
    document.getElementById('userEmail').textContent = '👤 Guest (Local)';
    document.getElementById('logoutBtn').style.display = 'none';
    updateSyncStatus('Guest Mode');
    showTodoSection();
    loadTasks(false);  // only guest local tasks
};


        // ===== SYNC WITH FIREBASE =====
        function syncWithFirebase() {
            if (!currentUser || isGuest) return;

            try {
                const tasksRef = ref(db, 'users/' + currentUser.uid + '/tasks');
                
                if (syncListener) syncListener();

syncListener = onValue(tasksRef, 
    (snapshot) => {
        const data = snapshot.val();
        tasks = data ? data : []; // keep as array
        console.log('☁️ Synced from Firebase:', tasks.length, 'tasks');

        // cache only to this user’s key, do NOT call saveTasks() again
        const key = getCurrentTasksKey();
        localStorage.setItem(key, JSON.stringify(tasks));

        renderTasks();
        updateSyncStatus('Synced');
    }, (error) => {
                    console.error('Sync error:', error);
                    updateSyncStatus('Sync Error');
                });
            } catch (error) {
                console.error('Sync setup error:', error);
            }
        }

        // ===== AUTH STATE LISTENER =====
onAuthStateChanged(auth, (user) => {
    console.log('Auth state changed:', user?.email || 'No user');
    
    if (user) {
        currentUser = user;
        isGuest = false;
        document.getElementById('userEmail').textContent = user.email;
        document.getElementById('logoutBtn').style.display = 'block';
        showTodoSection();
        loadTasks(true);      // from Firebase for this user
        syncWithFirebase();
    } else if (isGuest) {
        document.getElementById('userEmail').textContent = 'Guest (Local)';
        document.getElementById('logoutBtn').style.display = 'none';
        showTodoSection();
        loadTasks(false);     // guest local only
    } else {
        showAuthSection();
    }
});


        // ===== UI FUNCTIONS =====
        function showAuthSection() {
            document.getElementById('authSection').classList.add('show');
            document.getElementById('todoSection').classList.remove('show');
            document.getElementById('authEmail').value = '';
            document.getElementById('authPassword').value = '';
        }

        function showTodoSection() {
            document.getElementById('authSection').classList.remove('show');
            document.getElementById('todoSection').classList.add('show');
        }

        function updateSyncStatus(status) {
            const el = document.getElementById('syncStatus');
            el.textContent = status;
            if (status === 'Synced') {
                el.className = 'sync-status synced';
            } else if (status.includes('...')) {
                el.className = 'sync-status syncing';
            } else {
                el.className = 'sync-status error';
            }
        }

        window.switchTab = function(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
            if (tabName === 'reports') setTimeout(generateReport, 100);
        };

        // ===== STORAGE FUNCTIONS =====
function loadTasks(fromFirebase = false) {
    const key = getCurrentTasksKey();

    if (currentUser && !isGuest && fromFirebase) {
        // ONLY logged-in user, ONLY when explicitly asked
        const tasksRef = ref(db, 'users/' + currentUser.uid + '/tasks');
        get(tasksRef).then(snapshot => {
            const data = snapshot.val();
            tasks = data ? data : [];
            localStorage.setItem(key, JSON.stringify(tasks));
            renderTasks();
        }).catch(e => {
            console.error('Firebase load error', e);
            const stored = localStorage.getItem(key);
            tasks = stored ? JSON.parse(stored) : [];
            renderTasks();
        });
    } else {
        // guest or cached
        const stored = localStorage.getItem(key);
        tasks = stored ? JSON.parse(stored) : [];
        renderTasks();
    }
}

async function saveTasks() {
    const key = getCurrentTasksKey();
    try {
        localStorage.setItem(key, JSON.stringify(tasks));

        if (currentUser && !isGuest) {
            const tasksRef = ref(db, 'users/' + currentUser.uid + '/tasks');
            await set(tasksRef, tasks);
            console.log('✅ Saved to Firebase');
            updateSyncStatus('Synced');
        }
    } catch (e) {
        if (e.name === 'QuotaExceededError') {
            alert('Storage limit exceeded! Please clear old tasks.');
            updateSyncStatus('Storage Full');
        } else {
            console.error('Error saving tasks', e);
        }
    }
}

        function getStreakCount() {
            return parseInt(localStorage.getItem('streakCount')) || 0;
        }

        function updateStreakCounter() {
            const lastUsedKey = 'lastUsedDate';
            const streakKey = 'streakCount';
            const lastUsed = localStorage.getItem(lastUsedKey);
            let streak = parseInt(localStorage.getItem(streakKey)) || 1;

            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);

            if (lastUsed === yesterday.toDateString()) {
                streak++;
            } else if (lastUsed !== today) {
                streak = 1;
            }

            localStorage.setItem(streakKey, streak.toString());
            localStorage.setItem(lastUsedKey, today);
        }

        // ===== TASK FUNCTIONS =====
        window.addTask = function() {
            const input = document.getElementById('taskInput');
            const priority = document.getElementById('prioritySelect').value;
            const dueDate = document.getElementById('dueDateInput').value;
            const text = input.value.trim();

            if (!text) {
                alert('Please enter a task!');
                return;
            }

            updateStreakCounter();

            tasks.push({
                id: Date.now(),
                text: text,
                completed: false,
                priority: priority,
                date: today,
                dueDate: dueDate || null,
                subTasks: [],
                expanded: true
            });

            input.value = '';
            document.getElementById('dueDateInput').value = '';
            saveTasks();
            loadTasks();
            input.focus();
        };

        window.toggleTask = function(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                loadTasks();
            }
        };

        window.removeTask = function(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveTasks();
            loadTasks();
        };

        window.resetToday = function() {
            if (confirm('Reset all todays tasks?')) {
                tasks.forEach(t => {
                    if (t.date === today) t.completed = false;
                });
                saveTasks();
                loadTasks();
            }
        };

        window.clearAllTasks = function() {
            if (confirm('Delete all tasks permanently?')) {
                tasks = [];
                saveTasks();
                loadTasks();
            }
        };

        // ===== SUBTASK FUNCTIONS =====
        window.addSubtask = function(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;
            if (!task.subTasks) task.subTasks = [];
            if (task.subTasks.length >= 20) {
                alert('Maximum 20 subtasks per task!');
                return;
            }

            const input = prompt('Add subtask (max 100 chars):');
            if (input !== null) {
                const trimmedText = input.trim();
                if (trimmedText.length === 0) {
                    alert('Subtask cannot be empty!');
                    return;
                }
                if (trimmedText.length > 100) {
                    alert('Subtask must be 100 characters or less!');
                    return;
                }

                task.subTasks.push({
                    id: Date.now(),
                    text: trimmedText,
                    completed: false
                });

                saveTasks();
                loadTasks();
            }
        };

        window.toggleSubtask = function(taskId, subtaskId) {
            const task = tasks.find(t => t.id === taskId);
            if (task && task.subTasks) {
                const subtask = task.subTasks.find(st => st.id === subtaskId);
                if (subtask) {
                    subtask.completed = !subtask.completed;
                    checkTaskCompletion(taskId);
                    saveTasks();
                    loadTasks();
                }
            }
        };

        window.removeSubtask = function(taskId, subtaskId) {
            const task = tasks.find(t => t.id === taskId);
            if (task && task.subTasks) {
                task.subTasks = task.subTasks.filter(st => st.id !== subtaskId);
                saveTasks();
                loadTasks();
            }
        };

        window.toggleExpanded = function(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (task) {
                task.expanded = !task.expanded;
                saveTasks();
                loadTasks();
            }
        };

        function checkTaskCompletion(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (task && task.subTasks && task.subTasks.length > 0) {
                const allCompleted = task.subTasks.every(st => st.completed);
                const anyIncomplete = task.subTasks.some(st => !st.completed);

                if (allCompleted) {
                    task.completed = true;
                } else if (anyIncomplete) {
                    task.completed = false;
                }
            }
        }

        function isOverdue(task) {
            if (!task.dueDate || task.completed) return false;

            const todayObj = new Date();
            todayObj.setHours(0, 0, 0, 0);
            const dueDate = new Date(task.dueDate);
            dueDate.setHours(0, 0, 0, 0);

            return dueDate < todayObj;
        }

        // ===== RENDER TASKS =====
        function renderTasks() {
            const container = document.getElementById('tasksContainer');
            const todayTasks = tasks.filter(t => t.date === today);
            const completedToday = todayTasks.filter(t => t.completed).length;
            const percentToday = todayTasks.length > 0 ? Math.round((completedToday / todayTasks.length) * 100) : 0;

            document.getElementById('completionPercent').textContent = percentToday + '%';
            document.getElementById('completedCount').textContent = completedToday + '/' + todayTasks.length;
            document.getElementById('streakCount').textContent = getStreakCount();

            if (todayTasks.length === 0) {
                container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📭</div><p>No tasks yet. Add one to get started!</p></div>`;
                return;
            }

            const priorityOrder = { high: 0, medium: 1, low: 2 };
            const overdueTasks = todayTasks.filter(t => isOverdue(t));
            const completedTasks = todayTasks.filter(t => t.completed);
            const pendingTasks = todayTasks.filter(t => !t.completed && !isOverdue(t));

            const sortTasks = (tasks) => [...tasks].sort((a, b) => priorityOrder[a.priority] - priorityOrder[b.priority]);

            let html = '';

            if (overdueTasks.length > 0) {
                html += `<div class="section-title overdue">⏰ Overdue (${overdueTasks.length})</div>`;
                html += sortTasks(overdueTasks).map(task => renderTaskItem(task)).join('');
            }

            if (pendingTasks.length > 0) {
                html += `<div class="section-title pending">📌 Pending (${pendingTasks.length})</div>`;
                html += sortTasks(pendingTasks).map(task => renderTaskItem(task)).join('');
            }

            if (completedTasks.length > 0) {
                html += `<div class="section-title completed">✅ Completed (${completedTasks.length})</div>`;
                html += sortTasks(completedTasks).map(task => renderTaskItem(task)).join('');
            }

            container.innerHTML = html;
        }

        function renderTaskItem(task) {
            const overdue = isOverdue(task);
            const hasSubTasks = task.subTasks && task.subTasks.length > 0;
            const completedSubTasks = hasSubTasks ? task.subTasks.filter(st => st.completed).length : 0;
            const subTaskProgress = hasSubTasks ? completedSubTasks + '/' + task.subTasks.length : '';

            return `<div class="task-item ${task.completed ? 'completed' : ''} ${overdue ? 'overdue' : ''} priority-${task.priority}">
                <div class="task-header">
                    <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''} onchange="window.toggleTask(${task.id})">
                    <div class="task-content" style="flex: 1;">
                        <div class="task-text">${escapeHtml(task.text)} ${subTaskProgress ? '<span style="font-size: 11px; color: #999;">(' + subTaskProgress + ')</span>' : ''}</div>
                        <div class="task-meta">
                            ${task.dueDate ? '<span class="task-duedate">' + new Date(task.dueDate).toLocaleDateString('en-IN') + '</span>' : ''}
                            <span class="priority-badge ${task.priority}">${task.priority}</span>
                        </div>
                    </div>
                    <button class="task-remove" onclick="window.removeTask(${task.id})">✕</button>
                </div>
                ${hasSubTasks ? `<div class="subtasks-list">${task.expanded ? task.subTasks.map(st => `
                    <div class="subtask-item ${st.completed ? 'completed' : ''}">
                        <input type="checkbox" class="subtask-checkbox" ${st.completed ? 'checked' : ''} onchange="window.toggleSubtask(${task.id}, ${st.id})">
                        <div class="subtask-text">${escapeHtml(st.text)}</div>
                        <button class="subtask-remove" onclick="window.removeSubtask(${task.id}, ${st.id})">✕</button>
                    </div>
                `).join('') : '<div style="color: var(--color-text-secondary); font-size: 12px"><p>Subtasks hidden...</p></div>'}</div>
                    <button class="add-subtask-btn" style="border-color: var(--color-primary); background: transparent;" onclick="window.toggleExpanded(${task.id})">${task.expanded ? 'Collapse' : 'Expand'}</button>
                    ${task.expanded ? '' : '<button class="add-subtask-btn" onclick="window.addSubtask(' + task.id + ')">Add Subtask</button>'}
                </div>` : ''}
                ${!hasSubTasks ? '<button class="add-subtask-btn" onclick="window.addSubtask(' + task.id + ')">Add Subtask</button>' : ''}
            </div>`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ===== REPORTS =====
        window.generateReport = function() {
            const fromDate = document.getElementById('filterFromDate').value;
            const toDate = document.getElementById('filterToDate').value;

            let startDate = fromDate ? new Date(fromDate) : new Date(new Date().setDate(new Date().getDate() - 30));
            let endDate = toDate ? new Date(toDate) : new Date();

            const filteredTasks = tasks.filter(t => {
                const taskDate = new Date(t.date);
                return taskDate >= startDate && taskDate <= endDate;
            });

            const totalTasks = filteredTasks.length;
            const completedTasks = filteredTasks.filter(t => t.completed).length;
            const pendingTasks = totalTasks - completedTasks;

            document.getElementById('reportTotal').textContent = totalTasks;
            document.getElementById('reportCompleted').textContent = completedTasks;
            document.getElementById('reportPending').textContent = pendingTasks;

            generateCalendar(startDate, endDate);
            generateChart(startDate, endDate);
            generateProgressDetails(startDate, endDate);
        };

        function generateCalendar(startDate, endDate) {
            const calendarDiv = document.getElementById('calendarView');
            calendarDiv.innerHTML = '';

            const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            dayNames.forEach(day => {
                const header = document.createElement('div');
                header.className = 'calendar-day header';
                header.textContent = day;
                calendarDiv.appendChild(header);
            });

            let currentDate = new Date(startDate);
            while (currentDate <= endDate) {
                const dateStr = currentDate.toDateString();
                const dayTasks = tasks.filter(t => t.date === dateStr);
                const completed = dayTasks.filter(t => t.completed).length;
                const percent = dayTasks.length > 0 ? Math.round((completed / dayTasks.length) * 100) : 0;

                const dayDiv = document.createElement('div');
                dayDiv.className = `calendar-day progress-${percent === 0 ? 0 : percent === 100 ? 100 : 50}`;
                dayDiv.innerHTML = `<span class="date">${currentDate.getDate()}</span><span class="percent">${percent}%</span>`;
                calendarDiv.appendChild(dayDiv);

                currentDate.setDate(currentDate.getDate() + 1);
            }
        }

        function generateChart(startDate, endDate) {
            const chartCanvas = document.getElementById('progressChart');
            const dateMap = {};

            let currentDate = new Date(startDate);
            while (currentDate <= endDate) {
                const dateStr = currentDate.toDateString();
                const dayTasks = tasks.filter(t => t.date === dateStr);
                const completed = dayTasks.filter(t => t.completed).length;
                dateMap[dateStr] = { completed: completed, total: dayTasks.length };
                currentDate.setDate(currentDate.getDate() + 1);
            }

            const labels = Object.keys(dateMap).map(d => new Date(d).toLocaleDateString('en-IN', { month: 'short', day: 'numeric' }));
            const completedData = Object.values(dateMap).map(d => d.completed);
            const totalData = Object.values(dateMap).map(d => d.total);

            if (progressChart) progressChart.destroy();

            progressChart = new Chart(chartCanvas, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Completed',
                            data: completedData,
                            backgroundColor: 'rgba(76, 175, 80, 0.7)',
                            borderColor: '#4caf50',
                            borderWidth: 1
                        },
                        {
                            label: 'Total',
                            data: totalData,
                            backgroundColor: 'rgba(224, 224, 224, 0.5)',
                            borderColor: '#ccc',
                            borderWidth: 1
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'top' } },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { stepSize: 1 }
                        }
                    }
                }
            });
        }

        function generateProgressDetails(startDate, endDate) {
            const detailsDiv = document.getElementById('progressDetails');
            let html = '';
            let currentDate = new Date(startDate);
            const rows = [];

            while (currentDate <= endDate) {
                const dateStr = currentDate.toDateString();
                const dayTasks = tasks.filter(t => t.date === dateStr);
                const completed = dayTasks.filter(t => t.completed).length;
                const percent = dayTasks.length > 0 ? Math.round((completed / dayTasks.length) * 100) : 0;

                rows.push({ dateStr, completed, total: dayTasks.length, percent });
                currentDate.setDate(currentDate.getDate() + 1);
            }

            rows.reverse().forEach(row => {
                html += `<div class="progress-row">
                    <div class="progress-row-date">${new Date(row.dateStr).toLocaleDateString('en-IN')}</div>
                    <div class="progress-row-stats">${row.completed}/${row.total}</div>
                    <div style="flex: 1;">
                        <div class="progress-bar">
                            <div class="progress-bar-fill" style="width: ${row.percent}%"></div>
                        </div>
                    </div>
                </div>`;
            });

            detailsDiv.innerHTML = html;
        }

        window.updateReport = function() {
            generateReport();
        };

        // ===== INITIALIZATION =====
        console.log('🚀 App ready');

        document.getElementById('taskInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });

        const todayDate = new Date();
        const thirtyDaysAgo = new Date(todayDate);
        thirtyDaysAgo.setDate(todayDate.getDate() - 30);

        document.getElementById('filterFromDate').valueAsDate = thirtyDaysAgo;
        document.getElementById('filterToDate').valueAsDate = new Date();

        loadTasks();
        updateStreakCounter();

        setInterval(() => {
            const newToday = new Date().toDateString();
            if (newToday !== today) {
                today = newToday;
                loadTasks();
                updateStreakCounter();
            }
        }, 60000);
    </script>
