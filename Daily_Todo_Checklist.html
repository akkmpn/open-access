<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise TaskPro - Platinum Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* ==================== THEME & VARIABLES ==================== */
        :root {
            --bg-body: #0f172a;
            --bg-sidebar: #1e293b;
            --bg-card: #334155;
            --bg-input: #1e293b;
            --accent: #208084; /* Teal focus */
            --accent-hover: #2ba8ad;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #475569;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-body); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* ==================== SIDEBAR ==================== */
        .sidebar {
            width: 260px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .logo {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo i { color: var(--accent); }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 10px;
            margin-bottom: 5px;
            transition: 0.2s;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }
        .nav-link:hover { background: rgba(255,255,255,0.05); color: var(--text-main); }
        .nav-link.active { background: var(--accent); color: white; }
        .nav-link i { width: 20px; text-align: center; }

        /* ==================== MAIN CONTENT ==================== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* HEADER */
        .header {
            height: 70px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }
        .connection-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--warning);
        }
        .connection-dot.online { background: var(--success); box-shadow: 0 0 10px var(--success); }

        /* VIEWS (TABS) */
        .view-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .view-container.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ==================== COMPONENTS ==================== */
        
        /* Buttons */
        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 13px;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-secondary { background: var(--bg-card); color: var(--text-main); border: 1px solid var(--border); }
        .btn-icon { padding: 8px; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }

        /* Inputs */
        .input-group {
            background: var(--bg-card);
            padding: 6px;
            border-radius: 12px;
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            align-items: center;
        }
        .main-input {
            background: transparent;
            border: none;
            color: white;
            padding: 10px;
            flex: 1;
            outline: none;
            font-size: 15px;
        }
        .date-input {
            background: var(--bg-body);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 8px;
            border-radius: 6px;
            color-scheme: dark;
        }

        /* Task Cards */
        .task-list { display: flex; flex-direction: column; gap: 12px; }
        .task-card {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 16px;
            border-left: 4px solid var(--border);
            transition: transform 0.2s, border-color 0.2s;
        }
        .task-card:hover { transform: translateY(-2px); }
        
        .task-header { display: flex; align-items: flex-start; gap: 15px; }
        .checkbox {
            appearance: none;
            width: 20px; height: 20px;
            border: 2px solid var(--text-muted);
            border-radius: 6px;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
        }
        .checkbox:checked { background: var(--accent); border-color: var(--accent); }
        .checkbox:checked::after {
            content: '✓'; position: absolute; color: white;
            font-size: 12px; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        .task-content { flex: 1; }
        .task-title { font-size: 15px; margin-bottom: 5px; line-height: 1.4; }
        .task-meta { display: flex; gap: 10px; font-size: 12px; color: var(--text-muted); align-items: center; }
        
        .tag { padding: 2px 8px; border-radius: 10px; background: rgba(255,255,255,0.1); font-size: 11px; }
        .priority-high { border-left-color: var(--danger); }
        .priority-medium { border-left-color: var(--warning); }
        .priority-low { border-left-color: var(--success); }

        /* Subtasks */
        .subtasks {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; gap: 8px;
        }
        .subtask-row { display: flex; align-items: center; gap: 10px; font-size: 13px; padding-left: 10px; }
        .subtask-input-row { display: flex; gap: 10px; margin-top: 5px; padding-left: 30px; }

        /* Calendar Grid */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-top: 20px;
        }
        .cal-day-header { text-align: center; font-size: 12px; color: var(--text-muted); padding-bottom: 10px; }
        .cal-cell {
            background: var(--bg-card);
            border-radius: 8px;
            min-height: 100px;
            padding: 10px;
            border: 1px solid var(--border);
            position: relative;
        }
        .cal-cell.today { border-color: var(--accent); background: rgba(32, 128, 132, 0.1); }
        .cal-date { font-size: 12px; font-weight: bold; margin-bottom: 5px; }
        .cal-task-dot {
            width: 100%; margin-bottom: 2px;
            padding: 2px 4px; border-radius: 4px;
            font-size: 10px; background: var(--bg-input);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            cursor: pointer;
        }
        .cal-task-dot.done { text-decoration: line-through; opacity: 0.5; }

        /* Suggestions */
        .suggestions { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 10px; }
        .suggestion-chip {
            padding: 4px 12px; background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 20px; font-size: 11px; cursor: pointer; white-space: nowrap; transition: 0.2s;
        }
        .suggestion-chip:hover { border-color: var(--accent); color: var(--accent); }

        /* Focus Timer */
        .timer-circle {
            width: 250px; height: 250px;
            border-radius: 50%;
            border: 8px solid var(--bg-card);
            display: flex; align-items: center; justify-content: center;
            margin: 40px auto;
            font-size: 50px; font-weight: 700;
            position: relative;
            background: radial-gradient(circle, var(--bg-sidebar) 0%, var(--bg-body) 100%);
            box-shadow: 0 0 30px rgba(0,0,0,0.3);
        }
        .timer-active { border-color: var(--accent); box-shadow: 0 0 30px rgba(32, 128, 132, 0.4); }

        /* Modal */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1000;
            display: none; align-items: center; justify-content: center;
        }
        .modal-content {
            background: var(--bg-sidebar); padding: 30px; border-radius: 16px;
            width: 400px; border: 1px solid var(--border);
            text-align: center;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .sidebar { position: absolute; transform: translateX(-100%); z-index: 20; height: 100%; }
            .sidebar.open { transform: translateX(0); }
            .calendar-grid { grid-template-columns: repeat(1, 1fr); }
            .header { padding: 0 15px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="logo">
            <i class="fas fa-bolt"></i> TaskPro Platinum
        </div>
        
        <nav>
            <button class="nav-link active" onclick="app.switchTab('dashboard')">
                <i class="fas fa-chart-pie"></i> Dashboard
            </button>
            <button class="nav-link" onclick="app.switchTab('tasks')">
                <i class="fas fa-tasks"></i> My Tasks
                <span id="badge" style="margin-left:auto; background:var(--accent); padding:2px 8px; border-radius:10px; font-size:10px;">0</span>
            </button>
            <button class="nav-link" onclick="app.switchTab('calendar')">
                <i class="far fa-calendar-alt"></i> Calendar Report
            </button>
            <button class="nav-link" onclick="app.switchTab('focus')">
                <i class="fas fa-stopwatch"></i> Focus To-Do
            </button>
        </nav>

        <div style="margin-top: auto;">
            <div class="nav-link" style="cursor: default; opacity: 0.7;">
                <i class="fas fa-cloud"></i> <span id="syncText">Offline Mode</span>
            </div>
            <button class="btn btn-secondary" style="width:100%; margin-top:10px;" id="authBtn" onclick="app.toggleAuth()">Sign In</button>
        </div>
    </aside>

    <main class="main">
        <header class="header">
            <button class="btn btn-icon" style="background:transparent; color:white; margin-right:10px; display:none;" onclick="document.getElementById('sidebar').classList.toggle('open')">
                <i class="fas fa-bars"></i>
            </button>
            <h2 id="pageTitle">Dashboard</h2>
            <div class="user-profile">
                <div class="connection-dot" id="syncDot"></div>
                <span id="userEmail">Guest</span>
            </div>
        </header>

        <div id="dashboard" class="view-container active">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px;">
                <div class="task-card" style="text-align:center;">
                    <div style="font-size:32px; font-weight:700; color:var(--accent);" id="dashTotal">0</div>
                    <div style="color:var(--text-muted); font-size:12px;">TOTAL TASKS</div>
                </div>
                <div class="task-card" style="text-align:center;">
                    <div style="font-size:32px; font-weight:700; color:var(--success);" id="dashDone">0</div>
                    <div style="color:var(--text-muted); font-size:12px;">COMPLETED</div>
                </div>
                <div class="task-card" style="text-align:center;">
                    <div style="font-size:32px; font-weight:700; color:var(--warning);" id="dashPending">0</div>
                    <div style="color:var(--text-muted); font-size:12px;">PENDING</div>
                </div>
            </div>

            <div class="task-card">
                <h3 style="margin-bottom:15px;">Productivity Trend</h3>
                <div style="height: 300px;"><canvas id="mainChart"></canvas></div>
            </div>
        </div>

        <div id="tasks" class="view-container">
            <div class="suggestions" id="suggestionsBox">
                </div>

            <div class="input-group">
                <input type="text" id="taskInput" class="main-input" placeholder="Add a task... (Use #tag for categories)">
                <input type="date" id="dateInput" class="date-input">
                <select id="prioInput" class="date-input" style="width:100px;">
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                    <option value="low">Low</option>
                </select>
                <button class="btn btn-primary" onclick="app.addTask()">
                    <i class="fas fa-plus"></i> Add
                </button>
            </div>

            <div id="taskList" class="task-list">
                </div>
        </div>

        <div id="calendar" class="view-container">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 id="calMonthYear">January 2024</h2>
                <div>
                    <button class="btn btn-secondary" onclick="app.changeMonth(-1)"><i class="fas fa-chevron-left"></i></button>
                    <button class="btn btn-secondary" onclick="app.changeMonth(1)"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
            <div class="calendar-grid" id="calGrid">
                </div>
        </div>

        <div id="focus" class="view-container">
            <div style="text-align:center; max-width:500px; margin:0 auto;">
                <h2>Deep Work Session</h2>
                <p style="color:var(--text-muted);">Stay focused for 25 minutes. No distractions.</p>
                
                <div class="timer-circle" id="timerCircle">
                    <span id="timerDisplay">25:00</span>
                </div>

                <div style="display:flex; justify-content:center; gap:15px;">
                    <button class="btn btn-primary" onclick="focusMode.start()">Start Focus</button>
                    <button class="btn btn-secondary" onclick="focusMode.pause()">Pause</button>
                    <button class="btn btn-secondary" style="border-color:var(--danger); color:var(--danger);" onclick="focusMode.reset()">Reset</button>
                </div>

                <div style="margin-top:40px; text-align:left;">
                    <h4>Session History</h4>
                    <ul id="focusLog" style="list-style:none; margin-top:10px; color:var(--text-muted); font-size:13px;"></ul>
                </div>
            </div>
        </div>

    </main>

    <div class="modal" id="authModal">
        <div class="modal-content">
            <h2 style="margin-bottom:20px;">Cloud Sync</h2>
            <input type="email" id="authEmail" class="main-input" style="border:1px solid var(--border); background:var(--bg-body); width:100%; margin-bottom:10px; border-radius:8px;" placeholder="Email">
            <input type="password" id="authPass" class="main-input" style="border:1px solid var(--border); background:var(--bg-body); width:100%; margin-bottom:20px; border-radius:8px;" placeholder="Password">
            
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <button class="btn btn-primary" style="flex:1" onclick="app.login()">Login</button>
                <button class="btn btn-secondary" style="flex:1" onclick="app.register()">Sign Up</button>
            </div>
            <button class="btn btn-icon" style="position:absolute; top:10px; right:10px; width:auto; height:auto;" onclick="document.getElementById('authModal').style.display='none'">✕</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyCoCFw0hezldX3t33AYa1ytddYMuQCWliM",
            authDomain: "daily-todo-1e4ad.firebaseapp.com",
            projectId: "daily-todo-1e4ad",
            storageBucket: "daily-todo-1e4ad.firebasestorage.app",
            messagingSenderId: "629797690976",
            appId: "1:629797690976:web:fda66df1691eb920e12d05",
            measurementId: "G-KG0NGWBFCW"
        };

        const appInit = initializeApp(firebaseConfig);
        const auth = getAuth(appInit);
        const db = getFirestore(appInit);

        // STATE
        const state = {
            user: null,
            tasks: [],
            history: JSON.parse(localStorage.getItem('taskHistory')) || ["Meeting", "Workout", "Study", "Groceries"],
            currentDate: new Date(),
            chart: null
        };

        // ==================== APP LOGIC ====================
        window.app = {
            // AUTH
            toggleAuth: () => {
                if(state.user) {
                    signOut(auth);
                } else {
                    document.getElementById('authModal').style.display = 'flex';
                }
            },
            login: async () => {
                try {
                    await signInWithEmailAndPassword(auth, document.getElementById('authEmail').value, document.getElementById('authPass').value);
                    document.getElementById('authModal').style.display = 'none';
                } catch(e) { alert(e.message); }
            },
            register: async () => {
                try {
                    await createUserWithEmailAndPassword(auth, document.getElementById('authEmail').value, document.getElementById('authPass').value);
                    document.getElementById('authModal').style.display = 'none';
                } catch(e) { alert(e.message); }
            },

            // NAVIGATION
            switchTab: (id) => {
                document.querySelectorAll('.view-container').forEach(el => el.classList.remove('active'));
                document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
                document.getElementById(id).classList.add('active');
                event.currentTarget.classList.add('active');
                document.getElementById('pageTitle').textContent = id.charAt(0).toUpperCase() + id.slice(1);
                
                if(id === 'dashboard') renderChart();
                if(id === 'calendar') renderCalendar();
            },

            // TASK CRUD
            addTask: async (title = null) => {
                const input = document.getElementById('taskInput');
                const text = title || input.value.trim();
                if(!text) return;

                // Add to history if unique
                if(!state.history.includes(text)) {
                    state.history.unshift(text);
                    if(state.history.length > 8) state.history.pop();
                    localStorage.setItem('taskHistory', JSON.stringify(state.history));
                    renderSuggestions();
                }

                const newTask = {
                    text: text,
                    completed: false,
                    date: document.getElementById('dateInput').value || new Date().toISOString().split('T')[0],
                    priority: document.getElementById('prioInput').value,
                    tags: (text.match(/#\w+/g) || []).map(t => t.replace('#','')),
                    subtasks: [],
                    createdAt: Date.now()
                };

                if(state.user) {
                    await addDoc(collection(db, 'tasks'), { ...newTask, uid: state.user.uid });
                } else {
                    newTask.id = 'local_' + Date.now();
                    state.tasks.push(newTask);
                    saveLocal();
                }
                
                input.value = '';
                renderSuggestions(); // Refresh history pills
            },

            toggleTask: async (id) => {
                const task = state.tasks.find(t => t.id === id);
                if(state.user) {
                    await updateDoc(doc(db, 'tasks', id), { completed: !task.completed });
                } else {
                    task.completed = !task.completed;
                    saveLocal();
                }
            },

            deleteTask: async (id) => {
                if(!confirm("Delete?")) return;
                if(state.user) {
                    await deleteDoc(doc(db, 'tasks', id));
                } else {
                    state.tasks = state.tasks.filter(t => t.id !== id);
                    saveLocal();
                }
            },

            // SUBTASKS
            addSubtask: async (parentId) => {
                const input = document.getElementById(`sub-input-${parentId}`);
                const text = input.value.trim();
                if(!text) return;

                const task = state.tasks.find(t => t.id === parentId);
                const subtasks = [...(task.subtasks || []), { id: Date.now(), text, completed: false }];

                if(state.user) {
                    await updateDoc(doc(db, 'tasks', parentId), { subtasks });
                } else {
                    task.subtasks = subtasks;
                    saveLocal();
                }
            },

            toggleSubtask: async (parentId, subId) => {
                const task = state.tasks.find(t => t.id === parentId);
                const subtasks = task.subtasks.map(s => s.id == subId ? {...s, completed: !s.completed} : s);
                
                if(state.user) {
                    await updateDoc(doc(db, 'tasks', parentId), { subtasks });
                } else {
                    task.subtasks = subtasks;
                    saveLocal();
                }
            },

            // CALENDAR CONTROLS
            changeMonth: (offset) => {
                state.currentDate.setMonth(state.currentDate.getMonth() + offset);
                renderCalendar();
            }
        };

        // ==================== FOCUS MODE LOGIC ====================
        let timerInterval = null;
        let timeLeft = 25 * 60;
        
        window.focusMode = {
            start: () => {
                if(timerInterval) return;
                document.getElementById('timerCircle').classList.add('timer-active');
                timerInterval = setInterval(() => {
                    timeLeft--;
                    updateTimerDisplay();
                    if(timeLeft <= 0) {
                        clearInterval(timerInterval);
                        alert("Focus Session Complete!");
                        focusMode.reset();
                    }
                }, 1000);
            },
            pause: () => {
                clearInterval(timerInterval);
                timerInterval = null;
                document.getElementById('timerCircle').classList.remove('timer-active');
            },
            reset: () => {
                focusMode.pause();
                timeLeft = 25 * 60;
                updateTimerDisplay();
            }
        };

        function updateTimerDisplay() {
            const m = Math.floor(timeLeft / 60).toString().padStart(2,'0');
            const s = (timeLeft % 60).toString().padStart(2,'0');
            document.getElementById('timerDisplay').textContent = `${m}:${s}`;
        }

        // ==================== RENDERING ====================
        
        function renderTasks() {
            const list = document.getElementById('taskList');
            list.innerHTML = "";
            
            // Stats Update
            const total = state.tasks.length;
            const completed = state.tasks.filter(t => t.completed).length;
            document.getElementById('dashTotal').textContent = total;
            document.getElementById('dashDone').textContent = completed;
            document.getElementById('dashPending').textContent = total - completed;
            document.getElementById('badge').textContent = total - completed;

            // Sort: Priority, then incomplete first
            const sorted = [...state.tasks].sort((a,b) => (a.completed === b.completed ? 0 : a.completed ? 1 : -1));

            sorted.forEach(task => {
                const subs = task.subtasks || [];
                const subsHtml = subs.map(s => `
                    <div class="subtask-row">
                        <input type="checkbox" ${s.completed ? 'checked' : ''} onchange="app.toggleSubtask('${task.id}', '${s.id}')">
                        <span style="opacity:${s.completed?0.5:1}; text-decoration:${s.completed?'line-through':'none'}">${s.text}</span>
                    </div>
                `).join('');

                const tagsHtml = (task.tags || []).map(t => `<span class="tag">#${t}</span>`).join('');

                const html = `
                    <div class="task-card priority-${task.priority}">
                        <div class="task-header">
                            <input type="checkbox" class="checkbox" ${task.completed ? 'checked' : ''} onchange="app.toggleTask('${task.id}')">
                            <div class="task-content">
                                <div class="task-title" style="text-decoration: ${task.completed ? 'line-through' : 'none'}; opacity: ${task.completed ? 0.5 : 1}">
                                    ${task.text} ${tagsHtml}
                                </div>
                                <div class="task-meta">
                                    <i class="far fa-calendar"></i> ${task.date}
                                    <span>•</span>
                                    <span>${task.priority.toUpperCase()}</span>
                                </div>
                            </div>
                            <button class="btn btn-icon" style="color:var(--danger)" onclick="app.deleteTask('${task.id}')"><i class="fas fa-trash"></i></button>
                        </div>
                        
                        ${!task.completed ? `
                        <div class="subtasks">
                            ${subsHtml}
                            <div class="subtask-input-row">
                                <input type="text" id="sub-input-${task.id}" placeholder="Subtask..." style="background:transparent; border:none; border-bottom:1px solid var(--border); color:white; font-size:12px; padding:4px;">
                                <button class="btn btn-secondary" style="padding:2px 8px; font-size:10px;" onclick="app.addSubtask('${task.id}')">Add</button>
                            </div>
                        </div>` : ''}
                    </div>
                `;
                list.insertAdjacentHTML('beforeend', html);
            });
        }

        function renderCalendar() {
            const grid = document.getElementById('calGrid');
            grid.innerHTML = `
                <div class="cal-day-header">Sun</div><div class="cal-day-header">Mon</div><div class="cal-day-header">Tue</div>
                <div class="cal-day-header">Wed</div><div class="cal-day-header">Thu</div><div class="cal-day-header">Fri</div><div class="cal-day-header">Sat</div>
            `;

            const year = state.currentDate.getFullYear();
            const month = state.currentDate.getMonth();
            
            document.getElementById('calMonthYear').textContent = new Date(year, month).toLocaleString('default', { month: 'long', year: 'numeric' });

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const todayStr = new Date().toISOString().split('T')[0];

            // Empty cells
            for(let i=0; i<firstDay; i++) {
                grid.insertAdjacentHTML('beforeend', `<div></div>`);
            }

            // Days
            for(let d=1; d<=daysInMonth; d++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const isToday = dateStr === todayStr;
                
                // Find tasks for this day
                const dayTasks = state.tasks.filter(t => t.date === dateStr);
                const dots = dayTasks.map(t => `<div class="cal-task-dot ${t.completed?'done':''}">${t.text}</div>`).join('');

                grid.insertAdjacentHTML('beforeend', `
                    <div class="cal-cell ${isToday ? 'today' : ''}">
                        <div class="cal-date">${d}</div>
                        ${dots}
                    </div>
                `);
            }
        }

        function renderSuggestions() {
            const box = document.getElementById('suggestionsBox');
            box.innerHTML = state.history.map(h => 
                `<div class="suggestion-chip" onclick="app.addTask('${h}')">+ ${h}</div>`
            ).join('');
        }

        function renderChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            
            // Group completed tasks by date (last 7 days)
            const labels = [];
            const data = [];
            
            for(let i=6; i>=0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                const ds = d.toISOString().split('T')[0];
                labels.push(ds.slice(5)); // MM-DD
                
                // Rough estimate based on task data (in real app, use completedAt timestamp)
                // For now, mapping pending tasks due on that date vs completed
                const count = state.tasks.filter(t => t.date === ds).length;
                data.push(count);
            }

            if(state.chart) state.chart.destroy();

            state.chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Tasks Scheduled',
                        data: data,
                        backgroundColor: '#208084',
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#475569' } },
                        x: { grid: { display: false } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        // ==================== INIT & STORAGE ====================
        
        function saveLocal() {
            localStorage.setItem('local_tasks', JSON.stringify(state.tasks));
            renderTasks();
            if(document.getElementById('calendar').classList.contains('active')) renderCalendar();
        }

        onAuthStateChanged(auth, (user) => {
            if(user) {
                state.user = user;
                document.getElementById('userEmail').textContent = user.email.split('@')[0];
                document.getElementById('authBtn').textContent = "Sign Out";
                document.getElementById('syncDot').className = "connection-dot online";
                document.getElementById('syncText').textContent = "Synced";
                
                const q = query(collection(db, 'tasks'), where('uid', '==', user.uid));
                onSnapshot(q, (snap) => {
                    state.tasks = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    renderTasks();
                    if(document.getElementById('calendar').classList.contains('active')) renderCalendar();
                    if(document.getElementById('dashboard').classList.contains('active')) renderChart();
                });
            } else {
                state.user = null;
                document.getElementById('userEmail').textContent = "Guest";
                document.getElementById('authBtn').textContent = "Sign In";
                document.getElementById('syncDot').className = "connection-dot";
                document.getElementById('syncText').textContent = "Offline";
                
                state.tasks = JSON.parse(localStorage.getItem('local_tasks')) || [];
                renderTasks();
            }
        });

        // Initial Renders
        document.getElementById('dateInput').valueAsDate = new Date();
        renderSuggestions();
    </script>
</body>
</html>
