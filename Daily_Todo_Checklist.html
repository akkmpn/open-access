<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Todo - Firebase Sync</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .sync-status {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .sync-status.online {
            background: rgba(76, 175, 80, 0.3);
            color: #4caf50;
        }

        .sync-status.offline {
            background: rgba(244, 67, 54, 0.3);
            color: #f44336;
        }

        .content {
            padding: 30px;
        }

        .auth-section {
            display: none;
        }

        .auth-section.show {
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
            border: 2px solid #ddd;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #f0f0f0;
        }

        .user-info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #555;
            border-left: 4px solid #667eea;
        }

        .user-info strong {
            color: #333;
            display: block;
            margin-bottom: 10px;
        }

        .todo-section {
            display: none;
        }

        .todo-section.show {
            display: block;
        }

        .todo-input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .todo-input-section input {
            flex: 1;
        }

        .todo-input-section button {
            width: 50px;
            padding: 12px;
        }

        .todo-list {
            list-style: none;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: all 0.3s;
            border-left: 3px solid #667eea;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .todo-item:hover {
            background: #f0f0f0;
            transform: translateX(5px);
        }

        .todo-item.completed {
            opacity: 0.6;
            border-left-color: #4caf50;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #999;
        }

        .todo-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .todo-text {
            flex: 1;
            color: #333;
            font-size: 14px;
            word-break: break-word;
        }

        .todo-date {
            font-size: 12px;
            color: #999;
            white-space: nowrap;
        }

        .todo-delete {
            background: #f44336;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.3s;
        }

        .todo-delete:hover {
            background: #da190b;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
            font-weight: 600;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 3px solid #4caf50;
        }

        .message.error {
            background: #ffebee;
            color: #c62828;
            border-left: 3px solid #f44336;
        }

        .message.info {
            background: #e3f2fd;
            color: #1565c0;
            border-left: 3px solid #2196f3;
        }

        .logout-btn {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }

        .logout-btn:hover {
            background: #da190b;
        }

        @media (max-width: 480px) {
            .container {
                border-radius: 0;
            }
            .content {
                padding: 20px;
            }
            .header {
                padding: 20px;
            }
            .header h1 {
                font-size: 24px;
            }
            button {
                padding: 10px;
                font-size: 13px;
            }
            .todo-item {
                flex-wrap: wrap;
            }
            .todo-delete {
                padding: 5px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✓ Daily Todo</h1>
            <div class="sync-status offline" id="syncStatus">
                <span id="syncText">🔄 Loading...</span>
            </div>
        </div>

        <div class="content">
            <div id="message"></div>

            <div class="auth-section show" id="authSection">
                <form onsubmit="return false;">
                    <div class="form-group">
                        <label>📧 Email</label>
                        <input type="email" id="loginEmail" placeholder="your@email.com">
                    </div>

                    <div class="form-group">
                        <label>🔐 Password</label>
                        <input type="password" id="loginPassword" placeholder="At least 6 characters">
                    </div>

                    <div class="button-group">
                        <button type="button" class="btn-primary" id="loginBtn">🔐 Login</button>
                        <button type="button" class="btn-secondary" id="signupBtn">📝 Sign Up</button>
                    </div>

                    <button type="button" class="btn-secondary" style="width: 100%;" id="guestBtn">
                        👤 Continue as Guest (Offline)
                    </button>
                </form>

                <div style="text-align: center; color: #999; font-size: 12px; margin-top: 20px;">
                    <p>💡 Demo Account:</p>
                    <p>Email: <strong>test@example.com</strong></p>
                    <p>Password: <strong>123456</strong></p>
                </div>
            </div>

            <div class="todo-section" id="todoSection">
                <div class="user-info">
                    <strong>👤 <span id="userEmail">Guest</span></strong>
                    <button class="logout-btn" id="logoutBtn">🚪 Logout</button>
                </div>

                <div class="todo-input-section">
                    <input 
                        type="text" 
                        id="todoInput" 
                        placeholder="What do you need to do today?"
                    >
                    <button class="btn-primary" id="addTodoBtn">➕</button>
                </div>

                <ul class="todo-list" id="todoList">
                    <div class="empty-state">📭 No tasks yet. Add one above!</div>
                </ul>
            </div>
        </div>
    </div>

    <!-- Firebase SDK v9+ (Modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getDatabase, ref, set, update, remove, onValue } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

        console.log('📝 Firebase module loading...');

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCoCFw0hezldX3t33AYa1ytddYMuQCWliM",
            authDomain: "daily-todo-1e4ad.firebaseapp.com",
            projectId: "daily-todo-1e4ad",
            storageBucket: "daily-todo-1e4ad.firebasestorage.app",
            messagingSenderId: "629797690976",
            appId: "1:629797690976:web:fda66df1691eb920e12d05",
            measurementId: "G-KG0NGWBFCW",
            databaseURL: "https://daily-todo-1e4ad-default-rtdb.firebaseio.com"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        console.log('✅ Firebase initialized');

        // Global State
        let currentUser = null;
        let isGuest = false;
        let todosCache = {};
        let syncListener = null;

        // ===== SHOW/HIDE SECTIONS =====
        function showAuthSection() {
            document.getElementById('authSection').classList.add('show');
            document.getElementById('todoSection').classList.remove('show');
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
        }

        function showTodoSection() {
            document.getElementById('authSection').classList.remove('show');
            document.getElementById('todoSection').classList.add('show');
            
            if (isGuest) {
                document.getElementById('userEmail').textContent = '👤 Guest (Offline)';
            } else {
                document.getElementById('userEmail').textContent = '✅ ' + (currentUser?.email || 'Unknown');
            }
            
            loadTodosFromLocal();
        }

        // ===== MESSAGES =====
        function showMessage(text, type = 'info') {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = `<div class="message ${type}">${text}</div>`;
            
            if (type === 'success' || type === 'info') {
                setTimeout(() => messageDiv.innerHTML = '', 3500);
            }
        }

        // ===== AUTH FUNCTIONS =====
        async function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showMessage('⚠️ Please enter email and password', 'error');
                return;
            }

            try {
                showMessage('🔄 Logging in...', 'info');
                const result = await signInWithEmailAndPassword(auth, email, password);
                currentUser = result.user;
                isGuest = false;
                console.log('✅ Login successful:', currentUser.email);
                showMessage('✅ Login successful!', 'success');
            } catch (error) {
                console.error('Login error:', error);
                showMessage('❌ ' + error.message, 'error');
            }
        }

        async function signup() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showMessage('⚠️ Please enter email and password', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('❌ Password must be at least 6 characters', 'error');
                return;
            }

            try {
                showMessage('🔄 Creating account...', 'info');
                const result = await createUserWithEmailAndPassword(auth, email, password);
                currentUser = result.user;
                isGuest = false;
                console.log('✅ Signup successful:', currentUser.email);
                showMessage('✅ Account created! Welcome! 🎉', 'success');
            } catch (error) {
                console.error('Signup error:', error);
                showMessage('❌ ' + error.message, 'error');
            }
        }

        function loginAsGuest() {
            isGuest = true;
            currentUser = null;
            showMessage('👤 Using offline mode', 'info');
            showTodoSection();
            loadTodosFromLocal();
        }

        async function logout() {
            if (!confirm('Are you sure you want to logout?')) return;
            
            try {
                await signOut(auth);
                currentUser = null;
                isGuest = false;
                todosCache = {};
                if (syncListener) syncListener();
                showMessage('✅ Logged out', 'success');
                showAuthSection();
            } catch (error) {
                console.error('Logout error:', error);
                showMessage('❌ ' + error.message, 'error');
            }
        }

        // ===== TODO FUNCTIONS =====
        async function addTodo() {
            const input = document.getElementById('todoInput');
            const text = input.value.trim();

            if (!text) {
                showMessage('⚠️ Please enter a task', 'error');
                return;
            }

            const todo = {
                id: Date.now().toString(),
                text: text,
                completed: false,
                timestamp: new Date().toISOString()
            };

            try {
                todosCache[todo.id] = todo;
                saveTodosLocal();
                renderTodos();
                input.value = '';

                if (currentUser && !isGuest) {
                    const todoRef = ref(db, 'users/' + currentUser.uid + '/todos/' + todo.id);
                    await set(todoRef, todo);
                    console.log('✅ Todo synced to Firebase');
                    showMessage('✅ Task added & synced ☁️', 'success');
                } else {
                    showMessage('✅ Task added (offline)', 'info');
                }
            } catch (error) {
                console.error('Add todo error:', error);
                showMessage('❌ Error: ' + error.message, 'error');
            }
        }

        async function toggleTodo(id) {
            try {
                const todo = todosCache[id];
                if (todo) {
                    todo.completed = !todo.completed;
                    todo.updatedAt = new Date().toISOString();
                    saveTodosLocal();
                    renderTodos();

                    if (currentUser && !isGuest) {
                        const todoRef = ref(db, 'users/' + currentUser.uid + '/todos/' + id);
                        await update(todoRef, { 
                            completed: todo.completed,
                            updatedAt: todo.updatedAt
                        });
                    }
                }
            } catch (error) {
                console.error('Toggle error:', error);
                showMessage('❌ Error: ' + error.message, 'error');
            }
        }

        async function deleteTodo(id) {
            if (!confirm('Delete this task?')) return;

            try {
                delete todosCache[id];
                saveTodosLocal();
                renderTodos();

                if (currentUser && !isGuest) {
                    const todoRef = ref(db, 'users/' + currentUser.uid + '/todos/' + id);
                    await remove(todoRef);
                    showMessage('✅ Task deleted & synced ☁️', 'success');
                } else {
                    showMessage('✅ Task deleted', 'info');
                }
            } catch (error) {
                console.error('Delete error:', error);
                showMessage('❌ Error: ' + error.message, 'error');
            }
        }

        // ===== FIREBASE SYNC =====
        function syncWithFirebase() {
            if (!currentUser || isGuest) return;

            try {
                console.log('🔄 Setting up Firebase sync for user:', currentUser.uid);
                
                const todoRef = ref(db, 'users/' + currentUser.uid + '/todos');

                if (syncListener) syncListener();

                syncListener = onValue(todoRef, 
                    (snapshot) => {
                        const data = snapshot.val();
                        if (data) {
                            todosCache = data;
                            console.log('☁️ Synced from Firebase:', Object.keys(data).length, 'todos');
                        } else {
                            todosCache = {};
                            console.log('☁️ No todos in Firebase');
                        }
                        saveTodosLocal();
                        renderTodos();
                        updateSyncStatus();
                    },
                    (error) => {
                        console.error('❌ Sync error:', error);
                        if (error.code === 'PERMISSION_DENIED') {
                            showMessage('⚠️ Permission denied - check Firebase rules', 'error');
                        } else {
                            showMessage('⚠️ Sync error: ' + error.message, 'error');
                        }
                    }
                );

                updateSyncStatus();
            } catch (error) {
                console.error('Sync setup error:', error);
                showMessage('❌ Sync error: ' + error.message, 'error');
            }
        }

        // ===== STORAGE =====
        function saveTodosLocal() {
            try {
                localStorage.setItem('todos_cache', JSON.stringify(todosCache));
            } catch (error) {
                console.error('Storage error:', error);
            }
        }

        function loadTodosFromLocal() {
            try {
                const stored = localStorage.getItem('todos_cache');
                if (stored) {
                    todosCache = JSON.parse(stored);
                    renderTodos();
                }
            } catch (error) {
                console.error('Load error:', error);
            }
        }

        // ===== RENDER TODOS =====
        function renderTodos() {
            const list = document.getElementById('todoList');
            const todos = Object.values(todosCache)
                .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            if (todos.length === 0) {
                list.innerHTML = '<div class="empty-state">📭 No tasks yet. Add one above!</div>';
                return;
            }

            list.innerHTML = todos.map(todo => `
                <li class="todo-item ${todo.completed ? 'completed' : ''}">
                    <input 
                        type="checkbox" 
                        class="todo-checkbox" 
                        ${todo.completed ? 'checked' : ''} 
                        onchange="toggleTodo('${escapeHtml(todo.id)}')"
                    >
                    <div class="todo-text">${escapeHtml(todo.text)}</div>
                    <div class="todo-date">${new Date(todo.timestamp).toLocaleDateString()}</div>
                    <button class="todo-delete" onclick="deleteTodo('${escapeHtml(todo.id)}')">✕</button>
                </li>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ===== SYNC STATUS =====
        function updateSyncStatus() {
            const status = document.getElementById('syncStatus');
            const text = document.getElementById('syncText');
            
            const isOnline = navigator.onLine;
            const isLoggedIn = currentUser && !isGuest;
            
            if (!isOnline) {
                status.className = 'sync-status offline';
                text.textContent = '📴 Offline';
            } else if (isLoggedIn) {
                status.className = 'sync-status online';
                text.textContent = '✅ Synced Online';
            } else if (isGuest) {
                status.className = 'sync-status offline';
                text.textContent = '👤 Offline Mode';
            } else {
                status.className = 'sync-status offline';
                text.textContent = '🔓 Sign In to Sync';
            }
        }

        // ===== INITIALIZATION =====
        console.log('🚀 Setting up event listeners...');

        // Make functions global so HTML can access them
        window.login = login;
        window.signup = signup;
        window.loginAsGuest = loginAsGuest;
        window.logout = logout;
        window.addTodo = addTodo;
        window.toggleTodo = toggleTodo;
        window.deleteTodo = deleteTodo;

        // Button event listeners
        document.getElementById('loginBtn').addEventListener('click', login);
        document.getElementById('signupBtn').addEventListener('click', signup);
        document.getElementById('guestBtn').addEventListener('click', loginAsGuest);
        document.getElementById('logoutBtn').addEventListener('click', logout);
        document.getElementById('addTodoBtn').addEventListener('click', addTodo);

        // Enter key for todo input
        document.getElementById('todoInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTodo();
        });

        // Auth state listener
        auth.onAuthStateChanged((user) => {
            console.log('Auth state changed:', user?.email || 'No user');
            
            if (user) {
                currentUser = user;
                isGuest = false;
                showTodoSection();
                syncWithFirebase();
            } else if (isGuest) {
                showTodoSection();
            } else {
                showAuthSection();
            }
        });

        // Online/offline listeners
        window.addEventListener('online', () => {
            console.log('✅ Back online');
            updateSyncStatus();
        });
        window.addEventListener('offline', () => {
            console.log('📴 Gone offline');
            updateSyncStatus();
        });

        updateSyncStatus();
        console.log('✅ Daily Todo App ready!');
    </script>
</body>
</html>
